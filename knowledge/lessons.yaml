    dont: "「今日は〜について話すよ」という前置きで始める"
    reason: "視聴者の離脱は最初の10秒に集中する。数字は即座に興味を喚起する"
    episodes: []
    created: "2026-04-05"

  - id: "les_002"
    verdict: "KEEP"
    scope: "channel-wide"
    category: "visual_sync"
    do: "analysisチャプターでグラフを使う際は、台詞でグラフの数値を直接読み上げる"
    dont: "「このグラフを見てください」とだけ言ってグラフに言及しない"
    reason: "視覚と音声の一致が理解度と視聴継続率を高める（dual coding theory）"
    episodes: []
    created: "2026-04-05"

  - id: "les_003"
    verdict: "TENTATIVE"
