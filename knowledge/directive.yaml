# knowledge/directive.yaml
# パイプラインの制作方針ファイル（autoagent の program.md 相当）
# このファイルを編集して方針を変えると次回の台本生成に自動反映される
version: 1
updated: "2026-04-26"

# ─── テクノロジー投資×地政学チャンネル ─────────────────────────────────────────
tech_geopolitics:
  focus_theme: "米中半導体戦争の投資インパクト"

  # ─── テーマ選定フィルター（2重チェック必須） ───────────────────────────────
  # テーマを選ぶ前に以下を両方満たすか確認すること
  topic_selection_criteria:
    # フィルター①: 生活直結テスト（いずれか1つ以上に当てはまること）
    life_relevance_checklist:
      - "財布に影響する（食料品・光熱費・税金・給与・円安）"
      - "持っている資産に影響する（株・不動産・円預金・NISA）"
      - "仕事・雇用に影響する（AI・製造業空洞化・円安）"
      - "子どもや老後に影響する（年金・教育費・インフレ）"
    # フィルター②: サムネ自分ごとテスト（2026-05-29 ターゲット拡大）
    thumbnail_self_relevance_test: "老後資金に不安を持つ会社員・50-60代を含む個人投資家がサムネを見た瞬間に『これ私の話だ』と感じられるか"
    # フィルター③: 王道KW着地（2026-05-29 ガーコ分析）
    keyword_strategy: "王道KW（新NISA/iDeCo/S&P500/オルカン/SBI証券/楽天証券）を必ず主語に。地政学/時事はアングルとして使い、王道KWの自分ごと化に接続する。例『ホルムズ海峡封鎖 → 新NISAのS&P500はどうなる』"

  # 推奨テーマ例（生活直結＋話題性＋王道KW着地）
  recommended_topic_angles:
    - "円安が止まらない構造 → スーパーの値段が上がり続ける理由"
    - "米中関税戦争 → iPhoneや家電が来年○万円値上がりする話"
    - "日本の電気代が世界最高水準になった理由 → 毎月の光熱費"
    - "NISA枠と地政学リスク → 持っている米国株が今危ない？"
    - "半導体不足と車の値段 → マイカー購入タイミングに直結"
    # 王道KW×地政学の統合例（2026-05-29 追加）
    - "ホルムズ海峡封鎖 → 新NISAのS&P500がどうなるか"
    - "米中半導体戦争 → オルカンに含まれる台湾比率のリスク"
    - "SBI証券の制度改正 → 今すぐ確認すべき設定"

  # ─── 定番evergreenシリーズ（ニュース非依存・投稿の谷間を埋める安定供給 2026-05-28） ───
  # ガーコちゃんねる分析より導入。旬ニュースが弱い週はここから1本選び初速の母数を確保する。
  evergreen_series:
    - "【日本にしかない】中国が抜けない技術障壁を1社ずつ解剖（東京エレクトロン/ファナック/信越化学/ディスコ/レーザーテック）→ 損回避型タイトル『〇〇を知らない投資家は損してる』"
    - "【チョークポイント】世界の物流・エネルギー要衝の有事シナリオ（マラッカ/台湾/ホルムズ/スエズ/パナマ）→ タイトル『〇〇封鎖！あなたの資産はどうなる？』"
    - "【逆風で笑う企業】悪材料が追い風になる構造を持つ銘柄（円安メリット/防衛株/天然資源）→ タイトル『〇〇なのに〇〇だけ上がる理由』"
    - "【資産防衛】為替介入・利上げ・選挙の度に再利用できる防衛テーマ → タイトル『〇〇、NISAの米国株は今すぐ見直すべき』"
    - "【制度活用】新NISA/iDeCo/SBI証券・楽天証券の改正・改悪を解説（王道KW・2026-05-29追加）→ タイトル『〇〇の改悪、今すぐ確認』"
    - "【インデックス比較】S&P500 vs オルカン vs FANG+ の比較シミュレーション（王道KW・2026-05-29追加）→ タイトル『{A} vs {B}、{数字}の差』"

  avoid:
    - "ETF選び方（飽和）"
    - "仮想通貨（BANリスク高）"
    - "生活に直結しない企業・技術の単体紹介（Terafab等。話題でも自分ごと化されない）"
    - "サムネとタイトルで何が起きるか想像できないニッチ技術テーマ"

  tone: "serious"               # serious | educational | alarming
  target_duration_min: 9        # 目標尺（分）
  hook_style: "逆説問い+数字"    # 逆説問い+数字 | 数字で始める | 問いかけ | 衝撃ファクト

  # ─── 台本の機械可読ルール（高頻度調整値の SoT・2026-05-29 Phase3 集約） ───
  # .claude/rules/{video-length,title-conventions,hook-structure,visual-selection}.md の
  # 数値・型の単一情報源。ここを編集すると buildDirectiveInstructions 経由で台本生成に反映される。
  # スキーマ検証: packages/domain/src/schema/Directive.ts（不正値は読み込み時に drop）。
  script_rules:
    length:
      duration_min: 9          # 目標尺（分）8〜11分
      lines_min: 55
      lines_max: 65
    title:
      patterns:
        - "損回避・警告型: {ターゲット/王道KW}、{警告/やめるべき/大損}"
        - "A vs B 比較対立型: {A} vs {B}、{数字}の差！"
        - "期限・最新性型: {2026年最新版/〇月まで}{王道KW}{警告}"
        - "ターゲット明示＋数字差型: {年代/属性}必見！{出来事}で{数字}の差"
        - "断定結論型: {王道KW/銘柄}、{断定的な好悪の結論}！"
      keyword_list:
        - "新NISA"
        - "iDeCo"
        - "S&P500"
        - "オルカン"
        - "FANG+"
        - "SCHD"
        - "高配当ETF"
        - "SBI証券"
        - "楽天証券"
        - "つみたて投資枠"
        - "成長投資枠"
    hook:
      total_sec: 34
      opening_greeting: "こんにちは、ぽんちゃんです。"
      layers:
        - "H-00 挨拶層（0〜8秒）: ponchanが『こんにちは、ぽんちゃんです。』固定挨拶＋緊急性/問いかけ＋『地政学の動きから具体的な投資判断・エントリー価格まで落とし込んでお話しいたします』（チャンネル価値提案句・固定）＋損失回避KW『これを知らないと〇〇になってしまうかもしれません！』を1〜2ライン（丁寧語）"
        - "H-05 逆説/衝撃数値層（8〜18秒）: 逆説的な問い or 信じられない数値を1〜2ライン（既存フック維持・タメ口）"
        - "H-01 結論層（18〜26秒）: 結論＋衝撃数字を明示。数字はエントリー価格・撤退ラインを優先する（視聴者の損得に直結させる）"
        - "H-03 学べる3つ層（26〜34秒）: rich-panelで『学べる3つのこと』を提示"
      opening_patterns:
        - "緊急性・危機感型: 皆さま大変です / 緊急です / 速報です / 〇〇が大変なことに"
        - "問いかけ・共感型: 突然ですが〇〇をご存知でしょうか / 〜で不安な方多いはずです"
        - "衝撃的結論・事実型: いきなりですが衝撃的な数字です / ついに〇〇が来ました"
    visual:
      rich_panel_policy: "fallback_only"   # 文字だけパネルは最終手段
      diagram_first: true                  # 図解系を最優先
      min_diagram_ratio: 0.6               # 全showの60%以上を図解系に
      allowed_diagram_types:
        - "comparison-table"
        - "flow-chart"
        - "traffic-light"
        - "cycle-loop"
        - "scale-balance"
        - "isometric-stack"
        - "chart"
        - "timeline"
        - "pyramid"
        - "venn"
        - "map"
    # ─── 独自性ルール（YouTube Inauthentic Content Policy 対策・2026-05-31追加） ───
    # 「AI量産・ネット要約の焼き直し」判定を回避し「付加価値あり」を立証するための必須要件。
    # 詳細・背景: .claude/rules/ban-avoidance.md
    originality:
      unique_viewpoint_min: 1       # 独自視点（"私はこう読む"）を analysis に最低1つ
      worked_example_min: 1         # 一次データに基づく自前の試算を最低1つ
      require_counterargument: true # 想定反論を1つ提示しキャラが応答する editorial 構造
      avoid_template_phrasing: true # 直近epと同一の言い回し・数字提示フォーマットを避ける

  # 実験中の仮説（今回試す設定）
  current_hypothesis:
    id: null
    description: null
    param: null
    seed: 13                    # VariationEngine シード

  # 学習した教訓（lessons.yaml から自動転記）
  active_lessons:
    - "hookの最初のセリフで数字を明示する"
    - "analysis チャプターでグラフを使う際は台詞と同期させる"
    - "テーマ選定は『話題性』と『生活直結』の両方を満たすものだけに絞る（2026-04-26）"
    - "gako_title: タイトルは損回避・断定・ターゲット明示型を最優先（例『〇〇、やめておくべき』『〇〇、黄金期突入！』）。先頭20字に銘柄名必須（2026-05-28・ガーコちゃんねる分析）"
    - "gako_keyword_axis: 王道KW（新NISA/iDeCo/S&P500/オルカン/SBI証券）を主語化し地政学はアングルに接続する。例『ホルムズ海峡封鎖、新NISAのS&P500はどうなる』（2026-05-29）"
    - "gako_target_expand: ターゲットを老後資金に不安を持つ会社員・50-60代へ拡大。30代個別銘柄投資家から30〜60代へ（2026-05-29）"
    - "gako_title_5patterns: タイトルは損回避/A vs B比較/期限最新性/ターゲット明示/断定の5型。先頭20字に王道KWまたは銘柄名必須・3案中1案に王道KW（2026-05-29）"
    - "counter_intuition_hook_15s: Hookの8〜18秒で逆説的な問いか信じられない数値を必ず提示する（H-05ルール・H-00挨拶層の直後）（2026-05-17・2026-06-02更新）"
    - "personal_relevance: 地政学・銘柄を視聴者の資産・キャリア・将来にどう関係するかで語る（自分ごと化アングル）（2026-05-17）"
    - "gako_opening_greeting: hook冒頭3秒に固定挨拶『こんにちは、ぽんちゃんです。』＋緊急性/問いかけ＋テーマ提示＋損失回避KWを置く（H-00層）。トーンはハイブリッド（挨拶=丁寧語/本編=タメ口）（2026-06-02・ガーコちゃんねる分析）"

# ─── AI マネー研究所 Shorts ──────────────────────────────────────────────────
ai_money_shorts:
  focus_theme: "新NISAと高配当株"
  template_experiment:
    active: false
    current: "TypeA"            # TypeA-E のどれか
    history: {}
  avoid:
    - "仮想通貨"
    - "FX"
  tone: "pop"                   # pop | educational | alarming

# ─── リサーチ設定 ────────────────────────────────────────────────────────────
research:
  enabled: true
  competitor_channels_file: "knowledge/competitor-channels.yaml"
  output_file: "knowledge/topic-research.json"
  proposals_dir: "knowledge/proposals"
  news_lookback_days: 7
  max_competitor_videos_per_channel: 10

# ─── 共通制約 ────────────────────────────────────────────────────────────────
global:
  max_api_cost_usd_per_day: 5.0
  require_review_before_upload: true
  auto_loop_enabled: false      # true にすると autonomous-loop.ts が起動可能になる
  max_episodes_per_loop: 3      # 自律ループ時の1日あたり上限
