  # handle に @xxx または channel/UCID を指定（両方 yt-dlp で使用可能）
  - handle: "channel/UCFXl12dZUPs7MLy_dMkMZYw"
    name: "高橋ダン（日本語）"
    category: "investment_tech"
    note: "グローバル視点の投資・経済解説"

  - handle: "@ryogakucho"
    name: "両学長"
    category: "investment"
    note: "個人投資家向け資産形成"

  - handle: "channel/UCfJEDCUlzQl4-atLp6Z9DcQ"
    name: "テスタ"
    category: "investment"
    note: "株式投資・デイトレード"

  # ─── 地政学・ニュース解説系 ──────────────────────────────────────────────────
  - handle: "@kazuyahkd"
    name: "KAZUYA Channel"
    category: "geopolitics"
    note: "時事・保守系ニュース解説"

