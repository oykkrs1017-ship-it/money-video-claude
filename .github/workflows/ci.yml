name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (all workspaces)
        run: npm test

      - name: Coverage (usecases + channel)
        run: |
          npm run test -w packages/usecases -- --coverage --reporter=verbose
          npm run test -w packages/tech-geopolitics-channel -- --coverage --reporter=verbose
