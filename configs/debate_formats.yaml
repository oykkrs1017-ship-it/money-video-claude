# ディベートフォーマット定義
formats:
  standard:
    name: "スタンダードディベート"
    description: "オープニング → 論点提示 → 反論 → クライマックス → クリフハンガー"
    structure:
      - section: intro
        duration_ratio: 0.10
        description: "トピック紹介とエージェント登場"
      - section: opening_statements
        duration_ratio: 0.20
        description: "各エージェントの立場と主論点の提示"
      - section: main_debate
        duration_ratio: 0.40
        description: "論点の深掘り、反論、割り込み演出"
      - section: escalation
        duration_ratio: 0.20
        description: "感情が高まるクライマックス（emotion: 80+）"
      - section: cliffhanger
        duration_ratio: 0.10
        description: "未解決ジレンマで終了、LINE誘導CTA"
    target_duration_minutes: 8
    interrupt_probability: 0.25  # セグメントの25%に割り込み演出
    metaphor_ratio: 0.15         # 台本の15%にメタファー挿入

  quick:
    name: "クイックディベート"
    description: "テンポ重視の短尺フォーマット"
    target_duration_minutes: 4
    interrupt_probability: 0.30
    metaphor_ratio: 0.10
