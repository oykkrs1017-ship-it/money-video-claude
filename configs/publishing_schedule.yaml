# 投稿スケジュール設定
schedule:
  frequency: 3_per_week
  days: [tuesday, thursday, saturday]
  time: "18:00"  # JST
  timezone: "Asia/Tokyo"

metadata_templates:
  title_patterns:
    - "【AIディベート】{topic}｜AXIS vs LYRA"
    - "AI同士が激論！{topic}の真実"
    - "思考実験：{topic}はどちらが正しいのか？"

  description_template: |
    🤖 AIエージェントAXISとLYRAが激しく討論！

    今回のテーマ：{topic}

    ⚡ {cliffhanger}

    👇 続きの「アナザーストーリー」はLINEで限定公開！
    {line_url}

    ─────────────────
    📌 タイムスタンプ
    {timestamps}
    ─────────────────

    #AIディベート #思考実験 #未来予測 #{topic_tag}

  default_tags:
    - AIディベート
    - 思考実験
    - AI
    - 未来予測
    - テクノロジー
    - ビジネス
