[project]
name = "uploader"
version = "0.1.0"
description = "YouTube upload and metadata management"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "google-api-python-client>=2.131",
    "google-auth-oauthlib>=1.2",
    "google-auth-httplib2>=0.2",
    "Pillow>=10.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uploader"]
