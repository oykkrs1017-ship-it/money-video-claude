[project]
name = "audio-synthesizer"
version = "0.1.0"
description = "Audio synthesis with VOICEVOX and emotion mapping"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "httpx>=0.27",
    "pydub>=0.25",
    "numpy>=1.26",
]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/audio_synthesizer"]
