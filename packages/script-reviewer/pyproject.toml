[project]
name = "script-reviewer"
version = "0.1.0"
description = "Script review and fact-checking using Claude API"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "anthropic>=0.28",
    "pydantic>=2.7",
]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/script_reviewer"]
