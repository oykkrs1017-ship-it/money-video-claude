            - HSMメーカーの認証更新特需
            - 決済カード140億枚の入替需要
            - 政府・金融機関のシステム更新
          color: '#2E7D32'
      - maro: つまり量子コンピューターは脅威であると同時に、PQC移行という10年スパンの巨大投資テーマを生み出しているのだ。脅威をヘッジしながら関連銘柄で利益を取るという両面作戦が重要だぞ
        emotion: thinking
      - ponchan: まさにそうなの。PQC移行のロードマップを見ると、2024年にNIST標準が決まり、2027年にNSAが義務化し、2030年に旧暗号が非推奨、2035年に完全移行という段階的なスケジュールで進むから、それぞれのフェーズで恩恵を受ける企業やセクターが変わってくるんだよ
