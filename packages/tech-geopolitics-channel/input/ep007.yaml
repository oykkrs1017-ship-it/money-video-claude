description: Googleが暗号解読に必要な量子ビット数を20分の1に削減するブレイクスルーを発表。690万BTCが量子攻撃リスクに晒され、Citi研究所は米大手銀行への攻撃で最大3.3兆ドルのGDP損失を警告。中国は150億ドルを投じ量子通信網1.2万kmを構築、米国は輸出規制で対抗するも中国は希土類で報復。NIST耐量子暗号の標準化と2035年移行期限の中、投資家が今知るべき量子覇権争いの全貌を解説します。
