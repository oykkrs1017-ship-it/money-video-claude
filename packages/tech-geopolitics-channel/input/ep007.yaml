          color: '#FF6F00'
      - maro: プロの機関投資家が量子リスクを理由にポートフォリオを組み替えているということは、これはもう理論上の話じゃなくて実際の資産配分に影響を与えるレベルの脅威なのだ
        emotion: serious
      - ponchan: 一方で、この脅威に対応するためのPQC関連市場は巨大な投資機会でもあるの。耐量子暗号への移行には世界中の金融機関、政府機関、通信事業者がシステムを更新しなければならないから、サイバーセキュリティ企業や量子コンピューティング企業にとっては膨大な需要が生まれるんだよ
        emotion: normal
        show:
          type: rich-panel
          icon: 📈
          title: PQC移行が生む投資機会
          body: |-
            世界中の暗号インフラを量子耐性仕様に更新する必要があり、関連企業に膨大な需要が発生。
            2035年の移行期限に向けて10年間の持続的な投資テーマとなる。
          emphasis: 10年間の巨大テーマ
          points:
