        emotion: surprised
      - ponchan: 特に大型調達が目立っていて、PsiQuantumが10億ドル、Quantinuumが8億ドルを調達して、それぞれ企業価値70億ドル、100億ドルの評価を受けているの。IonQは18か月間でOxford Ionicsの10.75億ドル買収を含む計25億ドル規模のM&Aを実行して、業界の統廃合が急速に進んでいるんだよ
