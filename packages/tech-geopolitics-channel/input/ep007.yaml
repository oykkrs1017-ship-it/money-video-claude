  - type: analysis_2
    topic: 資産防衛の視点
    lines:
      - ponchan: Citi研究所のシナリオをもう少し詳しく見てみよう。アメリカのトップ5銀行のいずれかがFedwireで量子攻撃を受けた場合、最小でGDPの10%にあたる2兆ドル、最大で17%にあたる3.3兆ドルの損失が出ると試算されているんだよ
        emotion: serious
        show:
          type: chart
          key: gdpRisk
      - maro: このグラフを見ると、最小シナリオでも2兆ドル、つまり300兆円規模の損失なのだ。2008年のリーマンショックでアメリカのGDP損失が約2兆ドルだったから、それと同等かそれ以上の衝撃になる可能性があるぞ
        emotion: surprised
      - ponchan: 実際に投資銀行のJefferiesは、この量子脅威を受けて自社の『Greed & Fear』ポートフォリオからビットコインの配分10%を外して、物理的な金と金鉱株にそれぞれ5%ずつ再配分する措置を取っているの。プロの投資家はすでに動き始めているんだよ
        emotion: serious
        show:
          type: rich-panel
          icon: 🔄
          title: Jefferiesのポートフォリオ変更
          body: |-
            投資銀行Jefferiesが量子リスクを理由にビットコイン配分を撤廃。
            暗号資産から実物資産への資金シフトが機関投資家レベルで始まっている。
          emphasis: BTC 10%→金・金鉱株へ
          points:
            - 'ビットコイン配分: 10%→0%に削減'
            - '物理金: +5%に増加'
            - '金鉱株: +5%に増加'
