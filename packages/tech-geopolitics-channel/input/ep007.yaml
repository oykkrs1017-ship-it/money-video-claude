chapters:
  - type: hook
    topic: 量子が暗号を破る日
    lines:
      - ponchan: 2026年3月、GoogleのQuantum AIチームがとんでもない研究成果を発表したんだよ。ビットコインを守っている楕円曲線暗号を破るのに必要な量子ビット数が、従来予測のなんと20分の1、50万量子ビット未満まで引き下げられたの
        emotion: serious
        show:
          type: rich-panel
          icon: ⚡
          title: Googleの衝撃発表
          body: |-
            2026年3月、Google Quantum AIが暗号解読に必要な物理量子ビット数を従来の20分の1に削減するブレイクスルーを発表。
            量子コンピューターによる暗号解読の現実味が急激に高まった。
          emphasis: 従来の20分の1
          points:
            - '必要量子ビット: 50万未満に削減'
            - 楕円曲線暗号(ECC)が標的
            - ビットコインの署名方式に直結
          color: '#D32F2F'
      - maro: 50万量子ビット未満って、それでも膨大な数に聞こえるけど、今の開発スピードを考えると10年以内に届きそうな射程圏内に入ってきてるのだ。これは相当まずい話なのだ
        emotion: surprised
      - ponchan: しかもね、問題はそれだけじゃないの。現在ブロックチェーン上に公開鍵が露出しているビットコインは、全体の約3分の1にあたる約690万BTC、時価にして5000億ドルから6000億ドル相当に達しているんだよ
        emotion: serious
        show:
          type: chart
          key: quantumExposedBTC
      - maro: 690万BTCって日本円にしたら100兆円規模なのだ！全体の3分の1が量子コンピューターに対して無防備な状態にさらされているなんて、想像するだけで背筋が凍る話だぞ
        emotion: surprised
      - ponchan: さらにCiti研究所が2026年1月に出した報告書では、もしアメリカのトップ5銀行のどれか1つでもFedwireへのアクセスを量子攻撃で1日止められたら、連鎖的な流動性危機でアメリカGDPの10〜17%、最大3.3兆ドルの間接的経済損失が発生すると警告しているの
        emotion: serious
        show:
          type: rich-panel
          icon: 🏦
          title: Citi研究所の衝撃レポート
          body: |-
            米大手銀行1行がFedwireへのアクセスを1日止められるだけで、連鎖的な流動性危機が発生。
            半年間の景気後退を招く可能性がある。
          emphasis: 最大3.3兆ドル
          points:
            - 'GDP損失: 10〜17%相当'
            - '金額: 2.0〜3.3兆ドル'
            - 半年間の景気後退リスク
          color: '#C62828'
      - maro: 3.3兆ドルって500兆円規模だぞ。たった1日の攻撃でリーマンショック級の経済損失が出るかもしれないなんて、量子コンピューターの脅威は暗号資産だけの話じゃないのだ
        emotion: surprised
      - ponchan: そうなの。量子コンピューターの進化は、暗号資産だけでなく銀行間決済、国防通信、インターネット全体の暗号基盤を根本から脅かす可能性があるんだよ。今日はこの量子覇権争いの全貌を、米中欧の開発競争と金融インフラへの脅威という2つの軸で徹底的に解説していくね
        emotion: serious
      - maro: 暗号資産に投資している人だけじゃなくて、銀行に預金がある人、つまり全員に関係する話ってことなのだ。しっかり聞かないといけないぞ
        emotion: serious
      - ponchan: まさにその通りで、今回は投資家として何を見ておくべきか、どの国がどんな戦略で動いているのか、そして私たちの資産を守るために何が必要なのか、順番に整理していくよ
        emotion: serious
        show:
          type: rich-panel
          icon: 🎯
          title: 今回の解説テーマ
          body: |-
            量子コンピューター覇権争いを3つの視点から徹底分析。
            米中欧の国家戦略、金融インフラの脆弱性、投資家が取るべきアクション。
          emphasis: 3つの視点で徹底分析
          points:
            - ①米中欧の開発競争の実態
            - ②金融インフラへの脅威シナリオ
            - ③投資家が注目すべきポイント
          color: '#1565C0'
      - maro: よし、量子コンピューターの世界がどうなっているのか、まずは各国の開発競争の実態から教えてほしいのだ
        emotion: thinking
  - type: explanation
    topic: 米中欧の量子開発競争
    lines:
      - ponchan: まず各国がどれだけのお金を量子コンピューター開発に注ぎ込んでいるか見てほしいの。中国が約150億ドルで断トツのトップ、EUが約110億ドル、日本が74億ドル、アメリカの連邦政府が約50億ドル、イギリスが40億ドルという規模になっているんだよ
        emotion: serious
        show:
          type: chart
          key: nationalInvestment
      - maro: ちょっと待ってほしいのだ。アメリカが50億ドルで中国の3分の1しかないって、これだけ見ると中国が圧倒的に有利に見えるけど、アメリカには民間の巨大テック企業がいるから単純比較はできないのだ
        emotion: thinking
      - ponchan: まろくん、いいところに気づいたね。アメリカの強みはまさにそこで、GoogleやIBM、Microsoft、IonQといった民間企業が独自に巨額の研究開発投資を行っていて、連邦政府の資金はそれを補完する位置づけなの。Googleの105量子ビットWillowチップは、古典的スーパーコンピューターで10の25乗年かかる計算を5分未満で実行したんだよ
        emotion: normal
        show:
          type: rich-panel
          icon: 🇺🇸
          title: アメリカの量子戦略
          body: |-
            連邦政府50億ドル＋民間テック大手の巨額投資による分散型エコシステム。
            超伝導・トラップドイオン・中性原子・トポロジカルと複数のハードウェア方式を並行開発。
          emphasis: 民間主導の分散型モデル
          points:
            - 'Google Willow: 105量子ビットで量子優位性実証'
            - 'IBM: 2029年までに故障耐性システム目標'
            - 'Microsoft: トポロジカル量子ビットMajorana 1'
            - 'IonQ: 25億ドル規模のM&Aで統合加速'
          color: '#1565C0'
      - maro: 一方の中国はどうなっているのだ。150億ドルという桁違いの国家投資で、何を作っているのか具体的に知りたいぞ
        emotion: thinking
      - ponchan: 中国は国家主導のトップダウンモデルで、中国科学技術大学を中心に開発を集中させているの。光量子コンピューターの九章3.0は255光子を検出して、世界最速のスーパーコンピューターの10京倍の速度でガウスボソンサンプリングを解いたんだよ。超伝導では祖冲之3.0が105量子ビットで15桁の速度優位性を達成しているの
        emotion: serious
        show:
          type: rich-panel
          icon: 🇨🇳
          title: 中国の量子開発実態
          body: |-
            国家投資150億ドルを中国科学技術大学(USTC)に集中投下するトップダウン型。
            光量子・超伝導の両方で世界トップクラスの成果を達成。
          emphasis: 150億ドルの国家集中投資
          points:
            - '九章3.0: 255光子で量子優位性達成'
            - '祖冲之3.0: 105量子ビット超伝導'
            - '量子通信網: 1.2万kmを整備済み'
            - '中性原子: 寰元1号を商用展開開始'
          color: '#D32F2F'
      - maro: 中国はさらに量子通信でも先行していて、1万2000キロメートルの量子通信ネットワークを構築済みなんだろう。墨子号衛星で中ロ間3800キロの量子通信にも成功しているし、実用化では中国がリードしているのだ
        emotion: serious
      - ponchan: そしてEUは米中に挟まれる中で『戦略的自律性』を掲げた第3の道を模索しているんだよ。2025年7月の量子ヨーロッパ戦略と、2026年制定予定の欧州量子法で、フランスのPasqalやフィンランドのIQMなど域内企業を育成しながら、EuroQCIという独自の量子通信インフラを構築しようとしているの
        emotion: normal
        show:
          type: rich-panel
          icon: 🇪🇺
          title: EUの第3の道
          body: |-
            米中どちらの量子インフラにも依存しない『戦略的自律性』を追求。
            約110億ドルの公的投資でEuroHPC量子コンピューティング基盤とEuroQCI通信網を構築中。
          emphasis: 戦略的自律性の追求
          points:
            - '2025年: 量子ヨーロッパ戦略採択'
            - '2026年: 欧州量子法の制定予定'
            - Pasqal・IQM等の域内企業を育成
            - 'EuroQCI: 独自量子通信インフラ'
          color: '#1565C0'
      - maro: つまり米中欧で開発モデルが全然違うってことなのだ。アメリカは民間主導の分散型、中国は国家主導の集中型、EUは自律性重視の育成型、それぞれの強みと弱みがはっきりしているぞ
        emotion: thinking
      - ponchan: しかも今この量子開発競争は単なる技術競争にとどまらず、輸出規制の応酬という形で『量子冷戦』に発展しているんだよ。アメリカは2024年9月に34量子ビット以上の量子コンピューターと希釈冷凍機の対中輸出を規制し、中国はその報復としてガリウムなど重要鉱物の輸出を制限しているの
        emotion: serious
        show:
          type: rich-panel
          icon: ⚔️
          title: 量子冷戦の構図
          body: |-
            米国は量子ハードウェアの輸出規制を強化、中国は重要鉱物の輸出制限で報復。
            技術覇権を巡る相互制裁が量子分野にも波及している。
          emphasis: 輸出規制の応酬
          points:
            - '米国: 34量子ビット以上の輸出禁止'
            - '米国: 希釈冷凍機も規制対象に'
            - '中国: ガリウム等の輸出制限で報復'
            - '中国: 冷凍機の国産化に成功(5-6年遅れ)'
          color: '#FF6F00'
      - maro: でも中国はすでに希釈冷凍機の国産化にも成功しているから、輸出規制の効果は5〜6年程度しか持たない可能性があるのだ。半導体と同じパターンで、規制が逆に中国の自給自足を加速させてしまっているぞ
        emotion: serious
    visuals:
      - type: image
        at: 0
        imageData:
          src: content/infographic_ep007_1.png
          caption: ''
          position: center
          width: 1400
          duration: 20
          animation: fade
  - type: explanation_2
    topic: 金融インフラへの脅威
    lines:
      - ponchan: ここからは量子コンピューターが金融インフラにどんな脅威をもたらすのか、具体的に見ていくよ。まず知っておいてほしいのが『ハーベスト・ナウ・ディクリプト・レイター攻撃』、つまり今データを収集して将来量子コンピューターで復号するという手法が、すでに実行されているということなの
        emotion: serious
        show:
          type: rich-panel
          icon: 🔓
          title: HNDL攻撃の脅威
          body: |-
            敵対的国家やハッカーが暗号化されたデータを今この瞬間も収集中。
            量子コンピューターが実用化された時点で一斉に復号される危険がある。
          emphasis: 今収集、将来復号
          points:
            - 政府機密・軍事通信が標的
            - 知的財産・個人情報も対象
            - データの機密寿命が10年以上なら今すぐ危険
            - NSAが2035年までのPQC移行を義務化
          color: '#D32F2F'
      - maro: つまり量子コンピューターが完成する前から、すでに攻撃は始まっているってことなのだ。10年後に価値がある機密情報は、今この瞬間に盗まれて保存されている可能性があるぞ
        emotion: surprised
      - ponchan: そうなの。だからNISTは2024年8月に最初の3つの耐量子暗号標準、FIPS 203、204、205を最終決定して、NSAは2027年1月までにすべての新規国家安全保障システムでのPQC対応を義務付けたんだよ。2035年までに既存システムも含めた完全移行が求められているの
        emotion: serious
        show:
          type: timeline
          title: PQC移行スケジュール
          events:
            - year: 2024年8月
              label: NIST PQC標準3本を最終決定
              highlight: true
            - year: 2025年3月
              label: HQCを第4候補に選定
              highlight: false
            - year: 2027年1月
              label: NSA新規システムPQC義務化
              highlight: true
            - year: 2030年
              label: 旧暗号アルゴリズムの非推奨化
              highlight: false
            - year: 2035年
              label: 全システムのPQC完全移行期限
              highlight: true
      - maro: 2035年までに世界中の暗号を全部入れ替えないといけないのか。これは技術的にもコスト的にも途方もない作業になるのだ
        emotion: thinking
      - ponchan: 実際にBISのProject Leapでテストしたところ、耐量子暗号の署名サイズは従来のECDSA署名の37.8倍に膨らむことがわかったの。検証速度も最大7.5倍遅くなるから、銀行間決済の処理速度に深刻な影響が出る可能性があるんだよ
        emotion: serious
        show:
          type: rich-panel
          icon: 📝
          title: PQC移行の技術的課題
          body: |-
            BIS Project Leapの実験で判明した耐量子暗号の技術的ハードル。
            署名サイズの肥大化と検証速度の低下が金融システムに深刻な影響を及ぼす。
          emphasis: 署名サイズ37.8倍
          points:
            - '署名サイズ: ECDSA比37.8倍に膨張'
            - '検証速度: 最大7.5倍の遅延'
            - ISO 8583の256バイト制限を超過
            - 140億枚の決済カードが非対応
          color: '#FF6F00'
      - maro: しかも世界中で流通している140億枚の決済カードは、PQC署名を300ミリ秒以内に処理するだけのメモリと処理能力を持っていないのだ。タッチ決済の時間内に計算が終わらない可能性があるぞ
        emotion: surprised
      - ponchan: そしてシンガポール金融管理局やフランス銀行は、CBDCの設計段階から量子耐性を組み込む実験を進めているの。シンガポールは量子安全な金融セクターの実現に向けて3億シンガポールドルを量子研究に配分しているんだよ。先を見越した国は着々と動いているの
        emotion: normal
        show:
          type: rich-panel
          icon: 🏛️
          title: 各国中央銀行の対応
          body: |-
            シンガポールとフランスが共同でPQCアルゴリズムを用いた暗号通信実験に成功。
            CBDC設計に量子耐性を最初から組み込む動きが加速中。
          emphasis: CBDCに量子耐性を標準装備
          points:
            - 'MAS: 3億Sドルを量子研究に配分'
            - '2024年11月: MAS-BdF間のPQC通信成功'
            - 'Project Leap Phase2: TARGET2での実証完了'
          color: '#1565C0'
      - maro: 量子コンピューターの脅威に備えるために、暗号の入れ替えという世界規模のインフラ更新が必要ってことなのだ。これは投資テーマとしても巨大な話になりそうだぞ
        emotion: thinking
  - type: analysis
    topic: 投資マネーの流れ
    lines:
      - ponchan: では実際に投資マネーがどう動いているか見ていくよ。2025年の最初の9か月間だけで、量子スタートアップへのVC投資額は37.7億ドルに達して、前年の13億ドルから約3倍に急増しているの。この伸び方は異常なペースなんだよ
        emotion: serious
        show:
          type: chart
          key: vcFunding
