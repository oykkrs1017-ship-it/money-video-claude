chapters:
  - type: hook
    topic: "純資産逆転の衝撃"
    lines:
      - ponchan: "11兆3,052億円——2026年2月27日、eMAXIS Slim 全世界株式、つまりオルカンが長年No.1だったS&P500を初めて純資産で上回り、国内公募投信の頂点に立ったんだよ。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "11兆3,052億円"
          label: "オルカン純資産（2026年4月末・国内公募投信No.1）"
      - maro: "えっ、オルカンがS&P500より大きくなったのだ！？ずっとS&P500の方が人気だと思ってたのだぞ、これってつまり投資家の流れが完全に変わったってことなのだ？"
        emotion: surprised
      - ponchan: "実はこれ、単なる人気投票の話じゃないんだよ。この逆転の裏に、2026年の世界経済の構造変化が全部詰まっていて、今NISAでどちらを積み立てているかによってあなたの老後資金に大きな差が出てくる話なんだよ。"
        emotion: serious
        show:
          type: chart
          key: slide_001_chart
      - maro: "長期ではS&P500が圧倒的に強かったのに、最近はオルカンが2年連続で上回っているのだぞ。これってたまたまなのか、それとも何か構造的な理由があるのだ？"
        emotion: thinking
      - ponchan: "設定来の累計リターンだとS&P500が+319.8%でオルカンの+259.0%を大きく上回っているんだよ。でも直近1年だけ見るとオルカンが+46.4%、S&P500が+45.8%で逆転していて、これが2年連続で続いているというのが今日の核心なんだよ。"
        emotion: serious
        show:
          type: comparison-table
          title: "リターン比較（2026年4月30日基準）"
          columns:
            - { label: "オルカン", winner: false }
            - { label: "S&P500", winner: false }
          rows:
            - { label: "直近1年", values: ["+46.4%★", "+45.8%"] }
            - { label: "直近3年", values: ["+105.4%", "+113.4%★"] }
            - { label: "設定来", values: ["+259.0%", "+319.8%★"] }
          footer: "★は優位な方。短期はオルカン・長期はS&P500が優勢"
      - ponchan: "今日は3つのことをお伝えするよ。①オルカンがS&P500を逆転した5つの構造的理由、②年代別エントリー価格帯と具体的な新NISA配分の見直し方、③万が一暴落が来た時の撤退ラインと損切りプランだよ。最後まで見てもらえれば、明日から使える投資判断ができるようになるよ。"
        emotion: happy
        show:
          type: rich-panel
          title: "今日わかること3選"
          body: "この動画1本で2026年の投資配分の答えが出る。S&P500からオルカンへ資金が流れる構造・具体的な買い場・撤退ラインを完全解説。"
          points:
            - text: "①逆転の構造的理由（5つ）"
              body: "米国消費鈍化・AI製造側恩恵・新興国成長・ドル安・バリュエーション格差の全解説。"
            - text: "②年代別エントリー価格帯と新NISA配分"
              body: "50〜60代・40〜50代・30〜40代それぞれの最適配分と、NISA変更申請の期限を明示。"
            - text: "③撤退ライン・損切りプラン"
              body: "高値から何%下落で追加停止・現金化するか、今日中に決めるべき具体的な数字。"

  - type: explanation
    topic: "逆転の全経緯と5つの理由"
    lines:
      - ponchan: "まず逆転の経緯を時系列で追ってみましょう。2026年1月末でオルカンの純資産は9兆7,267億円、まだ10兆円に届いていなかったんだよ。それが2月9日に初めて10兆円を突破して、2月27日についにS&P500を上回る歴史的な逆転が起きたんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: slide_004_chart
      - maro: "3月末に一度10兆円を割ったんだね。でも4月末には11兆3,052億円まで急拡大してるのだぞ。この回復力はどこから来てるのだ？"
        emotion: thinking
      - ponchan: "3月は米国株市場全体が調整した時期で、一時的に純資産が減ったんだよ。でも新NISAの積立設定をしている人がオルカンを選んでいる割合が高いから、毎月安定的に資金が流入してくるんだよ。5月も5月14日時点で+2,089億円流入していて、流れは止まっていないんだよ。"
        emotion: normal
      - maro: "毎月コツコツ積み立てている人の力が集まってこの規模になったのだぞ。すごいのだ！でも純資産が大きいほうがいいってこと？なぜ逆転が起きたのか、理由を知りたいのだ。"
        emotion: thinking
      - ponchan: "逆転の理由その1は米国消費の構造的な鈍化だよ。Morgan Stanleyの分析によると米国の名目消費成長率は2024年が5.7%、2025年が3.7%、そして2026年予測が2.9%と一本調子で落ちているんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "逆転理由①：米国消費の鈍化"
          body: "S&P500企業は売上の74%が北米依存。米国消費が鈍れば業績に直撃する一方、オルカンは北米依存が約30%に過ぎず新興国35%超・欧州20%と分散されている。"
          points:
            - text: "米国名目消費成長率の低下"
              value: "2.9%"
              unit: "2026年予測（2024年5.7%から急落）"
              body: "2年間で消費成長率が半分近くになる見通し。S&P500企業の売上に直結する最重要指標。"
              source: "Morgan Stanley Consumer Outlook 2026"
            - text: "S&P500企業の北米依存度"
              value: "74%"
              unit: "北米からの売上比率"
              body: "オルカンの北米依存は約30%にとどまり、新興国・欧州分散でS&P500より消費鈍化の影響を受けにくい。"
              source: "FactSet S&P500 Revenue Exposure 2025"
      - maro: "S&P500って意外とアメリカ一本足打法なんだね。アメリカの消費が減れば企業業績も悪くなって、株価も上がりにくくなるってことなのだ。オルカンが地理的に分散している意味がここで効いてくるのだぞ。"
        emotion: surprised
      - ponchan: "逆転理由その2は、AIサプライチェーンの恩恵が非米国企業に広がっていることだよ。AIブームで最注目のNVIDIAはS&P500に含まれるけど、実際にAI半導体を製造しているTSMCは台湾、メモリのSKハイニックスとサムスンは韓国、製造装置の東京エレクトロンとアドバンテストは日本の会社でS&P500には入っていないんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "逆転理由②：AIの恩恵は非米国企業"
          body: "AIブームの設計側はNVIDIA（S&P500）が担うが、製造・部材・装置の主役は非米国企業。オルカンはこれら全企業を自動的に含む。"
          points:
            - text: "AI製造側の主役（S&P500には含まれない）"
              body: "TSMC（台湾）・SKハイニックス（韓国）・東京エレクトロン（日本）・アドバンテスト（日本）はオルカンのみに含まれる。"
              source: "各社IR・MSCI ACWI構成銘柄 2026年2月"
            - text: "オルカン構成上位10ヵ国（2026年2月27日）"
              body: "米国60.9%、日本5.3%、英国3.4%、カナダ3.1%、台湾2.6%。非米国だけで全体の約39%を占める。"
              source: "三菱UFJアセットマネジメント 月次レポート 2026年2月"
      - maro: "NVIDIAだけ見てたらAIバブルのうまみを全部取れてると思ってたけど、チップを実際に作っているTSMCや装置の東京エレクトロンにも巨大な利益が流れているのだぞ。オルカンならそこも自動で持てるんだね。"
        emotion: surprised
      - ponchan: "残りの3つの理由も一気に解説するよ。IMF予測では2026年の新興国成長率が+4.0%に対して先進国は+1.6%で差が2.4ポイント開いている。さらにドル安トレンドが2025年から継続していて、歴史的にドルが弱い局面では非米国株が有利になるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "逆転理由③〜⑤：新興国・ドル安・バリュエーション"
          body: "マクロ環境の3要因が重なりオルカン優位の構造が固まっている。特にバリュエーション格差は歴史的水準。"
          points:
            - text: "新興国 vs 先進国 成長率格差"
              value: "+4.0%"
              unit: "2026年新興国成長率（IMF予測）"
              body: "先進国+1.6%との差は2.4ポイント。新興国株がオルカンの35%超を占めるため成長格差がリターンに直結。"
              source: "IMF World Economic Outlook April 2026"
            - text: "バリュエーション格差（最重要）"
              value: "25.7倍"
              unit: "S&P500予想PER（歴史平均18倍の43%超過）"
              body: "新興国株の予想PERは13.2倍で2027年にはさらに11.7倍へ割安化見通し。オルカンはこの割安成長を自動取込みできる。"
              source: "FactSet Earnings Insight / IMF 2026"
      - maro: "PER25.7倍って歴史平均の18倍を43%も上回っているのだぞ！それだけ将来への期待が株価に先食いされているなら、これ以上大きく上がるのは難しいんじゃないのだ？"
        emotion: thinking
      - ponchan: "コスト面も見ておこう。2026年の最新データでは信託報酬がオルカン0.05775%に対してS&P500が0.0814%で、実質コストもオルカン0.08%対S&P500の0.10%とオルカンが安い。さらに2026年3月からS&P500がレンディングつまり貸株を開始したんだよ。収益になる可能性もあるけど、コスト予測が難しくなるリスクが新たに生まれたんだよ。"
        emotion: normal
        show:
          type: comparison-table
          title: "コスト比較2026年最新版"
          columns:
            - { label: "オルカン", winner: true }
            - { label: "S&P500", winner: false }
          rows:
            - { label: "信託報酬", values: ["0.05775%★", "0.0814%"] }
            - { label: "実質コスト", values: ["0.08%★", "0.10%"] }
            - { label: "構成銘柄数", values: ["2,480銘柄★", "503銘柄"] }
            - { label: "米国比率", values: ["62.8%", "約100%"] }
            - { label: "レンディング", values: ["なし★", "2026年3月〜開始"] }
          footer: "コスト・分散・透明性の全てでオルカンが現時点優位"
      - maro: "レンディングって貸した株がちゃんと返ってくるのか心配だぞ。それに信託報酬がS&P500より安いのにオルカンの方が分散も利いているなら、コスト面では圧倒的にオルカン有利なのだ。"
        emotion: thinking
      - ponchan: "2025年の年間リターンも見てほしいんだよ。1位が新興国株+32.5%、2位が日経平均+30.3%、3位がオルカン+21.45%、4位がNASDAQ100+18.9%、そして5位がS&P500+16.5%なんだよ。S&P500が主要指数の中で最下位というのは、過去10年でほぼあり得なかったことで、構造変化のシグナルと見ていいんだよ。"
        emotion: serious
        show:
          type: chart
          key: slide_009_chart
      - maro: "S&P500が主要指数でリターン最下位なんて信じられないのだぞ。しかも16%以上あるからひどい成績というわけじゃないけど、新興国株が+32%とは明らかに雰囲気が変わってきてるのだ！"
        emotion: surprised

  - type: analysis
    topic: "バリュエーション診断と投資判断"
    lines:
      - ponchan: "ここからが今日の核心だよ。現在のバリュエーションを見ると、S&P500の予想PERが約25.7倍で歴史的平均の18倍を43%も上回っている。一方で新興国株の予想PERは13.2倍で、2027年にはさらに11.7倍へ割安化する予測まで出ているんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          title: "2026年バリュエーション診断"
          body: "S&P500のPERは歴史的割高ゾーン。新興国株は割安が加速する見通し。オルカンはこの割安部分を35%超含んでいる。"
          points:
            - text: "S&P500予想PER（割高警戒）"
              value: "25.7倍"
              unit: "歴史的平均18倍の43%超過"
              body: "2000年ITバブル崩壊前のPERが約29倍。現在はその手前の水準。高PERは将来リターンの逆風になる歴史的パターンがある。"
              source: "FactSet Earnings Insight May 2026"
            - text: "新興国株予想PER（割安成長）"
              value: "13.2倍"
              unit: "2026年予想（2027年は11.7倍予測）"
              body: "歴史平均18倍に対して約27%割安。成長率+4%と組み合わさると期待リターンが高くなる構造。"
              source: "IMF / MSCI Emerging Markets Valuation 2026"
      - maro: "PERが高いってことは将来の利益成長まで先払いで株価が買われているってことだよね。だから期待通りにならなければ下落リスクが大きいのだぞ。S&P500はかなりチキンレースな状態なのだ。"
        emotion: thinking
      - ponchan: "専門家の2026年末S&P500目標株価も見ておこう。三井住友DSと野村証券が7,200pt、マネックスが7,700pt、楽天証券が8,000pt、市場平均は7,464ptで約+7.7%という予想なんだよ。2023年+26%・2024年+25%と続いた後だから、これは明らかな鈍化見通しなんだよ。"
        emotion: normal
        show:
          type: chart
          key: slide_011_chart
      - maro: "去年まで毎年+25%が続いていたのに、今年は平均でも+7.7%予想か。それでも悪くはないけど、あの勢いが続くと思って全資産をS&P500に入れた人はちょっと期待値を修正した方がいいのだぞ。"
        emotion: thinking
      - ponchan: "じゃあ具体的な投資判断の話をするよ。積立投資なら基準価額を気にせず毎月定額で継続するのが原則なんだよ。一括で追加投資を考えている場合は年代別でこう考えてほしいんだよ。50〜60代の安定重視ならオルカン100%で基準価額35,000円以下が打診買いの好機。40〜50代はオルカン70%にFANG+かゴールドを30%混ぜる配分が標準なんだよ。"
        emotion: normal
        show:
          type: flow-chart
          title: "年代別・投資スタンス別の配分判断"
          root:
            label: "どのスタンスで投資するか"
            sublabel: "年代と目的で最適解が変わる"
            icon: "👤"
            children:
              - label: "50〜60代 安定重視"
                sublabel: "老後資金保全が最優先"
                highlight: true
                detail:
                  title: "オルカン100%"
                  items: ["基準価額35,000円以下で打診買い", "高値から20%下落で一括追加停止", "30%下落時に老後資金一部を現金化"]
                  color: "#0057B7"
              - label: "40〜50代 標準配分"
                detail:
                  title: "オルカン70%＋FANG+orゴールド30%"
                  items: ["積立はオルカン中心で継続", "ゴールドでインフレヘッジ追加"]
              - label: "30〜40代 積極型"
                detail:
                  title: "S&P500 50%＋FANG+ 30%＋日本株20%"
                  items: ["S&P500は6,800pt以下で買い増し", "時間軸が長いので下落を活かす"]
          footer: "NISA積立変更は年内申請で翌年から反映"
      - maro: "50代以上はオルカン100%でいいのだぞ！老後が近いほど分散を効かせつつ低コストのオルカンに集中するのが合理的なんだね。30代は時間があるからS&P500も半分持つ選択肢があるということなのだ。"
        emotion: happy
