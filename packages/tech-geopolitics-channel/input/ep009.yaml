chapters:
  - type: hook
    topic: "オルカン一本槍の盲点"
    lines:
      - ponchan: "新NISAの投信買付ランキング、上位の約52%がたった1本の投資信託、eMAXIS Slim全世界株式オルカンに集中しているんだよ"
        emotion: serious
        show:
          type: stat
          value: "52%"
          label: "新NISA投信買付のオルカン集中率"
      - maro: "え、52%ってことは新NISAで投信を買ってる人の半分以上がオルカン1本に賭けてるってことなのだ？それはさすがに偏りすぎだぞ"
        emotion: surprised
        show:
          type: rich-panel
          icon: "📊"
          title: "新NISA投信の実態"
          body: "2024年の主要ネット証券データによると、新NISA口座での投信買付額の過半がオルカンに集中。分散投資のつもりが実質的に米国株6割依存になっている。"
          points:
            - "オルカンの米国株比率は約62%"
            - "日本株比率はわずか5.5%"
            - "新興国・欧州の比率も限定的"
      - ponchan: "そう、そして問題の核心はここなの。オルカンの中身を開けてみると、日本株の比率はたったの5.5%しか入っていないんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "🔍"
          title: "オルカンの国別比率"
          body: "MSCI ACWIの構成比率において日本は約5.5%。これは時価総額加重平均の結果であり、日本の産業競争力を正確に反映しているとは言い難い。"
          points:
            - "米国62%、日本5.5%、英国3.5%"
            - "時価総額加重は過去の結果に偏る"
            - "将来の成長ポテンシャルを織り込まない"
      - maro: "5.5%しか入ってないのか。でもそれって世界の時価総額に比例してるんだから、合理的な配分じゃないのだ？何が問題なんだぞ"
        emotion: thinking
      - ponchan: "普通はそう思うよね。でも構造が違うんだよ。いま世界の半導体サプライチェーンで、日本企業が握っている工程のシェアを見たら考えが変わるはずなの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🏭"
          title: "日本の半導体支配力"
          body: "半導体の製造工程には数百の素材・装置が必要。その中で日本企業が世界シェア50%超を握る領域が複数存在する。これは時価総額には反映されていない構造的優位性。"
          points:
            - "シリコンウェハー：世界シェア55%"
            - "フォトレジスト：世界シェア72%"
            - "精密研削装置：世界シェア80%"
      - maro: "80%！？1つの国が8割を握ってるって、もはや独占に近い数字なのだ。これは確かにオルカンの5.5%じゃ全然足りない気がしてきたぞ"
        emotion: surprised
      - ponchan: "しかも、この話はテレビや一般的な投資メディアではほとんど報じられていないの。なぜなら個別銘柄の話になると利益相反の問題が出るからなんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "📺"
          title: "メディアが報じない理由"
          body: "大手メディアは特定銘柄の推奨が困難。また投信販売手数料の観点からオルカン推奨が合理的なため、日本個別株の構造的優位性は語られにくい。"
          points:
            - "銘柄推奨はコンプライアンスリスク"
            - "投信販売は手数料収入に直結"
            - "結果としてオルカン一択が常識化"
      - maro: "なるほど、つまりオルカンを勧めておけばメディアも証券会社も安全ってことなのだ。でも投資家にとってベストかは別問題だぞ"
        emotion: thinking
      - ponchan: "その通り。今日はこのチャンネルでしか聞けない話をするよ。米中半導体戦争の構造的勝者として、新NISAに絶対に組み込むべき日本株の正体を完全解説するの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🎯"
          title: "今日のテーマ"
          body: "オルカン一本槍では拾えない、日本半導体関連株の構造的優位性を解説。エントリー価格帯・上昇トリガー・撤退ラインまで具体的に踏み込む。"
          points:
            - "なぜ日本株が構造的勝者なのか"
            - "具体的にどの銘柄をいくらで買うか"
            - "どうなったら撤退するか"
      - maro: "おお、それはまさに自分が知りたかった話なのだ。オルカンだけで本当にいいのか、ずっとモヤモヤしてたから早く聞きたいぞ"
        emotion: happy
      - ponchan: "こういう投資の本質に踏み込んだ話は、このチャンネルの得意分野だよ。まだ登録してない人は、今のうちにチャンネル登録を忘れずにね"
        emotion: happy
        show:
          type: rich-panel
          icon: "🔔"
          title: "チャンネル登録のお願い"
          body: "地政学×投資の深掘り解説を毎週配信中。アルゴリズムに乗っている今がチャンスです。"
          points:
            - "登録で新着通知が届く"
            - "投資判断に使える情報を毎週更新"
  - type: explanation
    topic: "日本半導体の構造的優位"
    lines:
      - ponchan: "この謎を解くには、2019年まで遡る必要があるんだよ。2019年7月、日本政府は韓国向けにフッ化水素など半導体材料3品目の輸出管理を強化したの"
        emotion: serious
        show:
          type: timeline
          title: "日本の半導体支配が可視化された歴史"
          events:
            - { year: "2019年7月", label: "日本が韓国向け半導体材料の輸出管理強化", highlight: true }
            - { year: "2020年", label: "米国がHuaweiへの半導体供給を全面禁止", highlight: false }
            - { year: "2022年10月", label: "米国が対中半導体輸出規制を大幅強化", highlight: true }
            - { year: "2023年7月", label: "日本が半導体製造装置23品目の輸出規制開始", highlight: true }
            - { year: "2025年", label: "米中デカップリングが加速、日本企業の重要性がさらに増大", highlight: false }
      - maro: "ああ、あの日韓関係が悪化した時の話なのだ。あの時サムスンとかSKハイニックスが大騒ぎしてたけど、あれが半導体と関係あるんだぞ？"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🇯🇵"
          title: "2019年輸出管理強化の衝撃"
          body: "日本がフッ化水素・フッ化ポリイミド・レジストの3品目で輸出管理を強化。韓国の半導体生産に直結する材料だったため、世界中が日本の素材支配力に驚愕した。"
          points:
            - "フッ化水素：半導体洗浄に不可欠"
            - "日本製の純度は99.999%以上"
            - "韓国は代替調達に2年以上を要した"
      - ponchan: "あの事件で世界が初めて気づいたの。半導体って最終製品を作る台湾や韓国が注目されがちだけど、その手前の素材と装置を握っているのは日本だってことにね"
        emotion: serious
        show:
          type: rich-panel
          icon: "⛓️"
          title: "半導体サプライチェーンの上流"
          body: "半導体の製造工程は設計→素材→装置→前工程→後工程と続く。日本企業は素材と装置という上流工程で圧倒的シェアを持ち、これが最終製品メーカーの生命線を握る。"
          points:
            - "設計：米国（Qualcomm, NVIDIA等）"
            - "素材：日本（信越化学, JSR等）"
            - "装置：日本+オランダ（東京エレクトロン, ASML）"
            - "製造：台湾+韓国（TSMC, Samsung）"
      - maro: "つまりTSMCやサムスンがいくら強くても、日本が素材を止めたら半導体は作れないってことなのだ。それってものすごい交渉力じゃないのだぞ"
        emotion: surprised
        show:
          type: rich-panel
          icon: "🔑"
          title: "チョークポイント＝交渉力"
          body: "地政学でいうチョークポイントは、物流の要衝を意味する。半導体サプライチェーンでは日本の素材・装置がまさにチョークポイント。代替が効かないからこそ価格交渉力が強い。"
          points:
            - "代替品の開発には5〜10年必要"
            - "中国は2015年から国産化を試みるも主要素材で失敗"
            - "品質基準が極めて高く新規参入障壁が巨大"
      - ponchan: "まさにその通りで、ここからが今日の核心なんだよ。2022年10月にアメリカが対中半導体輸出規制を大幅に強化したでしょう。あの規制で日本企業の立ち位置が劇的に変わったの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🇺🇸"
          title: "2022年10月 米国の対中規制強化"
          body: "米国商務省が先端半導体・製造装置の対中輸出を包括的に規制。中国は14nm以下のロジック半導体を自力で量産する道を実質的に断たれた。"
          points:
            - "先端GPU（A100等）の対中輸出禁止"
            - "米国人の中国半導体企業での就労も制限"
            - "同盟国にも同調を要請（日本・オランダ）"
            - "2023年に日本が23品目で追随規制"
      - maro: "あの時の規制って、中国がAI開発で使う最先端チップを買えなくしたやつだぞ。でもなんでそれで日本企業の立ち位置が変わるのだ？"
        emotion: thinking
      - ponchan: "いい質問だね。答えから言うと、米中デカップリングが進むほど、両陣営とも日本の素材と装置なしでは半導体を作れないからなんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "🌐"
          title: "両陣営が日本に依存する構造"
          body: "米国陣営はTSMC・Intel・Samsungが最先端を競うが、いずれも日本製素材・装置が必須。中国陣営もレガシー半導体の量産で日本製装置（中古含む）に依存している。"
          points:
            - "米国側：TSMC熊本工場にも日本製装置が大量導入"
            - "中国側：SMIC等がレガシー半導体量産に日本製中古装置を調達"
            - "結果として日本企業は両陣営から需要を受ける"
      - maro: "なるほど、米中が分断すればするほど、両方に売れる日本が漁夫の利を得るってことなのだ。これは確かにオルカンの5.5%じゃ全然足りないぞ"
        emotion: surprised
        show:
          type: chart
          key: "japanShare"
      - ponchan: "このグラフを見てほしいの。日本企業の半導体関連世界シェアを分野別にまとめたものだよ。シリコンウェハーで55%、フォトレジストで72%、精密研削装置で80%、EUVマスクブランクスに至っては82%なんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "📈"
          title: "日本企業の圧倒的世界シェア"
          body: "半導体製造の要所を日本企業が軒並み50%超のシェアで支配。特にEUVリソグラフィ関連の素材ではHOYAが82%と事実上の独占状態にある。"
          points:
            - "信越化学+SUMCO：ウェハー世界シェア55%"
            - "JSR+東京応化：フォトレジスト72%"
            - "ディスコ：精密研削80%"
            - "HOYA：EUVマスクブランクス82%"
          color: "#C41E3A"
      - maro: "82%って、もうほぼ独占じゃないのだ！しかもこれ全部、中国がいくらお金を積んでも簡単には代替できない技術ってことだぞ"
        emotion: surprised
      - ponchan: "その通りなの。例えば信越化学のシリコンウェハーは、結晶の欠陥が1立方センチメートルあたり0.1個以下という超高純度が求められるんだよ。この品質を達成するには40年以上の製造ノウハウの蓄積が必要で、お金だけでは絶対に追いつけない領域なの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🔬"
          title: "なぜ代替できないのか"
          body: "半導体素材は原子レベルの精密さが要求される。信越化学のウェハーは欠陥密度0.1個/cm³以下。この品質は数十年の試行錯誤と暗黙知の蓄積によって初めて達成される。"
          points:
            - "結晶成長技術は40年以上の蓄積"
            - "製造条件の微調整は職人的ノウハウ"
            - "中国CSTECは10年投資しても歩留まり改善に苦戦"
            - "お金で買えない技術＝最強の堀（moat）"
          color: "#0057B7"
      - maro: "40年かけて積み上げた技術を、中国がいくら国家予算を投じても追いつけないってことか。これはまさに日本が持つ最強のカードなのだ"
        emotion: thinking
  - type: explanation
    topic: "オルカン一本槍のリスク"
    lines:
      - ponchan: "さて、ここで一度視点を変えて、オルカン一本槍の投資がなぜリスクなのかを数字で示すね。まず新NISAの投信買付の実態を見てほしいの"
        emotion: serious
        show:
          type: chart
          key: "nisaOlcan"
      - maro: "うわ、円グラフで見ると衝撃的だぞ。オルカンが52%、米国株式が23%、合わせると75%が実質的に米国株への集中投資になってるのだ"
        emotion: surprised
        show:
          type: rich-panel
          icon: "⚠️"
          title: "新NISA投信の米国株集中リスク"
          body: "オルカンの米国比率62%と米国株投信23%を合算すると、新NISA投信買付の実質的な米国株エクスポージャーは約70%に達する。分散投資のつもりが集中投資になっている。"
          points:
            - "オルカン内の米国比率：約62%"
            - "米国株投信との合算：約70%が米国依存"
            - "日本株比率はわずか5.5%×52%≒2.9%"
      - ponchan: "ここで重要なのは、この構造だと米国株が下落した時にポートフォリオ全体が大ダメージを受けるってことなの。2022年のS&P500は年間で約19%下落したけど、同じ年に日本の半導体関連株は円安効果もあって相対的に底堅かったんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "📉"
          title: "2022年の教訓"
          body: "2022年はFRBの急激な利上げでS&P500が19%下落。一方で日本の半導体装置メーカーは円安（1ドル150円突破）による輸出利益増で下値が限定的だった。"
          points:
            - "S&P500：-19.4%（2022年通年）"
            - "東京エレクトロン：-15%だが円安で利益は増加"
            - "日本株の分散効果が発揮されたケース"
            - "通貨分散の重要性を示す実例"
      - maro: "確かに、全部をオルカンに入れてると円安の恩恵を直接受けられないのだ。日本に住んでて円で生活してるのに、日本株を持たないのは逆にリスクかもしれないぞ"
        emotion: thinking
        show:
          type: rich-panel
          icon: "💴"
          title: "円安ヘッジとしての日本株"
          body: "円安は日本の輸出企業の利益を押し上げる。新NISAで外貨建て資産ばかり持つと、円高に振れた時に円建てリターンが大幅に減少するリスクがある。日本株は自然な通貨ヘッジになる。"
          points:
            - "1円の円安で東京エレクトロンは営業利益+40億円"
            - "信越化学は海外売上比率80%超"
            - "円安局面では日本半導体株が最大の受益者"
      - ponchan: "しかも過去5年のリターンを比較すると、衝撃的な事実が見えてくるんだよ。オルカンの円建てリターンが約142%だったのに対して、日経半導体指数は198%、東京エレクトロン単体は215%、ディスコに至っては287%なの"
        emotion: serious
        show:
          type: chart
          key: "olcanJapanReturn"
      - maro: "287%！？ディスコって半導体を切る機械を作ってる会社だよな。オルカンの2倍以上のリターンを叩き出してるのだ。これは知らなかったぞ"
        emotion: surprised
        show:
          type: rich-panel
