chapters:
  - type: hook
    topic: "水深6000mの宝の山"
    lines:
      - ponchan: "まろくん、日本の近くに世界を変えるお宝が眠ってるって知ってる？"
        emotion: happy
      - maro: "お宝？海賊の金貨とかなのだ？"
        emotion: thinking
      - ponchan: "ふふ、もっとすごいの！南鳥島の沖合、水深6000メートルの海底にレアアースの泥が大量に眠ってるんだよ！"
        emotion: surprised
        show: { type: keyword, text: "南鳥島レアアース泥" }
      - maro: "レアアース…スマホとかEVに使われる超重要な資源なのだ"
        emotion: thinking
      - ponchan: "そう！その埋蔵量がとんでもないの。日本の消費量の数百年分とも言われてるんだよ"
        emotion: surprised
        show: { type: stat, value: "数百年分", label: "日本のレアアース消費量換算" }
      - maro: "数百年分！？それが本当なら日本は資源大国になれるのだ！"
        emotion: surprised
      - ponchan: "ところがね、この宝の山に中国が黙ってないの。2024年から中国空母が南鳥島周辺のEEZに何度も進入してるんだよ"
        emotion: serious
      - maro: "中国空母がわざわざ太平洋側まで来るのだ？それは穏やかじゃないぞ"
        emotion: serious
        show: { type: highlight, text: "中国空母が南鳥島周辺EEZに進入\n日本の資源開発を牽制か" }
      - ponchan: "今日は南鳥島レアアース泥の採掘成功と中国の妨害行動、そして投資家が注目すべきポイントを解説していくよ！"
        emotion: happy

  - type: explanation
    topic: "レアアースと中国支配"
    lines:
      - ponchan: "まずレアアースがなぜ重要かを説明するね。レアアースは17種類の元素の総称で、ハイテク産業に欠かせない素材なの"
        emotion: normal
      - maro: "具体的にはどんなものに使われるのだ？"
        emotion: thinking
      - ponchan: "EVモーターの永久磁石にはネオジムとジスプロシウム、風力発電のタービンにも同じ素材が使われるよ。スマホのスピーカーや防衛装備のミサイル誘導にも必須なの"
        emotion: normal
        show: { type: highlight, text: "レアアースの用途\nEV・風力発電・スマホ・防衛装備" }
      - maro: "つまり現代社会のインフラを支える縁の下の力持ちなのだ"
        emotion: thinking
      - ponchan: "その通り！で、問題はこのレアアースの生産を中国が圧倒的に支配してること"
        emotion: serious
        show: { type: chart, key: "rareEarthShare" }
      - maro: "68%！世界の7割近くを中国が握ってるのだ…これは怖いぞ"
        emotion: surprised
      - ponchan: "しかも精錬・加工まで含めると中国のシェアは約90%に達するの。つまり採掘だけじゃなくて加工でも完全に依存してるんだよ"
        emotion: serious
        show: { type: stat, value: "約90%", label: "中国のレアアース精錬シェア" }
      - maro: "原料から製品までほぼ中国頼みなのだ。これは2010年の尖閣問題の時にも問題になったのだ"
        emotion: thinking
      - ponchan: "よく覚えてるね！2010年に中国がレアアース輸出を事実上止めて、日本の製造業はパニックになったの。あの時ネオジムの価格は10倍以上に跳ね上がったんだよ"
        emotion: serious
        show: { type: chart, key: "chinaExportControl" }
      - maro: "そのグラフを見ると最近また規制が強まってるのだ"
        emotion: serious
      - ponchan: "2023年にはガリウムとゲルマニウムの輸出規制、2024年にはさらに範囲を広げたの。米中対立が深まるたびに中国は資源を武器にしてくるんだよ"
        emotion: serious

  - type: explanation
    topic: "南鳥島の採掘成功"
    lines:
      - ponchan: "そこで注目されてるのが南鳥島のレアアース泥なの！東京大学の加藤泰浩教授のチームが2012年に発見して、ずっと研究が続いてたんだよ"
        emotion: happy
        show: { type: timeline, title: "南鳥島レアアース開発の歩み", events: [{ year: "2012年", label: "東大チームが高濃度レアアース泥を発見", highlight: true }, { year: "2013年", label: "JAMSTECが詳細調査開始", highlight: false }, { year: "2022年", label: "揚泥パイロット試験に成功", highlight: true }, { year: "2024年", label: "世界初の水深6000m揚泥成功", highlight: true }, { year: "2025年〜", label: "商業化に向けた実証段階", highlight: false }] }
      - maro: "2024年に水深6000メートルからの揚泥に成功したのだ？すごい技術なのだ！"
        emotion: surprised
      - ponchan: "そうなの！6000メートルって富士山を1.6個分積み上げた深さだよ。そこから泥を吸い上げる技術を日本が世界で初めて実証したの"
        emotion: happy
        show: { type: stat, value: "6,000m", label: "採掘深度（富士山約1.6個分）" }
      - maro: "で、どれくらいのレアアースが眠ってるのだ？"
        emotion: thinking
      - ponchan: "推定埋蔵量はこんな感じだよ。特にジスプロシウムやテルビウムといった重レアアースが豊富なのが大きいの"
        emotion: normal
        show: { type: chart, key: "minamitorishimaReserve" }
      - maro: "重レアアースは中国依存度が特に高いものなのだ。これが自前で取れるなら革命的だぞ"
        emotion: surprised
      - ponchan: "まさにその通り！ただし課題もあるの。水深6000メートルの商業採掘はまだ世界中どこもやったことがなくて、コストと技術のハードルが高いんだよ"
        emotion: thinking
      - maro: "つまり技術は証明されたけど、ビジネスとして成り立つかはこれからなのだ"
        emotion: thinking
        show: { type: highlight, text: "技術実証は成功\n商業化のコスト削減が次の課題" }

  - type: analysis
    topic: "中国空母の妨害行動"
    lines:
      - ponchan: "ここからが地政学的にヤバい話なの。2024年以降、中国海軍の空母「遼寧」や「山東」が太平洋側に展開して、南鳥島周辺のEEZに入ってきてるんだよ"
        emotion: serious
      - maro: "EEZへの進入自体は国際法上は違法ではないのだ。でも意図が問題だぞ"
        emotion: thinking
        show: { type: highlight, text: "EEZ進入は国際法上は合法\nしかし軍事的プレゼンスで開発を牽制" }
      - ponchan: "そう、中国の狙いは明確で、日本の資源開発を心理的に牽制することなの。採掘船や調査船の近くを軍艦が通過するだけで、民間企業はリスクを感じるでしょ？"
        emotion: serious
      - maro: "グレーゾーンの戦略なのだ。直接攻撃はしないけどプレッシャーをかけるのだ"
        emotion: serious
      - ponchan: "これに対して日本政府は防衛費を大幅に増やしてるの"
        emotion: normal
        show: { type: chart, key: "defensebudget" }
      - maro: "2020年の5.3兆円から2025年には8.7兆円！すごい増え方なのだ"
        emotion: surprised
      - ponchan: "特に海上自衛隊の哨戒能力や島嶼防衛が強化されてて、南鳥島を含む太平洋側の警戒態勢も厚くなってるんだよ"
        emotion: normal
        show: { type: stat, value: "8.7兆円", label: "2025年度防衛費" }

  - type: analysis
    topic: "投資家が注目すべき銘柄"
    lines:
      - ponchan: "じゃあ投資家目線で見てみよう！南鳥島レアアース開発が進めば恩恵を受ける企業群があるの"
        emotion: happy
      - maro: "どんな分野の企業なのだ？"
        emotion: thinking
      - ponchan: "大きく3つ。まず深海採掘技術を持つ企業で、三井海洋開発や鹿島建設、IHIが挙がるよ"
        emotion: normal
        show: { type: highlight, text: "注目セクター①\n深海採掘技術：三井海洋開発・鹿島・IHI" }
      - maro: "海底のインフラを作れる企業なのだ"
        emotion: thinking
      - ponchan: "次にレアアース精錬・加工の国産化を進める企業。住友金属鉱山や信越化学工業は既にレアアースの代替技術や国内精錬の研究を進めてるの"
        emotion: normal
        show: { type: highlight, text: "注目セクター②\n精錬・加工：住友金属鉱山・信越化学" }
      - maro: "脱中国のサプライチェーンを作れる企業は強いのだ"
        emotion: thinking
      - ponchan: "3つ目はレアアースを大量に使うユーザー企業。TDKは永久磁石の世界大手だし、レアアースの安定調達ができれば競争力がさらに上がるよ"
        emotion: normal
        show: { type: highlight, text: "注目セクター③\nユーザー企業：TDK・日本電産" }
      - maro: "レアアース価格の推移も気になるのだ"
        emotion: thinking
        show: { type: chart, key: "rareEarthPrice" }
      - ponchan: "2022年のピークからは下がってるけど、中国が輸出規制を強化するたびに急騰するリスクがあるの。国産レアアースが実現すれば価格変動のヘッジにもなるんだよ"
        emotion: normal

  - type: summary
    topic: "まとめと投資家への示唆"
    lines:
      - ponchan: "今日のまとめだよ！まず南鳥島のレアアース泥は世界を変えるポテンシャルがあること"
        emotion: happy
        show: { type: keyword, text: "南鳥島レアアース泥" }
      - maro: "日本の消費量の数百年分が眠ってるのだ"
        emotion: normal
      - ponchan: "2つ目、中国は世界のレアアース供給の約70%を握ってて、輸出規制を武器にしてくるリスクがあること"
        emotion: serious
      - maro: "2010年の教訓を忘れちゃダメなのだ"
        emotion: serious
      - ponchan: "3つ目、中国空母のEEZ進入は資源開発への牽制であり、日本は防衛と開発の両面で対応が必要なこと"
        emotion: serious
        show: { type: highlight, text: "防衛強化×資源開発\n経済安保の両輪が不可欠" }
      - maro: "グレーゾーン戦略に負けない体制が大事なのだ"
        emotion: thinking
      - ponchan: "そして投資家は深海採掘技術・精錬加工・レアアースユーザーの3セクターに注目してほしいの。商業化にはまだ数年かかるけど、国策テーマとして息の長い投資機会になるよ"
        emotion: happy
        show: { type: stat, value: "3セクター", label: "深海採掘・精錬加工・ユーザー企業" }
      - maro: "国策に売りなし、という格言もあるのだ"
        emotion: normal

  - type: cta
    topic: "次回予告"
    lines:
      - ponchan: "次回は台湾有事シナリオと半導体サプライチェーンへの影響を深掘りするよ！"
        emotion: happy
      - maro: "TSMCの動きも気になるのだ"
        emotion: thinking
      - ponchan: "チャンネル登録と高評価ボタンを押してくれると嬉しいな！通知オンも忘れずにね！"
        emotion: happy
        show: { type: keyword, text: "チャンネル登録＆通知ON" }
      - maro: "また次の動画で会おうなのだ！"
        emotion: happy