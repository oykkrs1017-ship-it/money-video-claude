chapters:
  - type: hook
    topic: "台湾封鎖で消える時価総額"
    lines:
      - ponchan: "180兆円——これは台湾海峡が封鎖された場合に、たった2週間で日本の株式市場から蒸発すると試算されている時価総額なんだよ"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "180兆円"
          label: "台湾封鎖で蒸発する日本株時価総額（2週間）"
      - maro: "180兆円！？それって日本のGDPの3割くらいが吹き飛ぶってことなのだ。想像するだけで恐ろしいぞ"
        emotion: surprised
        show:
          type: rich-panel
          icon: "💥"
          title: "時価総額180兆円の蒸発"
          body: "ブルームバーグの地政学リスクモデルに基づく試算。\n日経平均が一時的に30〜40%下落する想定。"
          emphasis: "180兆円"
          points: ["日本GDP約600兆円の30%相当", "2週間という短期間で発生", "リーマンショック超級の衝撃"]
          color: "#ff4444"
      - ponchan: "でもね、ここからが今日の核心だよ。実はその180兆円の暴落の裏側で、逆に株価が急騰するセクターが3つ存在するんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "🔍"
          title: "暴落の裏の急騰セクター"
          body: "全面安に見える市場でも、資金は消えるのではなく移動する。\n地政学有事では特定セクターに資金が集中する構造がある。"
          emphasis: "3つのセクター"
          points: ["防衛関連株", "エネルギー上流株", "内需ディフェンシブ株"]
          color: "#0057B7"
      - maro: "え、日経平均が30%以上暴落してる最中に上がる株があるってこと？それは本当なのだぞ？にわかには信じられないのだ"
        emotion: surprised
      - ponchan: "信じられないよね。でも歴史が証明しているんだよ。2022年2月のロシアによるウクライナ侵攻後、日経平均は一時10%下落したけど、三菱重工業は12ヶ月で株価が78%も上昇したの"
        emotion: serious
        show:
          type: rich-panel
          icon: "📈"
          title: "ウクライナ侵攻後の三菱重工"
          body: "2022年2月24日のロシア侵攻開始後、防衛関連株は逆行高。\n三菱重工は12ヶ月で+78%という驚異的なリターンを記録。"
          emphasis: "+78%"
          points: ["日経平均は一時-10%", "防衛費増額の思惑", "地政学プレミアムの発生"]
          color: "#00c853"
      - maro: "78%上昇！？日経平均が下がってるのにほぼ2倍近くに化けたのだ。これは知らなかったぞ、完全に盲点だったのだ"
        emotion: surprised
      - ponchan: "しかもこれはウクライナという日本から遠い場所の話なんだよ。台湾海峡は日本のすぐ隣、影響は桁違いに大きくなるの"
        emotion: serious
        show:
          type: image
          src: "content/map_taiwan.png"
          caption: "台湾海峡（約130km）——日本の生命線"
          position: top-center
          width: 1680
          duration: 8
          animation: fade
      - maro: "確かにそうなのだ。台湾海峡って与那国島からたった110キロしか離れていないぞ。日本にとっては他人事じゃないのだ"
        emotion: thinking
      - ponchan: "今日はね、台湾海峡封鎖シナリオで暴落する株と急騰する株、その構造を完全に解剖するよ。テレビでは絶対にこういう具体的な銘柄分析までやってくれないからね"
        emotion: serious
        show:
          type: image
          src: "content/infographic_taiwan_blockade_flow.png"
          caption: "台湾封鎖→市場への連鎖シナリオ"
          position: top-center
          width: 1680
          duration: 8
          animation: fade
      - maro: "確かにテレビの解説って『台湾有事は危険です』で終わるのだ。具体的にどの株を持っていれば資産を守れるのか、そこまで教えてほしいぞ"
        emotion: thinking
      - ponchan: "そうだよね。だからこのチャンネルでは、エントリー価格帯から撤退ラインまで全部出すよ。こういう話はここでしか聞けないから、チャンネル登録を忘れずにね"
        emotion: happy
      - maro: "了解なのだ。それじゃあまず、なんで台湾封鎖で日本株がそこまで暴落するのか、その構造から教えてほしいぞ"
        emotion: thinking

  - type: explanation
    topic: "暴落する株の構造"
    lines:
      - ponchan: "まずは暴落する側の構造から見ていこう。この謎を解くには、日本経済がどれだけ台湾に依存しているかを数字で理解する必要があるんだよ"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          icon: "🏭"
          title: "日本の台湾依存構造"
          body: "半導体・電子部品を中心に、日本のサプライチェーンは台湾に深く依存。\nTSMC1社で世界の先端半導体の約90%を製造している現実。"
          emphasis: "先端半導体の90%"
          points: ["TSMCが先端チップ製造の90%を占有", "日本の半導体輸入の約35%が台湾経由", "自動車1台にチップ約3,000個が必要"]
          color: "#0057B7"
      - maro: "先端半導体の90%がTSMC1社に集中しているのだ！？これが止まったら世界中のスマホも車もAIサーバーも全部アウトなのだ"
        emotion: surprised
      - ponchan: "その通りだよ。2025年の経済産業省のレポートによると、台湾からの半導体供給が完全に止まった場合、日本の製造業の約6割が2ヶ月以内に生産停止に追い込まれるとされているの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🚨"
          title: "製造業6割が停止"
          body: "経産省の2025年サプライチェーン脆弱性報告書に基づく試算。\n自動車・電子機器・産業機械の3分野が特に深刻な影響を受ける。"
          emphasis: "6割が2ヶ月以内に停止"
          points: ["自動車メーカーの在庫は平均4〜6週間分", "電子部品の代替調達に6〜12ヶ月", "産業機械の制御チップは台湾製が主流"]
          color: "#ff4444"
      - maro: "6割が止まるって、日本経済が半分以上麻痺するってことじゃないのだ。それで輸出株が暴落するわけなのだな"
        emotion: serious
      - ponchan: "そうなの。具体的に見ていくと、まず最初に暴落するのが半導体商社なんだよ。レーザーテック、東京エレクトロン、SCREENホールディングスあたりがまず直撃を受けるの"
        emotion: serious
        show:
          type: rich-panel
          icon: "📉"
          title: "直撃①：半導体関連株"
          body: "半導体製造装置メーカーは売上の25〜40%が台湾・中国向け。\n封鎖で注文がキャンセルされ、受注残が一気に蒸発する。"
          emphasis: "売上の25〜40%が消失"
          points: ["東京エレクトロン：台湾向け売上比率約28%", "レーザーテック：EUV検査装置のTSMC依存", "SCREENは洗浄装置で台湾比率35%超"]
          color: "#ff4444"
      - maro: "売上の3〜4割が一気に消えるのだ！？それは株価30%以上の下落でも全然おかしくないのだ"
        emotion: surprised
      - ponchan: "しかも問題はそれだけじゃないの。台湾海峡は年間5兆ドル以上の物資が通過する世界最重要のシーレーンでもあるんだよ。ここが封鎖されると原油タンカーも通れなくなるの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🚢"
          title: "台湾海峡のシーレーン価値"
          body: "世界の海上貿易の約20%が台湾海峡を通過。\n日本・韓国・中国向けの原油タンカーの多くがこの航路を利用している。"
          emphasis: "年間5兆ドル超の物資"
          points: ["世界海上貿易の約20%が通過", "日本向けLNGタンカーの主要航路", "迂回ルートは2〜3週間の遅延が発生"]
          color: "#0057B7"
      - maro: "つまり半導体だけじゃなくて、エネルギーの供給ルートまで寸断されるのだ。二重のダメージが来るってことなのだな"
        emotion: thinking
      - ponchan: "その通り。だから自動車メーカーは特に厳しいんだよ。トヨタやホンダのような輸出依存企業は、部品供給の停止と輸送ルートの混乱というダブルパンチを受けることになるの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🚗"
          title: "直撃②：自動車輸出株"
          body: "自動車は半導体不足で生産停止＋海上輸送混乱で出荷不能。\nさらに円高進行で海外売上の円換算額が縮小するトリプルパンチ。"
          emphasis: "トリプルパンチ"
          points: ["半導体不足で生産ライン停止", "シーレーン混乱で完成車の出荷遅延", "有事の円高で海外売上が目減り"]
          color: "#ff4444"
      - maro: "しかも有事になると円高が進むのだ！？普通は有事でリスクオフだから円が買われるってことなのだな。輸出企業にはさらに逆風なのだ"
        emotion: thinking
      - ponchan: "まろくん鋭いね。2022年のウクライナ侵攻時は例外的に円安が進んだけど、台湾有事は日本が直接的な当事者になりうるから、2011年の東日本大震災型の円高パターンが想定されるの。あの時は1ドル76円まで円高が進んだんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "💴"
          title: "有事の円高リスク"
          body: "日本が当事者となる有事では、海外資産の円転（リパトリエーション）が発生。\n2011年震災時は1ドル76円まで急騰した前例がある。"
          emphasis: "1ドル76円"
          points: ["海外資産の円転で円買い圧力", "保険会社の外貨売り・円買い", "投機筋の円ロングポジション構築"]
          color: "#ff6b35"
      - maro: "1ドル76円！？今の水準から考えたら想像を超える円高なのだ。輸出企業の利益が完全に吹き飛ぶレベルだぞ"
        emotion: surprised
      - ponchan: "そうなの。だからこそ、台湾有事で暴落する株の構造をまとめると、半導体関連はサプライチェーン寸断で30〜40%下落、自動車などの輸出株は円高も加わって25〜30%下落が想定されるんだよ"
        emotion: serious
        show:
          type: chart
          key: "sector_impact_simulation"
      - maro: "このグラフを見ると、セクターによって明暗がはっきり分かれているのだ。マイナスのセクターとプラスのセクターが完全に逆方向を向いているぞ"
        emotion: thinking

  - type: explanation
    topic: "逆に上がる株の構造"
    lines:
      - ponchan: "さあ、ここからが本当の話が始まるよ。暴落の裏側で資金が流れ込む3つのセクター、防衛株・エネルギー上流株・内需ディフェンシブ株を順番に解剖していくね"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: image
          src: "content/infographic_winner_loser_matrix.png"
          caption: "有事の勝ち組 vs 負け組（騰落率シミュレーション）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade
      - maro: "暴落の裏で急騰する株なのだ。まるでシーソーみたいに、片方が下がれば片方が上がるって構造なのだな"
        emotion: thinking
      - ponchan: "まさにそうだよ。まず最初の勝ち組は防衛株なの。これを理解するには2022年12月に日本政府が閣議決定した防衛3文書まで遡る必要があるんだよ"
        emotion: serious
        show:
          type: rich-panel
          icon: "🛡️"
          title: "防衛3文書と5年43兆円"
          body: "2022年12月に閣議決定された国家安全保障戦略・国家防衛戦略・防衛力整備計画。\n2023〜2027年度の5年間で防衛費を計43兆円に増額する方針を明記。"
          emphasis: "5年間で43兆円"
          points: ["GDP比2%への引き上げ目標", "反撃能力（敵基地攻撃能力）の整備", "スタンドオフ防衛能力の強化", "統合防空ミサイル防衛の構築"]
          color: "#0057B7"
      - maro: "5年で43兆円！？それって毎年8兆円以上が防衛産業に流れるってことなのだ。すさまじい金額だぞ"
        emotion: surprised
      - ponchan: "しかもこの43兆円は平時の計画なんだよ。台湾有事が現実化すれば、緊急の補正予算で防衛費がさらに上乗せされるのは確実なの。2026年度の防衛費は当初計画で約8.9兆円だけど、有事なら10兆円を超える可能性があるんだよ"
        emotion: serious
        show:
          type: chart
          key: "defense_budget_growth"
      - maro: "このグラフ、毎年1兆円規模で防衛費が積み上がっているのだ。しかも有事なら10兆円超えってことは、防衛企業にとっては受注が爆発的に増えるってことなのだな"
        emotion: thinking
      - ponchan: "そうなの。しかもここが重要なポイントなんだけど、2022年のウクライナ侵攻という歴史的類似事例があるんだよ。あの時、ドイツは一夜にして防衛費を1000億ユーロ増額する特別基金を設立したの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🇩🇪"
          title: "歴史的類似：ドイツの転換"
          body: "2022年2月27日、ショルツ首相がZeitenwende（時代の転換）を宣言。\n1000億ユーロ（約16兆円）の特別防衛基金を即座に設立した。"
          emphasis: "一夜で1000億ユーロ"
          points: ["冷戦後最大の防衛費増額", "ラインメタル株は1年で+120%", "欧州防衛ETFも過去最高値更新", "日本も同じパターンを辿る可能性"]
          color: "#0057B7"
      - maro: "ドイツのラインメタルが1年で120%も上がったのだ！？それが日本の三菱重工や川崎重工で再現される可能性があるってことなのだな"
        emotion: surprised
      - ponchan: "次に2番目の勝ち組、エネルギー上流株を見ていくよ。台湾海峡が封鎖されると原油価格がどうなるか、これがポイントなの"
        emotion: serious
        show:
          type: rich-panel
          icon: "🛢️"
          title: "勝ち組②：エネルギー上流株"
