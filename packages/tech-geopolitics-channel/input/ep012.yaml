chapters:
  - type: hook
    topic: "日本半導体装置の漁夫の利"
    lines:
      - ponchan: "5兆2000億円——これが2025年に中国が半導体設備に注ぎ込んだ投資額で、しかもその多くが規制の網をかいくぐって日本の装置メーカーに流れ込んでいるんだよ。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "5兆2000億円"
          label: "2025年・中国の半導体設備投資額（推計）"

      - maro: "え、5兆2000億円！？米中で半導体戦争が激しくなってるのに、中国がそんなに投資してるのだ？しかも日本に流れてくるって、どういうことなのだぞ！？"
        emotion: surprised
        show:
          type: rich-panel
          icon: "🤯"
          title: "逆説の構図"
          body: "米国が輸出規制を強化すればするほど、中国は国産化を急ぐために設備投資を拡大する。その恩恵が、規制の「すき間」に位置する日本の半導体装置メーカーに集中するという逆説が起きている。"
          emphasis: "規制強化→中国投資増→日本が漁夫の利"
          points:
            - "中国の半導体設備投資は2022年比で約86%増加"
            - "規制対象外の「成熟プロセス向け」装置で日本勢が独占"
            - "東京エレクトロン・ディスコ・東京応化が受注急増中"

      - ponchan: "そうなんだよ。アメリカが規制を強化すればするほど、中国は半導体の自国生産を急がざるを得なくて、装置の調達先として日本企業に注文が殺到するという逆説的な構図が生まれているんだよ。"
        emotion: serious
        show:
          type: image
          src: "content/map_usachina.png"
          caption: "米中半導体対立の地政学マップ"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "テレビのニュースだと「日本も規制に参加した」って報道だけで終わってたのだ。でも規制に参加した日本企業が逆に儲かるなんて、そんな話は一切やってなかったのだぞ！"
        emotion: surprised
        show:
          type: rich-panel
          icon: "📺"
          title: "テレビが報じない真実"
          body: "日本が2023年に対中半導体装置輸出規制に参加したことは広く報じられた。しかし、規制対象外の成熟世代装置（28nm以上）での受注増という「漁夫の利」シナリオは、ほとんどのメディアが触れていない。"
          emphasis: "このチャンネルでしか聞けない話"
          points:
            - "規制対象：EUV・最先端DUV（14nm以下の最先端品）"
            - "規制外：28nm以上の成熟世代向け装置（需要爆発中）"
            - "東京エレクトロンの中国売上比率は2024年度で約26%"

      - ponchan: "こういう話はテレビでは絶対にやってくれないよね。今日はこの動画を最後まで見ることで、東京エレクトロン・東京応化・レーザーテック・ディスコの具体的な買い場と目標株価まで全部わかるようにするから、チャンネル登録を忘れずにしてほしいんだよ。"
        emotion: happy
        show:
          type: rich-panel
          icon: "🎯"
          title: "今日わかること"
          body: "米中半導体規制の最新動向を踏まえ、日本の半導体装置メーカーが「漁夫の利」を得る構造を解説。さらに個別銘柄ごとのエントリー価格帯・上昇トリガー・撤退シナリオを具体的に提示する。"
          emphasis: "エントリー価格・目標株価・撤退ラインまで完全解説"
          points:
            - "米中規制の最新動向（2025年〜2026年）"
            - "なぜ日本の装置メーカーが漁夫の利を得るのか"
            - "東京エレクトロン・東京応化・レーザーテックの買い場"
            - "リスクシナリオと撤退ライン"

      - maro: "日本の半導体装置メーカーって、そんなに規制の恩恵を受けてるのか。でもちょっと待って、規制に参加しながら中国から注文が来るって、矛盾してないのだぞ？その仕組みをちゃんと教えてほしいのだ！"
        emotion: thinking
        show:
          type: rich-panel
          icon: "❓"
          title: "矛盾に見える構造の正体"
          body: "日本の輸出規制は「最先端プロセス向け23品目」に限定されており、28nm以上の成熟プロセス向け装置は規制対象外。中国の半導体投資の70%超は成熟プロセス向けと推計されており、むしろ規制後に日本装置の中国向け需要が拡大した。"
          emphasis: "規制対象外の成熟プロセスで需要爆発"
          points:
            - "規制対象：ArFi液浸露光装置など23品目"
            - "規制外：成熟世代のコーター・デベロッパー・ダイサー等"
            - "中国の設備投資の約70%超が成熟プロセス向け（SEMI推計）"

  - type: explanation
    topic: "規制強化の仕組みと日本の位置"
    lines:
      - ponchan: "ここからは米中半導体規制の全体像と、日本がその中でどんな立ち位置にいるかを詳しく解説するよ。この謎を解くには2022年10月に遡る必要があるんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: timeline
          title: "米中半導体規制 強化の歴史"
          events:
            - { year: "2022年10月", label: "バイデン政権：対中半導体輸出規制（CHIPS法）発動", highlight: true }
            - { year: "2023年7月", label: "日本・オランダが規制に参加。東京エレクトロンも規制対象品を申告義務化", highlight: false }
            - { year: "2024年10月", label: "規制対象拡大：先端メモリ(HBM)・AI向けチップも追加", highlight: true }
            - { year: "2025年1月", label: "バイデン政権最終規制：130カ国への拡散防止ルール強化", highlight: false }
            - { year: "2025年4月", label: "トランプ政権：追加関税と輸出規制を組み合わせた「デカップリング2.0」", highlight: true }

      - maro: "2022年のCHIPS法から始まって、2025年のトランプ政権まで規制がどんどん強化されてきたのだぞ。でも日本がなぜ2023年に参加したのか、背景が気になるのだ！"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🗓️"
          title: "2023年7月：日本が参加した理由"
          body: "アメリカは同盟国を規制の枠組みに取り込まないと「抜け穴」ができると判断。日本の半導体装置は世界シェア31%を持ち、特にコーター・デベロッパー（東京エレクトロン）やダイシングソー（ディスコ）は代替品がなかった。日本が参加しなければ規制の意味をなさない状況だった。"
          emphasis: "世界シェア31%——日本抜きでは規制が成立しない"
          points:
            - "東京エレクトロン：コーター・デベロッパーで世界首位"
            - "ディスコ：ダイシングソー（ウェーハ切断）で世界シェア90%超"
            - "東京応化：フォトレジストで世界シェア約25%"

      - ponchan: "日本が規制に参加した理由はシンプルで、日本の装置がなければ規制に穴が開くからだよ。ディスコのダイシングソーなんてシェアが90%超えてて、中国がどこにも注文できない状況を作れるんだよ。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_japan_semicon_position.png"
          caption: "半導体製造装置 国別世界シェア（2024年）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "ディスコが世界シェア90%超って、ほぼ独占じゃないのだ！でもさ、規制に参加したなら中国への販売が減って、日本の装置メーカーは売上が落ちるはずじゃないのだぞ？なんで漁夫の利になるのだ？"
        emotion: surprised
        show:
          type: rich-panel
          icon: "🔍"
          title: "「規制参加=売上減少」という誤解"
          body: "日本の規制対象は「特定の先端品23品目」に限定されており、製品ラインナップ全体の規制ではない。成熟プロセス向けの装置・材料は引き続き輸出可能。そして中国はまさにその成熟プロセスに数十兆円規模の投資を集中させている。"
          emphasis: "規制対象は全製品の一部——残りは需要爆発中"
          points:
            - "東京エレクトロン規制品：一部のDUV向け塗布現像装置"
            - "規制外主力品：45nm〜28nm向けコーター・デベロッパー（需要増）"
            - "中国の28nm以上プロセス投資：2025年に約3500億元超（推計）"

      - ponchan: "ここが核心なんだよ。規制のターゲットはあくまで「最先端品」で、スマホの成熟したチップや電気自動車の制御チップ、家電に使われる28nm以上のプロセス向けには何の規制もかかっていないんだよ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "💡"
          title: "成熟プロセスが狙われる理由"
          body: "中国のスマホ・EV・太陽光パネル・家電産業は28nm以上の成熟プロセスで動いている。これらを国産化するために中国は「成熟世代ファブ」を急ピッチで建設中。その装置の主要サプライヤーが日本勢であり、規制強化がかえって国産化を急がせている。"
          emphasis: "EV・スマホ・太陽光——全部成熟プロセスで動く"
          points:
            - "BYDのEV制御チップ：28nm・40nmプロセスが中心"
            - "中国スマホ（SMIC製）：成熟世代で国産化シフト"
            - "太陽光パネルのインバータ：大量の成熟プロセスチップを消費"

      - maro: "つまり、アメリカが最先端チップの輸出を止めたせいで、中国が成熟世代の国産化を猛烈に急いでいて、その装置を作れるのが日本だということなのだ！完全に漁夫の利じゃないのだぞ！"
        emotion: surprised
        show:
          type: rich-panel
          icon: "🎣"
          title: "漁夫の利の構造"
          body: "「漁夫の利」とは、二者が争っているうちに第三者が実利を得ること。米中が半導体覇権を争う中、日本の装置メーカーは成熟プロセス需要という「魚」を確実に獲り続けている。1990年代の日米半導体摩擦でも類似の構図が発生しており、歴史的に見ても日本勢の「すき間戦略」は有効だ。"
          emphasis: "米中の争いが日本装置メーカーに需要を運んでくる"
          points:
            - "米中貿易摩擦が激化するほど中国の国産化投資が拡大"
            - "国産化投資の受け皿が代替不可能な日本の装置"
            - "1990年代の日米摩擦でも日本の材料メーカーが漁夫の利"

      - ponchan: "実はこれ、歴史的に前例があるんだよ。1987年〜1996年の日米半導体摩擦の時代、アメリカが日本製半導体に制裁をかけたけど、その陰で信越化学や住友化学の半導体材料がアメリカのファブ向けに爆売れしたんだよ。今の状況と驚くほど似ているんだよね。"
        emotion: serious
        show:
          type: timeline
          title: "歴史的類似事例：日米半導体摩擦"
          events:
            - { year: "1986年", label: "日米半導体協定：日本製半導体の対米輸出に上限", highlight: true }
            - { year: "1987年", label: "アメリカが日本製品に制裁関税100%を発動", highlight: false }
            - { year: "1991年", label: "信越化学・住友化学の半導体材料がアメリカ向けに急拡大", highlight: true }
            - { year: "1996年", label: "日米摩擦終結。しかし日本の材料シェアは摩擦前より拡大", highlight: false }
            - { year: "2025年", label: "米中摩擦で同じ構図。日本装置メーカーが漁夫の利へ", highlight: true }

      - maro: "1987年の日米半導体摩擦の時代に、信越化学や住友化学がかえってシェアを拡大したのだぞ！今の東京エレクトロンや東京応化がちょうどその立場になっているわけか、これは面白い歴史の繰り返しなのだぞ！"
        emotion: happy
        show:
          type: rich-panel
          icon: "📜"
          title: "歴史は繰り返す"
          body: "1987年の日米半導体摩擦後、信越化学工業のシリコンウェーハシェアは世界1位へ。JSRや東京応化のフォトレジストも米国ファブ向けに拡大した。今回の米中摩擦でも「規制の争いは材料・装置メーカーを儲けさせる」という構図が再現されている。"
          emphasis: "摩擦が激しいほど「すき間産業」が儲かる法則"
          points:
            - "信越化学：日米摩擦後にウェーハ世界首位を確立"
            - "東京応化：摩擦期に米国ファブ向けフォトレジストを拡大"
            - "2025年版：東京エレクトロン・ディスコが同じ立場"

      - ponchan: "さあ、構図が見えてきたよね。次はここからが今日の核心——実際にどの銘柄を、いくらで買って、どこで撤退するかを具体的に分析していくよ。投資判断に直結する話だから、しっかり聞いてほしいんだよ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "🔑"
          title: "ここからが核心"
          body: "マクロ環境の理解から個別銘柄の投資判断へ。東京エレクトロン・東京応化・レーザーテック・ディスコの4銘柄について、バリュエーション・エントリー価格帯・上昇トリガー・撤退シナリオを定量的に分析する。"
          emphasis: "エントリー価格・目標株価・撤退ラインを完全開示"
          points:
            - "東京エレクトロン（8035）：成熟プロセス最大の受益者"
            - "東京応化工業（4186）：フォトレジストで別格の地位"
            - "レーザーテック（6920）：EUV検査で規制の外側"
            - "ディスコ（6146）：ダイシングソー独占で盤石"

  - type: analysis
    topic: "マクロ環境と投資インパクト"
    lines:
      - ponchan: "まずマクロ環境から整理するよ。2026年5月現在、トランプ政権の「デカップリング2.0」政策によって中国への半導体規制は2022年比で格段に厳しくなっているんだよ。でも同時に中国の半導体投資は止まらずに拡大しているんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          number: 1
          icon: "🌐"
          title: "マクロ環境：2026年5月の現状"
          body: "2025年のトランプ政権復活後、対中半導体規制は「デカップリング2.0」と呼ばれるほど強化された。AIチップ（H100相当品）の禁輸に加え、製造装置・設計ソフト（EDA）への規制も拡張。しかし中国側の設備投資は規制強化に反比例して拡大している。"
          emphasis: "規制強化と中国投資拡大が同時進行"
          points:
            - "2025年の中国半導体設備投資：約520億ドル（2022年比86%増）"
