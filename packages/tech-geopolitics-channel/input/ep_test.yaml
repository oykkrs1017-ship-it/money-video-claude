chapters:
  - type: hook
    topic: "半導体戦争の衝撃"
    lines:
      - ponchan: "2024年の世界半導体市場は約6271億ドル、日本円で約95兆円に達したんだけど、この巨大市場をめぐって米中が本気でぶつかり合ってるの"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "💰"
          title: "半導体市場6271億ドル"
          body: "2024年のSIA発表による世界半導体売上高。\n前年比19%増で過去最高を更新した。"
          emphasis: "約95兆円"
          points:
            - "前年比19%増で過去最高"
            - "AI需要が牽引して急拡大"
            - "米中対立で供給構造が激変"
          color: "#0057B7"
      - maro: "95兆円ってとんでもない規模なのだ、日本の国家予算に匹敵するレベルだから、それを奪い合ってるってことだぞ"
        emotion: surprised
      - ponchan: "そうなの、しかもアメリカは2022年にCHIPS法を成立させて、527億ドルもの補助金を半導体産業に投じる決断をしたんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 2
          icon: "🏛️"
          title: "CHIPS法527億ドル"
          body: "米国の半導体製造を国内回帰させるため、\n連邦政府が527億ドルの補助金と税控除を用意。\n2022年8月にバイデン大統領が署名した。"
          emphasis: "527億ドルの補助金"
          points:
            - "製造補助に390億ドル"
            - "研究開発に132億ドル"
            - "投資税額控除25%"
          color: "#B71C1C"
      - maro: "国が5兆円以上も出して半導体工場を呼び戻そうとしてるなんて、これはもう産業政策というより安全保障の話なのだ"
        emotion: thinking
      - ponchan: "まさにその通りで、背景にあるのは台湾TSMCへの過度な依存なの、先端チップの9割以上が台湾で製造されてる現実があるんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 3
          icon: "🇹🇼"
          title: "先端チップの台湾集中"
          body: "7nm以下の先端プロセスチップの約90%以上が台湾TSMCで製造されている。\n台湾有事が起きれば世界のテック産業が停止するリスクがある。"
          emphasis: "90%以上が台湾製造"
          points:
            - "Apple・NVIDIA・AMDが全依存"
            - "台湾海峡リスクが最大の懸念"
            - "代替拠点の構築が急務"
          color: "#0057B7"
      - maro: "9割以上が台湾に集中してるのは怖すぎるのだ、もし台湾海峡で何か起きたらiPhoneもAIサーバーも全部止まるぞ"
        emotion: surprised
      - ponchan: "だからこそアメリカは中国に対して半導体輸出規制をどんどん強化していて、2024年12月にはAI向けチップの対中輸出を事実上全面禁止にしたんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 4
          icon: "🚫"
          title: "対中半導体輸出規制"
          body: "米商務省は2022年10月から段階的に規制を強化。\n2024年12月にはHuaweiや140社以上を追加制裁し、\nAI向け先端GPUの対中輸出を事実上禁止した。"
          emphasis: "AI向けチップ全面禁止"
          points:
            - "2022年10月に初の包括規制"
            - "2023年10月に規制を大幅拡大"
            - "2024年12月に140社追加制裁"
          color: "#B71C1C"
      - maro: "段階的に締め上げていって最終的に全面禁止まで来たのか、アメリカの本気度が伝わってくるのだ"
        emotion: thinking
      - ponchan: "この半導体戦争は投資家にとって無視できないテーマなの、今日は背景から投資への影響まで一気に解説していくよ"
        emotion: serious
      - maro: "これは絶対に知っておかないといけない話なのだ、ぜひ詳しく教えてほしいぞ"
        emotion: serious

  - type: explanation
    topic: "規制強化の全体像"
    lines:
      - ponchan: "まず米中半導体戦争の全体像を整理するね、始まりは2019年のファーウェイに対するエンティティリスト追加だったの"
        emotion: serious
        show:
          type: timeline
          title: "米中半導体戦争の主要タイムライン"
          events:
            - { year: "2019年5月", label: "ファーウェイをエンティティリスト追加", highlight: true }
            - { year: "2020年9月", label: "TSMCのファーウェイ向け出荷停止", highlight: false }
            - { year: "2022年8月", label: "CHIPS法成立", highlight: true }
            - { year: "2022年10月", label: "対中半導体包括輸出規制", highlight: true }
            - { year: "2023年10月", label: "規制拡大・ASML巻き込み", highlight: false }
            - { year: "2024年12月", label: "AI向けチップ全面禁止", highlight: true }
      - maro: "ファーウェイの5Gスマホが世界トップシェアを取りそうだったから、アメリカが危機感を持って制裁に踏み切ったということなのだ"
        emotion: thinking
      - ponchan: "その通りだよ、当時ファーウェイは自社設計チップ『Kirin』をTSMCに委託製造してたんだけど、アメリカが圧力をかけてTSMCからの出荷を止めさせたの"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "📱"
          title: "ファーウェイ制裁の核心"
          body: "ファーウェイはHiSilicon部門でKirinチップを設計し、TSMCの7nmプロセスで製造していた。\n米国はTSMCに対しファーウェイ向け出荷停止を要求し、\nファーウェイのスマホ事業に致命的打撃を与えた。"
          emphasis: "TSMCからの出荷停止"
          points:
            - "Kirinチップの製造が不可能に"
            - "ファーウェイのスマホシェア急落"
            - "自国製造への転換を迫られた"
          color: "#0057B7"
      - maro: "チップの設計はできても作れなくなったら意味がないのだ、製造を押さえることがこの戦争の最大のポイントだぞ"
        emotion: serious
      - ponchan: "まさにそこがカギなの、半導体は設計と製造が分業化されていて、最先端の製造技術を持つのはTSMCとSamsungくらいしかないんだよ"
        emotion: serious
        show:
          type: chart
          key: "foundryMarketShare"
      - maro: "このグラフを見るとTSMCが圧倒的なシェアを持ってるのだ、67%ということは先端チップの3分の2がTSMC製ということだぞ"
        emotion: surprised
      - ponchan: "そしてアメリカが次に狙ったのが製造装置の規制なの、特にオランダASMLのEUV露光装置は世界で唯一の技術で、これなしに7nm以下のチップは作れないんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 2
          icon: "🔬"
          title: "ASML EUV露光装置"
          body: "EUV（極端紫外線）リソグラフィ装置は1台約400億円。\nASMLが世界で唯一量産しており、\n7nm以下の先端チップ製造に不可欠な装置。\n米国はオランダ・日本と協調して中国への輸出を規制した。"
          emphasis: "1台約400億円の独占装置"
          points:
            - "世界でASMLのみが製造"
            - "2024年から中国向け出荷を制限"
            - "日本の東京エレクトロンも規制協力"
          color: "#FF6F00"
      - maro: "1台400億円の装置を独占してるASMLも地政学の主役になってるのだ、オランダと日本も巻き込んだ国際的な包囲網だぞ"
        emotion: thinking
      - ponchan: "2023年1月に日米蘭の3カ国で合意が成立して、先端製造装置の対中輸出を事実上ブロックしたの、これで中国は最先端チップの自主製造がさらに困難になったんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 3
          icon: "🤝"
          title: "日米蘭3カ国合意"
          body: "2023年1月に日本・米国・オランダが先端半導体製造装置の対中輸出規制で合意。\nASMLのEUV装置に加え、東京エレクトロンやニコンの装置も規制対象となった。"
          emphasis: "3カ国で対中包囲網"
          points:
            - "EUV装置は完全に輸出禁止"
            - "DUV一部装置も規制対象"
            - "日本企業にも大きな影響"
          color: "#0057B7"
      - maro: "日本の製造装置メーカーも当事者なのだ、東京エレクトロンやレーザーテックの株価にもろに影響する話だぞ"
        emotion: serious
      - ponchan: "一方で中国も黙ってはいないの、SMICが独自にDUV装置を使って7nmチップの製造に成功したと報じられていて、ファーウェイのMate60 Proに搭載されて世界を驚かせたんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 4
          icon: "🇨🇳"
          title: "中国の反撃・SMIC 7nm"
          body: "2023年8月、ファーウェイがMate60 Proを発売。\n分解調査でSMIC製の7nmチップ『Kirin 9000s』が発見され、\nDUV装置のみで7nm製造に成功したことが判明した。"
          emphasis: "DUVで7nm製造に成功"
          points:
            - "EUVなしでの7nm量産は異例"
            - "歩留まりや性能面では課題あり"
            - "中国の技術力を示す象徴的事件"
          color: "#B71C1C"
      - maro: "EUVなしで7nmを作ったのは驚きなのだ、ただし量産の効率やコスト面ではまだ大きなハンデがあるということだぞ"
        emotion: thinking

  - type: explanation
    topic: "CHIPS法と供給再編"
    lines:
      - ponchan: "次にCHIPS法による供給網再編を見ていくね、アメリカは527億ドルの補助金でTSMC・Intel・Samsungなどの工場を国内に誘致してるの"
        emotion: serious
        show:
          type: chart
          key: "chipsActFunding"
      - maro: "このグラフを見るとIntelが85億ドルで最大の補助を受けてるのだ、アメリカとしては自国企業を最優先で支援したいということだぞ"
        emotion: thinking
      - ponchan: "TSMCはアリゾナ州に3つの工場を建設中で、投資総額は650億ドルを超えるの、最先端の2nmプロセスまで米国内で製造する計画なんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "🏭"
          title: "TSMCアリゾナ工場"
          body: "TSMCはアリゾナ州フェニックスに3工場を建設中。\n第1工場は4nmで2025年前半に量産開始予定。\n第2工場は3nm、第3工場は2nmを計画し、\n総投資額は650億ドル以上に達する。"
          emphasis: "650億ドル超の巨大投資"
          points:
            - "第1工場は2025年前半に量産開始"
            - "第3工場で2nmプロセスを計画"
            - "米政府から66億ドルの補助金"
          color: "#0057B7"
      - maro: "650億ドルって約10兆円だぞ、1社の設備投資としては歴史的な規模で、これだけでも半導体戦争の深刻さがわかるのだ"
        emotion: surprised
      - ponchan: "ただし課題もあるの、アリゾナ工場は当初2024年量産予定だったのが遅延していて、人材不足やコスト高が問題になってるんだよ"
        emotion: thinking
        show:
          type: rich-panel
          number: 2
          icon: "⚠️"
          title: "米国製造の課題"
          body: "TSMCアリゾナ工場は技術者不足や建設コスト高騰で当初計画から遅延。\n米国の半導体製造コストは台湾より約50%高いとされ、\n補助金なしでは採算が合わないという指摘もある。"
          emphasis: "製造コスト約50%高"
          points:
            - "熟練技術者の確保が困難"
            - "建設費用が台湾の数倍"
            - "長期的な補助金依存リスク"
          color: "#FF6F00"
      - maro: "コストが5割増しだと補助金が切れた後に持続できるのか不安なのだ、これは投資判断にも影響する重要なポイントだぞ"
        emotion: thinking
      - ponchan: "そしてもう一つ注目なのが日本のRapidusなの、北海道千歳市に2nmプロセスの工場を建設中で、2027年の量産開始を目指してるんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 3
          icon: "🇯🇵"
          title: "日本のRapidus計画"
          body: "Rapidusは2022年設立の国策半導体企業。\n北海道千歳市に2nm工場を建設中で、\nIBMとの技術提携により最先端プロセスを目指す。\n日本政府は累計9200億円以上の支援を決定した。"
          emphasis: "政府支援9200億円超"
          points:
            - "2027年に2nm量産開始目標"
            - "IBMのGAA技術を導入"
            - "トヨタ・ソニーなど8社が出資"
          color: "#0057B7"
      - maro: "日本も9200億円を投じて半導体復活を目指してるのだ、ただし2nmの量産経験がない中で本当に実現できるのか注目だぞ"
        emotion: thinking
      - ponchan: "世界中で半導体工場の建設ラッシュが起きていて、これは冷戦以来最大の産業再編と言っても過言ではないの、投資家としてはこの構造変化を理解することが重要なんだよ"
        emotion: serious
        show:
          type: rich-panel
          number: 4
          icon: "🌍"
          title: "世界的な半導体工場建設ラッシュ"
          body: "米国・日本・EU・韓国・インドなど各国が数兆円規模の補助金で半導体工場を誘致。\nSEMIの調査では2024〜2026年に世界で80以上の新工場が着工予定。"
          emphasis: "80以上の新工場が着工"
          points:
            - "各国が経済安全保障を重視"
            - "フレンドショアリング加速"
            - "設備投資関連銘柄に追い風"
          color: "#0057B7"

  - type: analysis
    topic: "投資への影響分析"
    lines:
      - ponchan: "ここからは投資への影響を具体的に見ていくね、まず最も恩恵を受けているのがNVIDIAで、データセンター部門の売上が爆発的に伸びてるの"
        emotion: serious
        show:
          type: chart
          key: "nvidiaRevenue"
      - maro: "このグラフを見ると、NVIDIAのデータセンター売上がFY2024からFY2025で倍以上に伸びてるのだ、1153億ドルというのは驚異的な数字だぞ"
        emotion: surprised
      - ponchan: "NVIDIAは中国向けに専用チップH20を開発したんだけど、2024年12月の追加規制でこれも輸出制限の対象になって、年間約120億ドルの売上リスクがあるとされてるの"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "📉"
          title: "NVIDIA 中国リスク"
          body: "NVIDIAは規制対応のためA800やH20など性能を落とした中国専用チップを開発。\nしかし2024年12月の追加規制でH20も制限対象に。\n中国向け売上は全体の約10%で年間120億ドル規模。"
          emphasis: "年間120億ドルのリスク"
