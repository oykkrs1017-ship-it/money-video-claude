chapters:
  - type: hook
    topic: "NVIDIA中国シェア崩壊と新NISAへの衝撃"
    lines:
      - ponchan: "95%がゼロになった——NVIDIAのCEOジェンスン・フアン氏が自ら認めたこの数字は、新NISAでS&P500を積み立てている全員に直撃する話なんだよ。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "95%"
          label: "2020年以前のNVIDIA中国シェア"
          unit: "→現在ほぼ0%"
      - maro: "実はNVIDIAのシェアがこれほど崩壊しているなんて、テレビのニュースではほとんど報道されていないぞ。でもS&P500インデックスを持っているだけで、もうすでに影響を受けているってどういうことなんだぞ？"
        emotion: surprised
      - ponchan: "しかも今、話は単純な規制問題じゃないんだよ。トランプ政権が「少し売ってあげますよ」と手を差し伸べたら、習近平が「いらない、自分たちで開発する」と断った——売りたい側と買わない側が完全に逆転しているんだよ。"
        emotion: serious
        show:
          type: map
          title: "逆転した米中半導体の力学"
          region: world
          points:
            - label: "米国（売りたい）"
              x: 20
              y: 40
              highlight: true
              note: "トランプ政権がH200輸出を個別審査に緩和"
            - label: "中国（買わない）"
              x: 72
              y: 42
              highlight: true
              note: "習近平「自分たちで開発する」と拒否"
      - maro: "トランプさんが拒否られるなんて前代未聞だぞ。普通なら喜んで買うはずの最先端チップを中国が断るって、それだけ自国技術に自信がついてきたということなのだろうか？"
        emotion: surprised
      - ponchan: "そうなんだよ。今日は3つのことを話すね。①NVIDIAの中国シェアが崩壊した本当の理由とHuaweiの実力、②この変化が新NISAのS&P500インデックスにどう波及するかの具体的な計算、③エントリー価格$190・撤退ライン$165を含む老後資金を守る投資アクションプランだよ。"
        emotion: happy
        show:
          type: rich-panel
          title: "今日わかること3選"
          body: "NVIDIAの中国シェア崩壊は、他人事に見えてS&P500積立民の資産に直結している。3つの視点で整理していくよ。"
          points:
            - text: "①崩壊の本当の理由"
              body: "Huawei昇騰の実力とDeepSeekが証明した技術的自立の構造を解説"
            - text: "②S&P500への波及計算"
              body: "NVIDIA8%ウェイトが意味すること——100万円投資への影響を試算"
            - text: "③具体的な投資アクション"
              body: "エントリー$190・撤退$165・ピック＆シャベル分散の3ステップ"
      - maro: "S&P500のインデックスを積み立てているだけでも、NVIDIAの動向から目を離せないということになるのだな。これは老後資金を考えている人には本当に大事な話だと感じるぞ。"
        emotion: thinking

  - type: explanation
    topic: "規制の歴史と逆転劇の構造"
    lines:
      - ponchan: "まず規制の歴史を押さえておこう。2022年から2026年までの4年間、アメリカは半導体規制を強めたり緩めたりを繰り返してきたんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: slide_004_chart
      - maro: "グラフを見ると、規制が強くなるにつれて中国の自立度スコアがむしろ上がっているぞ。まるで締め付けるたびに中国が強くなっているみたいで、これは一体どういう構造なのだ？"
        emotion: thinking
      - ponchan: "まさにそこが核心なんだよ。H100を禁止したら中国は対応チップを作り始めた。H800を規制したらさらに自国開発を加速した。中途半端なイジワルが中国の競争心に火を付けた、という皮肉な構造が起きているんだよ。"
        emotion: serious
        show:
          type: timeline
          title: "米中半導体規制と中国の対応：4年の軌跡"
          events:
            - year: "2022年10月"
              label: "H100禁止：中国向け先端チップ輸出を全面禁止"
              highlight: true
            - year: "2023年10月"
              label: "H800規制：NVIDIA独自の迂回チップも規制対象に"
              highlight: false
            - year: "2024年末"
              label: "H20限定：唯一許可されたチップも帯域幅制限で実用限界"
              highlight: false
            - year: "2025年"
              label: "DeepSeek V3・V4が中国国産チップで世界最高水準に到達"
              highlight: true
            - year: "2026年"
              label: "トランプ政権がH200輸出を個別審査に緩和→中国が拒否"
              highlight: true
      - maro: "じゃあ最初から規制しなければよかったということなのだろうか？規制したせいでかえって中国を強くしてしまったとしたら、アメリカの政策は完全に裏目に出たということになるのだぞ？"
        emotion: thinking
      - ponchan: "これが私の独自の読みなんだけど、完全禁止ならまだ遅らせられたかもしれない。でも「少し売るけど最高性能は売らない」という中途半端な制限は、中国に明確な開発目標と切迫感を与えてしまったんだよ。冷戦期に米ソが宇宙開発を競ったのと全く同じ構図だよ。"
        emotion: serious
        show:
          type: venn
          title: "中途半端規制が生んだ皮肉な重なり"
          sets:
            - label: "米国の意図"
              items: ["中国AI開発を遅延させる", "自国半導体産業を守る"]
              color: "#0a72ef"
            - label: "中国の実際の反応"
              items: ["自国チップ開発に集中投資", "DeepSeek等でソフト面を突破"]
              color: "#dc2626"
          overlapLabel: "中国AI実力の急速向上（双方想定外）"
          footer: "規制が逆に中国の技術自立を加速させた皮肉な構造"
      - ponchan: "次に中国の三大勢力を整理しよう。筆頭はHuaweiの昇騰チップ。2025年の出荷枚数は約81万2,000枚で国産AIチップの約50%を占めているんだよ。しかも単なるチップじゃなく、フレームワークからサービスまでワンストップで提供できる唯一のプレイヤーなんだよ。"
        emotion: serious
        show:
          type: pyramid
          title: "中国AIチップ三大勢力の階層"
          direction: up
          layers:
            - label: "Huawei昇騰"
              sublabel: "チップ+フレームワーク+サービスのフルスタック"
              value: "国産シェア50%・81万枚出荷（2025年）"
            - label: "海光DCU"
              sublabel: "x86系互換アーキテクチャ・国有クラウド向け"
              value: "中国政府調達の主力"
            - label: "寒武紀（Cambricon）"
              sublabel: "推論特化チップ・エッジAI領域"
              value: "A株上場・国家支援あり"
          footer: "3社合計で中国AI需要の8割以上をカバーし始めている"
      - maro: "CUDAエコシステムって何なんだぞ？名前は聞いたことあるけど、なぜそれが崩れるとNVIDIAにとって大ダメージなのかが今ひとつわからないのだ。"
        emotion: thinking
      - ponchan: "CUDAはNVIDIAが20年かけて構築したソフトウェアの生態系なんだよ。プログラマーが「NVIDIAのGPUで動く」コードを書けば自動的に最適化されるという仕組みで、世界中のAI研究者がCUDAで学んできた。DeepSeek V4がリリース当日にHuawei昇騰対応だったことは、この牙城を崩した歴史的事件なんだよ。"
        emotion: serious
        show:
          type: comparison-table
          title: "NVIDIA CUDA vs Huawei 昇騰エコシステム比較"
          columns:
            - label: "NVIDIA CUDA"
              winner: false
            - label: "Huawei 昇騰"
              winner: true
          rows:
            - label: "蓄積年数"
              values: ["20年以上", "5年（急成長中）"]
            - label: "DeepSeek V4対応"
              values: ["〇（従来から）", "〇（リリース同日対応）"]
            - label: "推論コスト比"
              values: ["基準（1倍）", "約4分の1"]
            - label: "中国国内での採用可否"
              values: ["規制リスクあり", "完全自由"]
          badge: "2026年5月時点"
          footer: "CUDAの「乗り換えコスト（スイッチングコスト）」優位が急速に低下している"
      - ponchan: "もう一つ押さえておきたいのが議会対トランプの政策対立リスクだよ。AI Overwatch Actという法案が下院外交委員会を通過していて、H200を超えるチップの輸出を強制的に拒否できる仕組みを作ろうとしているんだよ。"
        emotion: serious
        show:
          type: flow-chart
          title: "AI Overwatch Act：投資家が見るべき分岐点"
          root:
            label: "H200超チップの輸出申請"
            sublabel: "NVIDIAが輸出ライセンスを申請"
            icon: "📋"
            children:
              - label: "現行（トランプ方針）"
                sublabel: "個別審査30〜60日で承認"
                highlight: false
                detail:
                  title: "緩和シナリオ"
                  items: ["中東・インド向けは承認が通りやすい", "NVIDIA株価には追い風"]
                  color: "#16a34a"
              - label: "AI Overwatch Act成立後"
                sublabel: "両院30日レビューが義務化・強制拒否権発動"
                highlight: true
                detail:
                  title: "規制強化シナリオ"
                  items: ["H200超は全輸出が一時停止リスク", "NVIDIA株価に下落圧力・$165割れも"]
                  color: "#dc2626"
          footer: "2019年Huawei制裁時も「議会強硬派が最終的に勝った」先例がある"
      - maro: "同じ共和党なのに議会とトランプが真っ向対立するんだというのは驚きだぞ。でも確かに2019年のHuawei制裁でも最終的には強硬派が勝ったという話は、NVIDIAのリスクを考える上で絶対に無視できないのだな。"
        emotion: surprised

  - type: analysis
    topic: "S&P500への波及と具体的投資判断"
    lines:
      - ponchan: "ここからが投資判断の核心だよ。新NISAでS&P500を積み立てているあなたに、まず確認してほしい数字がある。2026年5月末時点でNVIDIAはS&P500の約8%を占めているんだよ。これは史上最大の単一銘柄比率なんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: sp500_nvidia_weight
      - maro: "インデックスだから安全って思っていたけど、実は100万円のS&P500投資のうち8万円がNVIDIA株に投資されているということになるのだな。それは確かに他人事では全然ないのだぞ。"
        emotion: surprised
      - ponchan: "しかも独自試算をしてみたよ。計算式はこうだよ。仮に新NISAのつみたて投資枠で月3万円、年36万円をS&P500に10年積み立てたとする。10年後の評価額を年7%成長で試算すると約497万円になるんだよ。そのうちNVIDIA8%分は約39万8,000円。NVIDIAが20%下落したら、その部分だけで約8万円の含み損が生まれる計算になるんだよ。"
        emotion: serious
        show:
          type: scale-balance
          title: "新NISA月3万円積立×10年：NVIDIA影響の試算"
          left:
            label: "NVIDIA下落リスク"
            sublabel: "NVIDIA-20%時の影響"
            direction: down
            box:
              title: "含み損試算"
              items: ["10年積立評価額497万円のうちNVIDIA分：約39.8万円", "NVIDIA-20%で約8万円の損失発生", "積立金額360万円の約2.2%相当"]
          right:
            label: "インデックス分散効果"
            sublabel: "他499銘柄が緩衝材"
            direction: up
            box:
              title: "Break-even考え方"
              items: ["S&P500残りの92%がフラットなら損失は-1.6%以内に抑制", "ただしNVIDIA-30%超になるとS&P500全体も急落リスク"]
          footer: "試算前提：S&P500年率7%成長・NVIDIA8%ウェイト固定・2026年6月時点"
      - maro: "じゃあ具体的にNVIDIA株をどの価格帯で買えばいいんだぞ？今は$180〜$220のレンジだということだけど、ぽんちゃんはどのシナリオが一番可能性が高いと思うんだ？"
        emotion: thinking
      - ponchan: "私の見立てはベースシナリオが最も可能性が高いと思っているよ。中国市場は失ったまま、でも中東とインドという新しい市場が育ってきて$230〜$250に向かうという展開ね。エントリーは$190以下で仕込んで、PER33倍前後という過去平均水準を根拠にした目標株価$240が一つの目安だよ。"
        emotion: thinking
        show:
          type: chart
          key: nvidia_price_scenario
      - maro: "でも「それでも中国市場の損失は大きいのでは？」と考える人もいると思うぞ。年間数十億ドルの売上が消えたのに、中東やインドで本当に補えるんだろうか？という疑問が残るのだ。"
        emotion: thinking
      - ponchan: "鋭い反論だよ。確かに中国向けの損失は推定年間数十億ドル規模。でもデータを見ると、サウジアラビアとUAEだけで2026年から5年間で5,000億ドル超のAIインフラ投資計画がある。しかもHuaweiは中東市場でまだ信頼構築の途中で、NVIDIAのブランドが通用する数少ない市場なんだよ。完全代替は難しいけど、市場規模の成長スピードは想定より速いというのが私の読みだよ。"
        emotion: serious
        show:
          type: comparison-table
          title: "NVIDIA：失った市場 vs 新市場の規模比較"
          columns:
            - label: "中国（失った市場）"
              winner: false
            - label: "中東＋インド（新市場）"
              winner: true
          rows:
            - label: "推定年間売上影響"
              values: ["-数十億ドル", "2026〜2030年合計5,000億ドル超の投資計画"]
            - label: "Huawei競合リスク"
              values: ["中国では完全代替済み", "中東では信頼・実績でNVIDIA優位"]
            - label: "成長スピード"
              values: ["回復不可能（不可逆）", "2027〜2028年に急加速の見通し"]
          badge: "2026年6月時点の推計"
          footer: "中国市場喪失は痛いが、中東AIブームが5年以内に上回る可能性が高い"
      - ponchan: "次にNVIDIAを直接保有するリスクを下げるためのピック＆シャベル戦略を見ていこう。ゴールドラッシュで儲けたのは金を掘った人ではなくツルハシを売った人、という話があるよね。Vertivはデータセンターの冷却・電源インフラで過去2年+250%、GE Vernovaのガスタービンは2029年まで納期が埋まっているほど需要が確実なんだよ。"
        emotion: happy
        show:
          type: chart
          key: pickaxe_returns
      - maro: "日本株のハーモニックドライブや安川電機も新NISAの成長投資枠で買えると聞いたことがあるぞ。日本円で取引できる銘柄でAI関連のピック＆シャベルを探すという選択肢も現実的なんだろうか？"
        emotion: thinking
      - ponchan: "もちろん日本株でも選択肢はあるよ。ファナックや安川電機はロボット×AIという文脈で米中どちらが勝っても恩恵を受けやすい構造なんだよ。成長投資枠の240万円を、米国ピック＆シャベル銘柄に120万円・日本のロボット関連に80万円・NVIDIA本体に40万円という比率で分けると、地政学リスクへの分散が効いてくるよ。"
        emotion: happy
        show:
          type: traffic-light
          title: "新NISAの成長投資枠：2026年版銘柄仕分け"
          items:
