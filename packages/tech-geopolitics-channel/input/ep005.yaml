title: "台湾有事で半導体が消える？サプライチェーン崩壊の現実"
description: "台湾有事が起きた場合、世界の半導体サプライチェーンはどうなるのか？TSMCが担う先端半導体の世界シェアは90%超。もし供給が途絶えれば、スマホ・AI・自動車・防衛産業まで壊滅的打撃を受ける。地政学リスクと投資家が取るべきポジションを徹底解説します。"
