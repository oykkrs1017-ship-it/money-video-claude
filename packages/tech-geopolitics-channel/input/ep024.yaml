chapters:
  - type: hook
    topic: "あなたのNISAが危ない"
    lines:
      - ponchan: "こんにちは、ぽんちゃんです。皆さま、大変です！ホルムズ海峡の封鎖によって、あなたが積み立ててきたNISA口座が今まさに直撃を受けています。これを知らないと、資産が大損してしまうかもしれません！"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "+85%"
          label: "WTI原油の上昇率（わずか10日間）"
          unit: "2026年2月中旬〜3月10日"
      - ponchan: "実は日本が輸入する原油の93%が、たったひとつの海峡を通っているんだよ。それがホルムズ海峡で、今まさにその海峡が完全にふさがれているんだよ。"
        emotion: serious
      - ponchan: "WTI原油は2月中旬の65ドルから3月10日には120ドルまで、わずか10日間で85%も急騰したんだよ。そして日経平均は3月9日に一日で2892円暴落、過去3番目の下落幅を記録しているんだよ。"
        emotion: surprised
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: slide_001_chart
      - maro: "えっ、ぽんちゃん、NISAって毎月コツコツ積み立ててるだけだから関係ないと思ってたぞ。でも一日で2892円も日経平均が落ちたなら、俺の口座も目減りしてるってことなのだ？"
        emotion: surprised
      - ponchan: "そうなんだよ。今日はこの危機について3つ話すよ。①なぜ生活費の上昇とNISA評価額の下落が同時に起きるダブルパンチが起きるのか、②原油高で上がる銘柄と下がる銘柄の具体的なエントリー価格と撤退ライン、③NISA積立を今すぐ止めるべきかのシナリオ別判断だよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "今日わかる3つのこと"
          body: "ホルムズ封鎖が家計と資産に同時打撃を与えるメカニズムと、明日から使える具体的アクションを解説する。"
          points:
            - text: "①ダブルパンチの正体"
              body: "生活費上昇とNISA評価額下落が同時に起きる仕組みを解説する。"
            - text: "②上がる銘柄・下がる銘柄"
              body: "INPEX・三菱商事のエントリー価格帯と撤退ラインを具体的に提示する。"
            - text: "③NISA積立を止めるべきか"
              body: "シナリオ別の判断基準と取得単価▲20%ルールを紹介する。"
      - maro: "積立NISAって今もそのまま続けていいのかどうか、ずっと気になってたぞ！今日の動画でちゃんとわかるのだな、楽しみなのだ。"
        emotion: happy

  - type: explanation
    topic: "封鎖はなぜ起きたか"
    lines:
      - ponchan: "まず経緯をおさえよう。2026年2月28日、米国とイスラエルがイランを攻撃し、ハメネイ師が死亡したとの報道が流れてWTI原油が急騰を開始したんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: timeline
          title: "ホルムズ封鎖の経緯（2026年2〜6月）"
          events:
            - { year: "2026年2月28日", label: "米・イスラエルがイラン攻撃→WTI原油急騰開始", highlight: true }
            - { year: "2026年3月2日", label: "イラン革命防衛隊がホルムズ通航を事実上禁止・通航130隻→1〜2隻に激減", highlight: true }
            - { year: "2026年4月13日", label: "米海軍がイラン港湾向け船舶を逆封鎖→「二重封鎖」状態に", highlight: true }
            - { year: "2026年6月3日現在", label: "協議凍結方向・原油は1日7%超の急騰が続く不安定な状況", highlight: false }
      - maro: "二重封鎖って、イラン側の機雷と米軍側の封鎖の両方でふさがれてる状態なのだ？それって外交で簡単に解決できるものなのだぞ？"
        emotion: thinking
      - ponchan: "そうなんだよ。イラン側が機雷を敷設してふさいでいる上に、米海軍がイランへの船舶を外側からブロックしているという前代未聞の二重構造になっているんだよ。どちらか一方が動かないと解決できないから、交渉が極めて複雑になっているんだよ。"
        emotion: serious
      - ponchan: "今日6月3日現在も、協議は凍結方向にあって、原油は一日で7%以上急騰するような不安定な状況が続いているんだよ。次は日本だけが特別に大きなダメージを受ける理由を見ていこう。"
        emotion: serious
        show:
          type: map
          title: "ホルムズ海峡と日本の輸送ルート"
          region: asia
          points:
            - { label: "ホルムズ海峡", x: 22, y: 50, highlight: true, note: "日本の原油輸入93%が通過" }
            - { label: "マラッカ海峡", x: 58, y: 72, highlight: false, note: "アジア向けのもう一つの要衝" }
            - { label: "日本", x: 82, y: 35, highlight: false }
          routes:
            - { from: 0, to: 2, label: "日本向けタンカー航路（現在封鎖中）" }
      - ponchan: "日本の原油輸入における中東依存度は95%で、そのほぼすべてである93%がホルムズ海峡を通ってくるんだよ。中国や韓国も中東から原油を買っているけど、日本ほどの依存度ではなく、代替ルートやパイプライン網もあるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "日本だけが抱える三重苦"
          body: "原油・LNG・ナフサの三本柱がすべてホルムズ経由に依存しており、代替手段が乏しいため欧米や中韓よりも日本への打撃が突出して大きい。"
          points:
            - text: "原油の中東依存度"
              value: "95%"
              unit: "うちホルムズ経由93%"
              body: "日経ビジネスも「日本は中韓を上回る中東依存」と指摘しており、構造的な脆弱性が続いている。"
              source: "日経ビジネス 2026年3月号"
            - text: "石油備蓄はある"
              value: "248日分"
              unit: "世界最高水準"
              body: "一見安全に見えるが、LNGには国家備蓄制度がなく、大手電力会社の在庫はわずか3週間分しかない。"
              source: "資源エネルギー庁 石油統計 2024年度"
            - text: "LNG国家備蓄"
              value: "ゼロ"
              unit: "民間在庫は3週間分のみ"
              body: "電力・都市ガス供給に直結するLNGの備蓄が民間頼りであることが、エネルギー安全保障の最大の盲点になっている。"
              source: "経済産業省 天然ガス政策小委員会 2025年"
      - maro: "ぽんちゃん、LNGって電気代や都市ガスに直結するやつだよね。3週間分しかないって、封鎖が1ヶ月以上続いたらもう電力供給が危なくなるってことなのだ？"
        emotion: surprised
      - ponchan: "その通りだよ。さらに怖いのがナフサの話で、石油備蓄が248日分あるから安心と思った方もいるかもしれないけど、それは半分正解で半分間違いなんだよ。ナフサにも国家備蓄はゼロで民間在庫20日分しかなくて、これがすでに製造業を直撃しているんだよ。"
        emotion: serious
        show:
          type: comparison-table
          title: "日・中・韓の中東エネルギー依存度比較"
          columns:
            - { label: "日本", winner: true }
            - { label: "中国", winner: false }
            - { label: "韓国", winner: false }
          rows:
            - { label: "原油の中東依存度", values: ["95%（最大）", "約50%", "約75%"] }
            - { label: "代替ルート・パイプライン", values: ["なし", "中央アジア経由あり", "限定的"] }
            - { label: "LNG国家備蓄", values: ["ゼロ", "備蓄拡充中", "保有あり"] }
          footer: "日本だけが三つの弱点を同時に抱えている"
      - maro: "ぽんちゃん、TOTOのお風呂が買えなくなるって聞いたけど、原油不足からユニットバスまで繋がってるのだ？なんか信じられないのだ。"
        emotion: surprised
      - ponchan: "繋がってるんだよ。ナフサはプラスチックや有機溶剤・接着剤の原料になっていて、ナフサ輸入が途絶えるとユニットバスが製造できなくなるんだよ。実際に4月13日、TOTOがユニットバスの新規受注を停止し、LIXILやクリナップも追随したんだよ。1973年のトイレットペーパー騒動と同じ連鎖が今まさに起きているんだよ。"
        emotion: serious

  - type: explanation
    topic: "ダブルパンチの正体"
    lines:
      - ponchan: "ここからが今回の本当の怖さだよ。原油高の影響はガソリン代だけじゃなくて、電気代・都市ガス代・物流コストが上がり、食品から日用品まで物価全体を押し上げるんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: slide_005_chart
      - maro: "ぽんちゃん、ガソリン1リットル235円ってもう車乗れないよ。電気代も上がったらほんと家計が壊滅するのだ。235円って本当に来るの？"
        emotion: surprised
      - ponchan: "野村証券の試算では、WTI原油が120ドルで推移した場合にガソリンが1リットル235円まで上昇する可能性があるんだよ。民間エコノミストの試算では、1世帯あたり年間2万2千円から3万6千円の支出増になるとされているんだよ。"
        emotion: serious
      - ponchan: "そこに加えて、企業の生産コストが上がって株価が下落し、コツコツ積み立ててきたNISAの評価額も目減りする。生活費も苦しくなって投資余力も下がる中、証券口座を開いたら残高も減っているという二重の痛みがダブルパンチの正体なんだよ。"
        emotion: serious
        show:
          type: cycle-loop
          title: "ダブルパンチの連鎖構造"
          steps:
            - { label: "原油急騰", sublabel: "WTI 65→120ドル", icon: "🛢️" }
            - { label: "ガソリン・電気代↑", sublabel: "最大235円/L・光熱費急騰", icon: "⚡" }
            - { label: "物流・食品コスト↑", sublabel: "年間追加負担3.6万円", icon: "🛒" }
            - { label: "企業利益↓→株安", sublabel: "日経平均2892円安", icon: "📉" }
          centerText: "NISA評価額↓"
          footer: "生活費の増加と資産の目減りが同時に起きる「ダブルパンチ」"
      - maro: "ぽんちゃん、1973年の第一次オイルショックって物価がどれくらい上がったのだ？今回はそれと同じくらい深刻なのだぞ？"
        emotion: thinking
      - ponchan: "1973年の第一次オイルショックでは物価が前年比20.9%も上昇したんだよ。今回がそこまで行くかはシナリオ次第だけど、スタグフレーション、つまり景気停滞下のインフレという最も対応が難しい状況への懸念が出ていることは間違いないんだよ。"
        emotion: serious

  - type: analysis
    topic: "原油高で動く資産と投資戦略"
    lines:
      - ponchan: "では、今の相場環境で上がる資産と下がる資産を整理していこう。恩恵を受けるのがエネルギー・商社・海運セクターで、打撃を受けるのが航空・輸送・素材・小売セクターなんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: traffic-light
          title: "原油高で動く資産の見極め"
          items:
            - signal: go
              label: "恩恵セクター（買い検討）"
              sublabel: "原油高が収益に直結"
              items:
                - "エネルギー：INPEX・石油資源開発"
                - "総合商社：三菱商事・三井物産"
                - "海運：商船三井・日本郵船"
            - signal: stop
              label: "打撃セクター（慎重）"
              sublabel: "燃料・輸送コストが利益を圧迫"
              items:
                - "航空：ANAホールディングス・JAL"
                - "小売：イオン・セブン&アイ"
                - "素材：化学系（ナフサ依存）"
          footer: "スタグフレーション環境では全体相場が上がりにくい。セクター選別が極めて重要"
      - maro: "ぽんちゃん、商船三井って海運だよね？海峡が封鎖されてるのに海運が上がるって不思議なのだ。タンカーが動けないのに儲かるの？"
        emotion: thinking
      - ponchan: "普通はそう思うよね。でも構造が違うんだよ。海峡封鎖が長引くほど、迂回ルートを使う長距離輸送の需要が爆発的に増えるんだよ。ホルムズを避けてアフリカ南端の喜望峰回りになると、航海距離が約2.6倍になって運賃が跳ね上がるんだよ。封鎖の受益者が海運会社という逆説的な構図なんだよ。"
        emotion: serious
      - ponchan: "ここで独自の視点を一つ言わせてほしいんだよ。一般的な解説では『エネルギー株を買え』で終わることが多いけど、今回のポイントは日本の電力会社が実は最大の受益者になり得るということなんだよ。"
        emotion: serious
        show:
          type: scale-balance
          title: "通説 vs 独自視点：本当の受益者はどこか"
          left:
            label: "通説の受益者"
            sublabel: "エネルギー株・商社"
            direction: up
            box:
              title: "一般的な解説"
              items:
                - "INPEX・石油資源開発"
                - "三菱商事・三井物産"
                - "原油高に連動して収益改善"
          right:
            label: "独自視点の受益者"
            sublabel: "電力会社（関西電力等）"
            direction: down
            box:
              title: "見逃されているポイント"
              items:
                - "原子力比率の高い電力会社は燃料費増を受けない"
                - "原油高→電力卸売価格↑→収益増"
                - "関西電力・九州電力は原子力依存度が高い"
          footer: "LNG・原油に依存しない原子力比率の高い電力会社が「隠れた受益者」"
      - maro: "ぽんちゃん、電力会社が受益者なの？LNGで電気を作ってるから電力会社も打撃を受けると思ってたぞ。それって本当なのだ？"
        emotion: surprised
      - ponchan: "テレビではこういう話は絶対にしてくれないよね。電力会社の中でも原子力比率が高い関西電力や九州電力は、LNGの調達コスト増の影響が相対的に小さいんだよ。さらに原油高で電力の卸売価格が上がれば収益が改善する構造があるんだよ。これが今回の隠れた受益者なんだよ。"
        emotion: serious
      - ponchan: "では具体的な投資判断の3要素を話すよ。まず独自試算をお見せするね。新NISAの成長投資枠240万円でINPEXを現在の2300円付近で買ったとして、原油100ドル継続で目標の2800円に達した場合の試算だよ。240万円÷2300円で約1043株、値上がり益は2800円から2300円の500円×1043株で約52万1500円になるんだよ。これが非課税なので、通常課税口座なら約10万6千円の税金がかかるところをゼロにできるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "NISA成長枠240万円でINPEXを買った場合の独自試算"
          body: "2026年6月3日時点の株価2300円を前提に、新NISA成長投資枠の上限240万円を投じた場合のシミュレーション。"
          points:
            - text: "取得株数"
              value: "約1,043株"
              unit: "240万円 ÷ 2,300円"
              body: "新NISA成長投資枠の上限240万円をINPEX（2,300円）に全額投じた場合の取得株数。"
            - text: "目標到達時の値上がり益"
              value: "約52万円"
              unit: "（500円×1,043株）"
              body: "目標株価2,800円到達時の値上がり益。NISA口座なら全額非課税。課税口座なら約10.6万円の税金が発生する差がある。"
            - text: "非課税メリット"
