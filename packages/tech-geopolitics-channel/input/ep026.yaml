chapters:
  - type: hook
    topic: "iDeCo大改正2026年12月"
    lines:
      - ponchan: "こんにちは、ぽんちゃんです。皆さま、大変です！2026年12月にiDeCoが大改正されまして、会社員の掛金上限がなんと3倍以上に跳ね上がります。これを知らないと、老後資金で大損してしまうかもしれません！"
        emotion: serious
        se: "se/whoosh.mp3"
      - maro: "えっ、3倍ってそれ本当の話なのだ？iDeCoって会社員にはあまり関係ないものだと思っていたぞ…もしかして今まですごい損をしていたのだ？"
        emotion: surprised
        show:
          type: stat
          value: "3.1倍"
          label: "企業型DC加入の会社員・iDeCo掛金上限が拡大"
          unit: "2026年12月施行"
        se: "se/impact.mp3"
      - ponchan: "実はiDeCoの節税力ってNISAより強いケースがあるんだよ。なのに企業型DCに入っている会社員の月上限はたった2万円に抑えられていたの。それが今回の改正で一気に6.2万円まで広がるんだよ。"
        emotion: serious
      - maro: "年間にすると、改正前が4.8万円で改正後が14.9万円ということなのだ！それって具体的にどのくらいお得になるんだぞ？"
        emotion: surprised
        show:
          type: chart
          key: slide_001_chart
      - ponchan: "今日は3つ話すよ。①なぜiDeCoはNISAより節税が強いのかという仕組みの話、②あなたの年収で年間いくら節税できるかの具体的な数字シミュレーション、③知らないと後悔する落とし穴と今すぐできる行動プランだよ。"
        emotion: happy
        show:
          type: rich-panel
          title: "今日わかること3選"
          body: "この動画を最後まで見れば、明日から動けるiDeCo活用プランが手に入ります。"
          points:
            - text: "①なぜiDeCoはNISAより節税が強いのか"
              body: "積み立てた瞬間から所得税・住民税が減る「即時節税」の仕組みを解説します。"
            - text: "②年収別・年間節税シミュレーション"
              body: "年収300万〜1000万円まで、改正後に満額拠出した場合の具体的な節税額を提示します。"
            - text: "③落とし穴と今すぐできる行動プラン"
              body: "10年ルール・60歳縛り・手数料のリスクと、12月施行に間に合う申請タイムラインを解説します。"
      - maro: "落とし穴があると聞くだけで怖くなるのだ。でも節税できる金額がそれだけ大きいなら、しっかり理解したうえで活用したいぞ。全部教えてほしいのだ！"
        emotion: thinking

  - type: explanation
    topic: "iDeCo改正の全体像と節税の仕組み"
    lines:
      - ponchan: "まず、改正前後で何が変わるのかを整理しよう。最も大きな恩恵を受けるのが「企業型DCに加入している会社員」の方なんだよ。月2万円から6.2万円へ、実に3.1倍に上限が引き上げられるの。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: comparison-table
          title: "iDeCo改正前後・職業別掛金上限"
          columns:
            - { label: "改正前", winner: false }
            - { label: "改正後（2026年12月〜）", winner: true }
          rows:
            - { label: "企業型DC加入の会社員", values: ["月2万円", "月6.2万円（3.1倍）"] }
            - { label: "企業年金なし会社員", values: ["月2.3万円", "月2.3万円（変更なし）"] }
            - { label: "専業主婦（夫）", values: ["月2.3万円", "月2.3万円（変更なし）"] }
          footer: "企業型DC加入者のみが今回の最大の恩恵を受ける"
      - maro: "企業型DCって、会社が毎月積み立ててくれる退職金の積み立て制度のことなのだ？それとiDeCoって、同時に使えるものだったのだぞ？"
        emotion: thinking
      - ponchan: "そうなんだよ。企業型DCは会社が拠出してくれる分で、iDeCoは自分で追加で積み立てる分なの。今まで両方使う場合は合算で上限が低く抑えられていたんだけど、今回の改正でiDeCoの持ち分が大幅に広がったんだよ。"
        emotion: normal
      - maro: "なるほど、つまり今まで企業型DCに入っていた人は、iDeCoの上限がすごく低くて損していたってことなのだ！それは知らなかったぞ。"
        emotion: surprised
      - ponchan: "iDeCoが最強の節税口座と言われる理由は、節税が3段階で同時に発動するからなんだよ。第1段が掛金の全額が所得控除されること、第2段が運用益が非課税になること、そして第3段が受け取り時にも退職所得控除や公的年金控除が使えることなんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "iDeCo節税の3段ロケット"
          body: "NISAは運用益が出たときだけ非課税になりますが、iDeCoは積み立てた瞬間から節税効果が確定します。この「即時節税」がiDeCoの最大の強みです。"
          points:
            - text: "第1段：掛金が全額所得控除"
              body: "積み立てた金額が全額、その年の所得から差し引かれ、所得税・住民税がすぐ減ります。会社員は年末調整で自動的に還付されます。"
              source: "国税庁「小規模企業共済等掛金控除」2024年"
            - text: "第2段：運用益が非課税"
              body: "通常、投資信託の利益には20.315%の税金がかかりますが、iDeCo口座内では全額非課税で再投資されます。"
              source: "iDeCo公式サイト（国民年金基金連合会）2024年"
            - text: "第3段：受取時も控除あり"
              body: "一時金で受け取れば退職所得控除、年金形式なら公的年金等控除が適用されます。"
              source: "国税庁「退職所得の課税」2024年"
      - maro: "「拠出した瞬間に節税」って、具体的にどういうことなのだ？積み立てたお金がどこかに消えるわけじゃないのに、どうして税金が減るんだぞ？"
        emotion: thinking
      - ponchan: "わかりやすく言うとね、月6.2万円をiDeCoに入れると、その分だけ「課税される収入」が減るの。年収600万円の人なら年間74.4万円が課税対象から外れるわけだから、その約20〜30%分だけ税金が戻ってくるイメージだよ。"
        emotion: happy
      - maro: "つまり投資の損得に関係なく、積み立てた年は必ず得するってことなのだ！それは確かにNISAにはない強みだぞ。でも60歳まで引き出せないって聞いたんだけど、それって不安じゃないのだ？"
        emotion: thinking
        show:
          type: flow-chart
          title: "iDeCo vs 新NISA どっちを先に使うべき？"
          root:
            label: "老後資金の目的は？"
            sublabel: "60歳以降に使うお金か、それとも途中で使う可能性があるか"
            icon: "💰"
            children:
              - label: "60歳以降に使う老後資金"
                highlight: true
                detail:
                  title: "iDeCoを優先"
                  items: ["拠出時から即時節税", "運用益も非課税", "所得税・住民税が毎年確実に減る"]
                  color: "#0057B7"
              - label: "途中で使う可能性あり"
                detail:
                  title: "新NISAを優先"
                  items: ["いつでも引き出し可能", "非課税枠は使い切ったら終わり", "拠出時の節税効果はなし"]
          footer: "老後資金が目的ならiDeCoを最優先にする価値が今回の改正で大幅に高まった"
      - ponchan: "60歳縛りは確かにデメリットだよ。でも逆に言えば老後資金として絶対に取り崩さないと決めているなら、それが最大の武器になるんだよ。緊急資金として生活費3ヶ月分を別口座に確保した上でiDeCoを使うのが鉄則だね。"
        emotion: serious
      - ponchan: "年収別の節税シミュレーションを見てみよう。改正後に月6.2万円を満額拠出した場合、年収300〜400万円の方でも年間11〜15万円の節税になるんだよ。年収600万円以上になると年22万円以上で、30年間続ければ節税だけで447万円以上の恩恵が出てくるの。"
        emotion: happy
        se: "se/ding.mp3"
        show:
          type: chart
          key: slide_006_chart
      - maro: "年収が低い方でも年11万円以上の節税ができるなら、かなり大きいのだ！でも年収が高い人ほど得をするのは、なんか不公平じゃないかと感じてしまうのだぞ。"
        emotion: thinking

  - type: analysis
    topic: "累積メリット・投資判断・リスクと証券会社選び"
    lines:
      - ponchan: "まろくんの「不公平じゃない？」という疑問、実はこれ通説への反論として僕は少し違う見方をしているんだよ。確かに高所得者ほど節税額は大きくなるけど、所得税の限界税率は高いほど大きいから、制度設計上は理にかなっているの。"
        emotion: serious
        se: "se/whoosh.mp3"
      - maro: "じゃあ年収が低い人でも、iDeCoに入る価値はあるということなのだ？具体的な数字で見たいのだぞ。"
        emotion: thinking
      - ponchan: "改正前後の累積メリットを比べると差がよくわかるよ。企業型DC加入・年収600万円・税率20%の人が30年積み立てた場合、改正前の月2万円では累積節税は144万円だったの。改正後に月6.2万円まで増やすと447万円になるんだよ。差額はなんと303万円だね。"
        emotion: serious
        show:
          type: chart
          key: slide_007_chart
      - maro: "303万円の差って、本当に大きいのだ！でもそれって純粋な節税額だけで、運用益の非課税効果は含まれていないのだぞ？実際はもっと大きくなるんじゃないのだ？"
        emotion: surprised
      - ponchan: "そのとおりなんだよ。ここからが僕の独自試算だよ。月6.2万円を年利5%で30年運用した場合、積立総額は2232万円で運用後の総額は約5136万円になるの。利益分2904万円に本来20.315%の税金がかかるとすると約590万円が非課税になる計算だよ。節税447万円と合わせるとトータルのメリットは1000万円を軽く超えるんだよ。"
        emotion: happy
      - maro: "1000万円超のメリットって、もはや老後資金の一部といえる規模なのだ！でもそんなに毎月6.2万円も払えるかどうか不安なんだぞ。生活が苦しくなったらどうするのだ？"
        emotion: thinking
        show:
          type: scale-balance
          title: "iDeCoで生活を圧迫しないための損益分岐点"
          left:
            label: "iDeCo拠出コスト"
            sublabel: "月6.2万円"
            direction: down
            box:
              title: "毎月の負担"
              items: ["掛金：月6.2万円", "口座手数料：月171円〜", "合計：月約62,000円"]
          right:
            label: "即時節税リターン"
            sublabel: "年収600万で年22万円"
            direction: up
            box:
              title: "Break-even Highlight"
              items: ["毎月約1.8万円が税金として戻る", "実質的な手取り負担は月4.4万円前後", "緊急資金3ヶ月分を確保してから開始"]
          footer: "生活費3ヶ月分の緊急資金を別口座で確保することが大前提。掛金は月5,000円から始めてOK"
      - ponchan: "安心してほしいのが、掛金は月5,000円から始められるし途中で増減も自由なんだよ。エントリーのベストタイミングは今すぐ動くことで、口座開設の審査に1〜2ヶ月かかるから12月施行に満額で乗るには10月末が事実上のデッドラインなの。"
        emotion: serious
        show:
          type: rich-panel
          title: "エントリー・目標・撤退の3ライン"
          body: "iDeCoは一度入ったら60歳まで引き出せませんが、掛金の増減は可能です。生活費を圧迫しないよう段階的に増やすのが賢い戦略です。"
          points:
            - text: "エントリーベスト：今すぐ口座開設申請"
              value: "10月末"
              unit: "12月施行満額スタートのデッドライン"
              body: "口座開設から審査完了まで1〜2ヶ月かかります。12月施行に満額から乗るためには10月末の申請完了が必須です。"
              source: "国民年金基金連合会「iDeCo申請フロー」2024年"
            - text: "目標：生活費3ヶ月分確保後に満額へ"
              body: "緊急資金として生活費3ヶ月分を別口座に確保してから、iDeCoの掛金を月6.2万円まで段階的に上げましょう。"
            - text: "撤退シナリオ：生活が苦しくなったら月5,000円に減額"
              body: "60歳前に引き出すことはできませんが、掛金は月5,000円まで減額できます。入れすぎで生活を詰まらせないことが最優先です。"
      - maro: "でも今日ぽんちゃんが言った「落とし穴」が気になるのだ。節税の話ばかりしていたけど、実際に損するケースもあるんじゃないのだぞ？"
        emotion: thinking
      - ponchan: "鋭いね。落とし穴を3つ正直に話すよ。一番の要注意は2026年1月から導入された「退職所得控除10年ルール」なの。iDeCoを一時金で受け取ってから10年以内に会社の退職金を受け取ると、退職所得控除が削られてしまうんだよ。退職が近い50代の方は受取順序の設計が超重要なの。"
        emotion: serious
        show:
          type: traffic-light
          title: "iDeCo落とし穴チェック"
          items:
            - signal: stop
              label: "10年ルール（最重要警告）"
              sublabel: "2026年1月〜導入済み"
              items: ["iDeCo一時金受取後10年以内の退職金は控除が削減", "50代の方は受取順序を税理士に必ず相談", "iDeCo先・退職金後が原則有利"]
            - signal: stop
              label: "60歳縛り（流動性リスク）"
              items: ["60歳になるまで絶対に引き出せない", "緊急資金が不足している人は要注意", "生活費3ヶ月分の確保が絶対条件"]
            - signal: go
              label: "手数料（許容範囲）"
              sublabel: "月171円〜"
              items: ["30年間の累積手数料は約6万円", "節税メリット447万円と比較すれば圧倒的プラス", "コスパは問題なし"]
          footer: "10年ルールだけは退職が近い50代には重大リスク。受取戦略を早めに設計しておくこと"
      - maro: "10年ルールって、順番を間違えると何百万円も損することになるのだ！退職が近い人は本当に注意が必要なんだな。じゃあどの証券会社でiDeCoを始めるのが一番いいんだぞ？"
        emotion: surprised
      - ponchan: "証券会社は4社の手数料がほぼ月171円で横並びだから、商品ラインナップと使いやすさで選ぶのがポイントだよ。まず第一推奨はSBI証券で、口座数が業界最大級で信託報酬が低い優良商品も豊富に揃っているの。楽天ポイントをすでに使っている方には楽天証券も相性がいいよ。"
        emotion: normal
        show:
          type: comparison-table
          title: "iDeCo証券会社4社比較"
          columns:
            - { label: "SBI証券", winner: true }
            - { label: "楽天証券", winner: false }
            - { label: "松井証券", winner: false }
            - { label: "マネックス証券", winner: false }
          rows:
            - { label: "月額手数料", values: ["171円", "171円", "171円", "171円"] }
            - { label: "iDeCo口座数", values: ["業界最大級", "業界2位水準", "中規模", "中規模"] }
            - { label: "低コスト商品", values: ["◎（0.1%以下が豊富）", "○（充実）", "○（充実）", "△"] }
            - { label: "おすすめ対象", values: ["全員", "楽天ポイント利用者", "シンプル重視", "株式投資も併用"] }
          footer: "手数料差はゼロ。商品の信託報酬で長期的なコストが決まるためSBI証券が最優先"
      - maro: "手数料が全部同じなら、あとは商品の信託報酬の差が長期で効いてくるんですね！でもひとつ聞いていいのだぞ？iDeCoを最大活用すると、新NISAへの積み立ては減らすべきなのだぞ？"
        emotion: thinking

  - type: summary
    topic: "まとめ・今すぐできる3ステップ"
    lines:
      - ponchan: "まとめに入るよ。今日の核心は1つで「企業型DC加入の会社員は2026年12月からiDeCoの掛金上限が3.1倍になり、年収600万円なら年22万円・30年で447万円の節税ができる」ということなんだよ。"
        emotion: serious
        se: "se/bell.mp3"
        show:
          type: rich-panel
          title: "今すぐできる3ステップ"
          body: "2026年12月施行に満額から乗るための行動プランです。STEP1・STEP2は今日中に着手できます。"
          points:
            - text: "STEP1：今日SBI証券か楽天証券のサイトを開く"
              value: "10月末"
              unit: "口座開設申請のデッドライン"
              body: "審査に1〜2ヶ月かかるため、12月施行に満額で乗るには今すぐ動くことが重要です。"
