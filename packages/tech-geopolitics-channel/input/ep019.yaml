    topic: "次回予告と登録促進"
    lines:
      - ponchan: "今日はスズキが関税ショックの中で増益を実現している構造的な理由と、具体的なエントリー価格・撤退ラインまで深掘りしてきたよ。このチャンネルでは毎回、地政学リスクと投資判断を具体的な数字で結びつける解説をしていくよ。"
        emotion: happy

      - maro: "次回はどんなテーマになるのだぞ？今日みたいに『普通のニュースだと見えない構造』を教えてほしいのだ。"
        emotion: happy

      - ponchan: "次回も地政学と具体的な投資戦略を結びつけた解説をしていく予定だよ。まだチャンネル登録していない人は、今すぐ登録とベルマークを押しておいてね。毎週投資判断に使える情報をあげていくから、見逃さないようにしてほしいんだよ。"
        emotion: happy

      - maro: "今日の解説が役に立ったと思ったら、ぜひ高評価ボタンも押してほしいのだ。コメントでスズキ株への投資判断や疑問点を教えてくれると、次回の解説テーマの参考にするのだぞ。一緒に資産を守って増やしていこうなのだ！"
        emotion: happy