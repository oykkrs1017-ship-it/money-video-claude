chapters:
  - type: hook
    topic: "関税2兆円時代の逆説"
    lines:
      - ponchan: "2兆2000億円——これが2026年、トランプ関税25%が日本の自動車産業から奪う営業利益の推計額なんだよ。トヨタ・ホンダ・日産が軒並み減益見通しを出す中で、たった1社だけ増益予想を出してる会社があるんだよね。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "2兆2000億円"
          label: "関税25%が日本自動車産業から奪う営業利益（推計）"

      - ponchan: "実はスズキの米国向け輸出比率って、全体の4%しかないんだよ。みんなが『自動車株は全滅だ』と思って売っている今、スズキだけが構造的に関税の外側にいる、という信じられない話があるんだよね。"
        emotion: surprised
        show:
          type: stat
          value: "4%"
          label: "スズキの全販売台数に占める米国向け比率"

      - maro: "え、それって本当なのだ？トヨタもホンダも大打撃を受けてるのに、スズキだけ関税がほとんど関係ないっていうのはどういう仕組みなんだぞ？NISAで自動車株持ってる俺にとっては死活問題なのだ。"
        emotion: surprised
        show:
          type: rich-panel
          title: "今日の3つの学び"
          body: "関税ショックで明暗が分かれた日本自動車株の構造を、サプライチェーン工学とゲーム理論の視点から解説する。30代のNISA投資家が今すぐ使える具体的な投資判断材料を提供する。"
          points:
            - text: "①スズキが増益になる「地理的ゲーム」の全構造"
              body: "インドでの41%独占シェアと94%現地調達率がなぜ最強の護城河になるのかを解説する。"
            - text: "②スズキ・トヨタの具体的エントリー価格と買い場"
              body: "現在の株価水準でのPER・PBRバリュエーションと、押し目買いの条件を数字で示す。"
            - text: "③外れた時の撤退ライン（損切りルール）"
              body: "インドGDP成長率・ルピー為替・関税拡大という3つのリスクシナリオと具体的な株価水準を提示する。"

      - maro: "たしかに、NISA口座に自動車株を入れてる人は今すごく不安だと思うのだ。日産はもう半値以下になってるし、このまま日本の自動車産業は終わりなんじゃないかという恐怖感があるのだぞ。"
        emotion: serious
        show:
          type: chart
          key: "suzuki_profit"

      - ponchan: "日産が45%減益という衝撃的な数字を見ると『自動車株は終わった』って思うよね。でもこのグラフを見てほしいんだよ。同じ日本の自動車メーカーでも、スズキだけが12%増益という真逆の動きをしてるんだよ。これはたまたまじゃなくて、40年がかりで作り上げた構造的な優位性があるんだよね。"
        emotion: serious

  - type: explanation
    topic: "スズキのインド戦略の仕組み"
    lines:
      - ponchan: "まず、スズキがなぜ関税の影響をほぼ受けないのかを理解するには、1981年に遡る必要があるんだよ。あの年、スズキは当時まだ国有企業だったマルチ・ウドヨグ社にたった26%出資して、インド市場に静かに入っていったんだよね。"
        emotion: normal
        se: "se/whoosh.mp3"
        show:
          type: timeline
          title: "スズキのインド戦略45年史"
          events:
            - { year: "1981年", label: "マルチ・ウドヨグ社に26%出資、インド参入", highlight: false }
            - { year: "1992年", label: "インド政府との合弁で生産台数10万台突破", highlight: false }
            - { year: "2003年", label: "マルチ・スズキとして東証・ボンベイ証券取引所上場", highlight: true }
            - { year: "2013年", label: "現地調達率80%超え、年産100万台を達成", highlight: false }
            - { year: "2024年", label: "シェア41%・現地調達率94%・年産220万台の独占体制確立", highlight: true }

      - maro: "1981年というと、まだインドの自動車市場なんてほとんどなかった時代なのだぞ。そんな早いタイミングで入ったのが今効いてるってこと？それって先見の明があったのか、それとも偶然なのだぞ？"
        emotion: thinking
        show:
          type: rich-panel
          title: "スズキがインドを選んだ理由"
          body: "1981年当時のスズキは売上高3000億円規模の中堅メーカーで、トヨタ・日産との国内競争で苦しんでいた。「小さな車しか作れない」という弱点が、逆に所得水準が低いインドでは最強の武器になるという逆転の発想があった。"
          points:
            - text: "インド政府の「国民車構想」に合致"
              body: "当時のインド政府は低価格・低燃費の国民車を必要としており、軽自動車の技術を持つスズキは最適なパートナーだった。"
              source: "マルチ・スズキ・インディア 会社沿革 2024年"
            - text: "大型車が作れない「弱み」が強みに転化"
              body: "トヨタ・GMが参入を見送ったインド市場に、スズキの小型車技術がぴったりはまった。ゲーム理論でいう「ニッチ占有戦略」の典型例。"
              source: "東洋経済新報社 スズキ研究 2023年"

      - ponchan: "偶然じゃないんだよ。当時の鈴木修会長は『大企業が行きたがらない市場にこそチャンスがある』という哲学を持っていて、インドを意図的に選んだんだよね。これはゲーム理論でいう『空白地帯占有戦略』そのものなんだよ。トヨタやGMが来ない場所に先に旗を立てれば、競争コストゼロで市場を育てられるっていう発想なんだよ。"
        emotion: serious
        show:
          type: flow-chart
          title: "スズキの空白地帯占有ゲーム"
          root:
            label: "1981年の戦略選択"
            sublabel: "中堅自動車メーカーとしての生存戦略"
            icon: "🎯"
            children:
              - label: "米国・欧州市場"
                sublabel: "大企業との正面衝突"
                highlight: false
                detail:
                  title: "ハイリスク戦略"
                  items: ["GM・フォードとの消耗戦", "技術・資本で劣位", "参入コスト極大"]
                  color: "#cc4444"
              - label: "インド市場（空白地帯）"
                sublabel: "競合不在の先行者利益"
                highlight: true
                detail:
                  title: "スズキの選択"
                  items: ["政府との合弁で参入障壁を構築", "小型車技術が完全合致", "40年で独占的地位を確立"]
                  color: "#44aa66"
          footer: "空白地帯を占有した先行者は「転換コスト」で後発を永続的に締め出せる"

      - maro: "なるほど、弱者の戦略として空いてる市場を選んだわけなのだ。でもそれって、今の競合他社が同じようにインドに入ってきたら、そのアドバンテージはなくなってしまわないのだぞ？現代自動車やタタ自動車もインドにいるのだぞ？"
        emotion: thinking
        show:
          type: chart
          key: "suzuki_india_share"

      - ponchan: "そこが今日の一番大事なポイントなんだよ。このグラフを見てほしいんだけど、現代自動車が15%、タタ自動車が14%いるのに、スズキは41%という圧倒的シェアを維持してるんだよ。その秘密が『現地調達率94%』という数字に隠されてるんだよね。"
        emotion: serious
        show:
          type: chart
          key: "suzuki_local_ratio"

      - ponchan: "このグラフを見てほしいんだよ。2015年に72%だった現地調達率が、2024年には94%まで上がってるんだよね。つまりインドで売るスズキ車の部品の94%は、インドで作られてるんだよ。日本からの輸出部品はほぼゼロになってるから、円安も関係ない、米国関税も関係ないっていう構造ができあがってるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "現地調達率94%の意味"
          body: "現地調達率とは、製品の製造に使う部品・材料をどれだけ現地で調達しているかの比率。94%という水準は、日本の自動車メーカーのインド生産拠点では最高水準であり、これが「関税・為替リスクからの構造的絶縁」を実現している。"
          points:
            - text: "為替リスクの自己ヘッジ"
              value: "94%"
              unit: "インド現地調達率"
              body: "インドルピー建てで材料を仕入れ、ルピー建てで販売するため、円高・円安の影響をほぼ受けない完全な自然ヘッジが成立している。"
              source: "マルチ・スズキ・インディア 統合報告書 2024年"
            - text: "トランプ関税の完全免疫"
              value: "4%"
              unit: "スズキの米国向け販売比率"
              body: "インドで生産してインドで販売するビジネスモデルのため、米国関税25%は売上のわずか4%にしか影響しない。競合他社が最大20%の影響を受けるのと対照的。"
              source: "スズキ株式会社 2026年3月期決算説明資料"

      - maro: "つまりスズキは『インドの中で完結するサプライチェーン』を作り上げたから、日本と米国の貿易摩擦とは別の世界で生きてるってことなのだ。それって本当にすごいことなのだぞ。でも、なぜ他のメーカーは同じことができないのだぞ？"
        emotion: surprised
        show:
          type: image
          src: "content/map_asia.png"
          caption: "スズキのアジア・インドネットワーク"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "他のメーカーが真似できない理由が、ゲーム理論でいう『コミットメント効果』なんだよ。スズキは40年以上かけてインドのサプライヤーを育成してきたんだよね。インドには今、スズキ専用のティア1サプライヤーだけで400社以上いて、その会社たちはスズキと一緒に成長してきたから、簡単に他のメーカーに切り替えられないんだよ。"
        emotion: serious
        show:
          type: rich-panel
          title: "コミットメント効果：40年の蓄積"
          body: "ゲーム理論のコミットメント効果とは、長期にわたる投資・関係構築によって、後発者が同じ土俵に立てないほどの参入障壁を作ることを指す。スズキのインド事業はその教科書的事例といえる。"
          points:
            - text: "スズキ専用サプライヤーが400社超"
              value: "400社"
              unit: "インド国内ティア1サプライヤー数"
              body: "40年かけて共に成長したサプライヤー群は、スズキ固有の品質基準・コスト構造に最適化されており、現代自動車やトヨタが同水準の調達網を構築するには最低でも15〜20年を要するとされる。"
              source: "Society of Indian Automobile Manufacturers (SIAM) 2024年"
            - text: "インド政府との政治的資本"
              value: "45年"
              unit: "インド政府との協力関係"
              body: "1981年の国民車プロジェクト参加以来、インド政府との信頼関係は独自の無形資産。新工場の用地取得・税制優遇において、後発の外資メーカーには提供されない便宜を受け続けている。"
              source: "インド自動車工業会 ACMA 年次報告 2024年"

  - type: explanation
    topic: "インドGDPとスズキの成長エンジン"
    lines:
      - ponchan: "もう一つ重要なのが、スズキが依存するインド市場そのものの成長性なんだよ。2026年現在、インドのGDPは約3.7兆ドルで世界第5位になってるんだよね。IMFの予測では2030年には日本を抜いて世界第4位になるとされていて、この市場の拡大がスズキの成長エンジンになってるんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          title: "インドGDP：スズキの最強の追い風"
          body: "インドは2026年時点でGDP約3.7兆ドル、人口約14.4億人。年間自動車販売台数は約500万台で、2030年には700万台を超えると予測されている。この市場でシェア41%を持つスズキの成長余地は他の日本メーカーと比べて圧倒的に大きい。"
          points:
            - text: "インド自動車市場の成長余地"
              value: "500万台"
              unit: "2024年度の年間販売台数"
              body: "日本（約480万台）とほぼ同水準になったインドの自動車市場は、2030年に700万台超えが予測される。まだ自動車保有率が1000人あたり30台程度（日本は600台）と極めて低く、成長余地は計り知れない。"
              source: "Society of Indian Automobile Manufacturers (SIAM) 2025年統計"
            - text: "マルチ・スズキの収益成長率"
              value: "+18%"
              unit: "2024年度営業利益前年比"
              body: "インドルピー建てでは二桁成長が続いており、ルピー高・円安の為替効果も加わって日本円換算での利益は実態以上に膨らんでいる。"
              source: "マルチ・スズキ・インディア 2024年度決算発表"

      - maro: "つまりスズキは関税ショックと無縁なだけじゃなくて、インドという爆発的成長市場のど真ん中にいるってことなのだ。これって他の日本株と全然ちがう話なのだぞ。じゃあなぜ株価はまだそんなに上がってないのだぞ？"
        emotion: thinking
        show:
          type: image
          src: "content/img_factory.png"
          caption: "マルチ・スズキのグジャラート工場（インド）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "それが今日の核心なんだよ。市場はまだスズキを『日本の自動車メーカー』という括りで売ってるんだよね。関税ショックのニュースが出るたびにトヨタ・ホンダと一緒に下がるんだよ。でも本質はインド成長株に近い性格を持っていて、この誤認識が投資チャンスを生み出してるんだよ。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_suzuki_india_moat.png"
          caption: "スズキのインド護城河（モート）の全体像"
          position: top-center
          width: 1680
          duration: 10
          animation: fade

  - type: analysis
    topic: "マクロ環境と投資への影響"
    lines:
      - ponchan: "じゃあここから投資判断に直結する話をしていくよ。まず関税ショックが日本の自動車各社の利益にどれだけ影響するか、数字で見てほしいんだよ。このグラフがその衝撃を示してるんだよね。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: "tariff_impact"

