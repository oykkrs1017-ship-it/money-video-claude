chapters:
  - type: hook
    topic: "OpenAI上場+20%の衝撃"
    lines:
      - ponchan: "5000億ドル——これが2026年5月22日にOpenAIがIPO申請した瞬間の評価額で、同じ日にソフトバンクGの株価がストップ高プラス20%を記録したんだよ。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "5000億ドル"
          label: "OpenAI IPO申請時評価額（2026年5月22日）"

      - ponchan: "実はNISAで米国AI株を積み立てている30代のあなたが、OpenAIを1株も持っていないのに、ソフトバンクGを保有しているだけでこの恩恵をまるごと受けられる構造になっているんだよ。"
        emotion: surprised
        show:
          type: image
          src: "content/img_stock_market.png"
          caption: "ソフトバンクG ストップ高＋20%（2026年5月22日）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "えっ、OpenAIって非上場のAI企業なのに、なんでソフトバンクGがそんなに爆上げするんだぞ？俺、ソフトバンクGって携帯会社じゃないかって思ってたのだ！"
        emotion: surprised
        show:
          type: rich-panel
          title: "ソフトバンクGとは何者か"
          body: "ソフトバンクグループ(9984)は携帯キャリアではなく、AI・テクノロジー企業への投資を専業とする持株会社。孫正義氏が率いるVision Fund（総額1000億ドル超）を通じて世界中のスタートアップに出資している。2026年5月現在、OpenAIへの累計出資額は約400億ドルに達すると報じられている。"
          points:
            - text: "Vision Fund総額"
              value: "1000億ドル超"
              unit: "世界最大級のテックファンド"
              body: "Vision Fund 1（880億ドル）とVision Fund 2（500億ドル）を合わせると、単独ファンドとして世界最大規模のテック投資体制を持つ。"
              source: "SoftBank Group IR資料 2025年度"
            - text: "OpenAI累計出資額"
              value: "約400億ドル"
              unit: "2026年5月時点推計"
              body: "2025年のStargate計画参加以降、出資規模が急拡大。IPO後の持分価値は出資コストの数倍になる可能性がある。"
              source: "Bloomberg報道 2026年5月"

      - ponchan: "今日は3つ話すよ。①ソフトバンクGがOpenAI上場でなぜ+20%になる構造なのか、②ソフトバンクGとARMの具体的な買い場と目標株価、③日銀利上げでも成長株として買い続けられる根拠と撤退ラインだよ。"
        emotion: normal
        show:
          type: rich-panel
          title: "今日わかること3選"
          body: "この動画を最後まで見ると、OpenAI上場をきっかけにしたソフトバンクG・ARMへの投資判断が明確になる。数字ベースのエントリー条件と撤退ラインも提示するよ。"
          points:
            - text: "①なぜ+20%になるのか"
              body: "NAV構造・ゲーム理論・株主利益の連鎖を解説する。"
            - text: "②買い場と目標株価"
              body: "ソフトバンクG(9984)とARM(ARM)の具体的な価格帯を提示する。"
            - text: "③撤退ラインと日銀リスク"
              body: "日銀利上げシナリオ下でのリスクプレミアムと損切り水準を明示する。"

      - maro: "OpenAIが上場したら、ソフトバンクGの持っている株の価値がわかる、ってことなのだ？それって株式市場でよく言う『含み益の顕在化』ってやつじゃないのだぞ？"
        emotion: thinking
        show:
          type: chart
          key: "openai_valuation"

      - ponchan: "その通りで、まさにその『含み益の顕在化』がゲーム理論的に市場参加者全員を動かすトリガーになるんだよ。2021年に同じことがARMのIPOで起きていて、その日もソフトバンクGは急騰しているんだよね。"
        emotion: serious
        show:
          type: timeline
          title: "ソフトバンクG×IPO歴史年表"
          events:
            - { year: "2019年", label: "ウィーワーク上場失敗→NAV急落", highlight: false }
            - { year: "2020年", label: "コロナ禍でVision Fund評価損拡大", highlight: false }
            - { year: "2021年", label: "クーパン・Grab上場でNAV回復+20%超", highlight: true }
            - { year: "2023年9月", label: "ARM再上場→SBG株価+15%", highlight: true }
            - { year: "2026年5月", label: "OpenAI IPO申請→ストップ高+20%", highlight: true }

  - type: explanation
    id: "explanation-1"
    topic: "NAV構造とゲーム理論"
    lines:
      - ponchan: "じゃあまず、ソフトバンクGの株価がなぜOpenAI上場でここまで動くのか、その仕組みから説明するよ。鍵はNAVって概念なんだけど、これは『保有資産の純価値』のことなんだよね。"
        emotion: normal
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          number: 1
          icon: "📊"
          title: "NAVとは何か"
          body: "NAVとはNet Asset Value、つまり保有全資産の時価合計から負債を引いた純資産価値のこと。ソフトバンクGは携帯事業の利益ではなく、このNAVの拡大で株主価値を創造する会社なんだよ。株価はNAVに対して割引または割増で取引される。"
          points:
            - text: "NAV計算の構造"
              body: "ARM時価総額×保有比率 + OpenAI評価額×持分 + その他投資 − 純負債 = ソフトバンクGのNAV"
            - text: "NAVディスカウント"
              value: "約20〜30%"
              unit: "過去5年平均"
              body: "通常、ソフトバンクGはNAVに対して20〜30%割引で取引される。割引率が縮小するだけでも株価は大きく上昇する。"
              source: "SoftBank Group IR資料 2025年度"

      - maro: "つまりOpenAIが上場して評価額が5000億ドルって確定したら、ソフトバンクGが持っている分の価値も計算できるようになって、NAVがぐんと上がるってことなのだ！"
        emotion: surprised
        show:
          type: image
          src: "content/infographic_sbg_structure.png"
          caption: "ソフトバンクG→Vision Fund→OpenAI/ARM の投資構造"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "そう、完璧な理解だよ。そしてここにゲーム理論が絡んでくるんだよね。IPO申請が公表された瞬間、機関投資家・ヘッジファンド・個人投資家の全員が同じ計算をして、同じ方向に動くことが合理的な選択になるんだよ。"
        emotion: serious
        show:
          type: flow-chart
          title: "IPO申請→ソフトバンクG買い のゲーム理論構造"
          root:
            label: "OpenAI IPO申請"
            sublabel: "2026年5月22日"
            icon: "📢"
            children:
              - label: "機関投資家"
                sublabel: "NAV再計算→買い"
                highlight: true
                detail:
                  title: "機関投資家の合理的選択"
                  items: ["OpenAI持分価値を再算定", "SBGのNAV上昇を先取り買い"]
                  color: "#4a9eff"
              - label: "ヘッジファンド"
                sublabel: "モメンタム追随→買い"
                detail:
                  title: "アルゴリズム的買い"
                  items: ["機関投資家の動きに追随", "出来高増大でさらに買いシグナル"]
              - label: "個人投資家"
                sublabel: "ニュース反応→買い"
                detail:
                  title: "リテール投資家の動き"
                  items: ["報道を見て参入", "ストップ高でさらに注目度上昇"]
          footer: "全プレイヤーの支配戦略が「買い」に収束→ストップ高"

      - maro: "みんなが同じ計算をして同じ結論に達したら、全員が買いに走るのは当たり前だぞ！でもこれって持続するのだ？単なる一時的な興奮じゃないのだぞ？"
        emotion: thinking
        show:
          type: rich-panel
          number: 2
          icon: "🧠"
          title: "ゲーム理論：支配戦略均衡"
          body: "全プレイヤーが「他のプレイヤーも買う」と予測する場合、自分も買うことが支配戦略になる。これをナッシュ均衡という。OpenAI IPO申請は情報の不確実性を解消し、全市場参加者の予測を一致させる強力なシグナルとして機能した。"
          points:
            - text: "支配戦略の収束"
              body: "機関・ヘッジ・個人の全員が「他者も買う」と読めば、自分も買うことが最適解になる。これがストップ高を作る。"
            - text: "情報の非対称性解消"
              body: "IPO申請以前はOpenAIの評価額が推計にすぎなかったが、申請により評価額が公的に確定。不確実性プレミアムが縮小した。"
            - text: "過去の類似例"
              value: "+15%"
              unit: "ARM上場発表日のSBG上昇率（2023年）"
              body: "2023年9月のARM再上場発表時にも同じ構造でSBGが急騰した。今回のOpenAI上場はARMを上回る規模のため+20%を記録。"
              source: "東京証券取引所 日次株価データ 2023年"

      - ponchan: "持続性については、短期の興奮と中長期の構造的上昇は分けて考える必要があるんだよ。一時的な興奮は1〜2週間で落ち着くけど、その後のOpenAI上場プロセスが進むにつれてNAVは段階的に上昇していくんだよね。"
        emotion: normal
        show:
          type: chart
          key: "sbg_nav_breakdown"

  - type: explanation
    id: "explanation-2"
    topic: "ARM連鎖とNAV計算"
    lines:
      - ponchan: "次に、ソフトバンクGの保有資産の中でARMとOpenAIがそれぞれどれくらいの重みを持つのか、実際のNAVを計算してみるよ。これを見ると、なぜ今が特別な局面なのかがわかるんだよ。"
        emotion: normal
        show:
          type: rich-panel
          number: 3
          icon: "💹"
          title: "SBG NAV試算（2026年5月）"
          body: "ソフトバンクGのNAVは2026年5月時点で約40兆円と試算される。ARM保有株が最大のウェイトを占め、OpenAI持分が今回のIPO申請で初めて時価評価可能になった。この2つが同時に拡大しているのが今の相場の特殊性だ。"
          points:
            - text: "ARM保有価値（90%超保有）"
              value: "約22兆円"
              unit: "ARM時価総額×保有比率"
              body: "ソフトバンクGはARM株を上場時に売却せず90%超を保有継続。ARM株価の1%の変動がSBGのNAVを約2200億円動かす。"
              source: "ARM Holdings IR 2026年3月期決算"
            - text: "OpenAI持分価値（推計）"
              value: "約6兆円"
              unit: "5000億ドル評価×持分比率8%"
              body: "Vision Fundを通じた持分比率は約8%と推計。IPO申請によりこの価値が初めて市場に可視化された。"
              source: "Bloomberg推計 2026年5月"
            - text: "Vision Fund1/2その他"
              value: "約8兆円"
              unit: "ByteDance・Grab等"
              body: "非上場のByteDance（TikTok親会社）等も保有。地政学リスクで評価にブレがある。"
              source: "SoftBank Group IR資料 2026年3月期"

      - maro: "ちょっと待つのだ。ARM保有が22兆円ってことは、ARM株が1割落ちたらNAVが2兆円以上吹っ飛ぶってことじゃないのだぞ？それって相当リスキーじゃないのだ？"
        emotion: serious
        show:
          type: chart
          key: "arm_revenue_growth"

      - ponchan: "まろくんの指摘は正確だよ。ARM依存がソフトバンクGの最大のリスク要因で、これはリスクシナリオとして後でちゃんと話すね。ただまず押さえておきたいのは、ARMがなぜ今この成長率を維持できているかなんだよ。"
        emotion: thinking
        show:
          type: rich-panel
          number: 4
          icon: "💡"
          title: "ARMが成長を続ける理由"
          body: "ARMはスマートフォン向けチップ設計の事実上の標準（スマホの99%に搭載）から、2023年以降はAIデータセンター・サーバー向けへ急速に展開している。NVIDIA・Apple・Qualcommが全員ARMアーキテクチャに依存しており、AI需要の拡大がそのままARMのロイヤルティ収入増加に直結する構造になっている。"
          points:
            - text: "AI向けロイヤルティ単価上昇"
              value: "スマホ比5〜10倍"
              unit: "AI/サーバーチップのロイヤルティ単価"
              body: "スマートフォン向けは1チップあたり数セントだが、AI向けサーバーチップは数十セント〜数ドルのロイヤルティが発生する。AIチップの数量×単価上昇の複利効果が成長を加速させている。"
              source: "ARM Holdings Investor Day 2025"
            - text: "FY2026売上高予想"
              value: "約45億ドル"
              unit: "前年比+28%成長予想"
              body: "AI向けの比率が全体の30%を超え始めており、今後2〜3年でさらに比率が上昇する見通し。"
              source: "ARM Holdings FY2026 Guidance"

      - maro: "なるほど、ARMってスマホだけじゃなくてAIサーバーにも入り込んでるんだぞ。NVIDIAもAMDも全部ARMに乗っかってるって、これは強すぎるじゃないのだ！"
        emotion: happy
        show:
          type: image
          src: "content/img_ai_chip.png"
          caption: "AIチップにARMアーキテクチャが搭載される構造"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "そしてこれが今回のOpenAI上場と合わさることで、ARM＋OpenAIという2つの爆発的成長資産を同時に保有するソフトバンクGの価値が、一気に再評価されたんだよ。テレビではなかなかここまで踏み込んだ話はしてくれないよね。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_openai_valuation_donut.png"
          caption: "OpenAI株主構成推計（Vision Fund含むSBG持分約8%）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

  - type: analysis
    id: "analysis-1"
    topic: "マクロ環境と日銀利上げリスク"
    lines:
      - ponchan: "ここから投資判断の核心に入るよ。ソフトバンクGの具体的なエントリー価格と目標株価を話す前に、今の日銀利上げ環境というマクロリスクをちゃんと整理しておく必要があるんだよ。"
        emotion: normal
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          number: 1
          icon: "🏦"
          title: "日銀利上げとグロース株の関係"
          body: "2026年5月現在、日銀は政策金利を0.5%に維持しているが、年内に0.75%〜1.0%への追加利上げが市場では織り込まれ始めている。金利が上がると将来キャッシュフローの割引率が高まり、利益の大部分が遠い将来にある成長株（グロース株）のバリュエーションが圧縮される。ソフトバンクGはこの典型的なグロース株だ。"
          points:
            - text: "グロース株への金利感応度"
              value: "PER圧縮リスク"
