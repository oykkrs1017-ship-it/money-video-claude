chapters:
  - type: hook
    topic: "原油117ドルの衝撃"
    lines:
      - ponchan: "1バレル117ドル63セント——2026年4月、ホルムズ海峡封鎖で原油が年初から約90%急騰し、日本のエネルギーコストが根底から揺らいでいるんだよ。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "117ドル"
          label: "WTI原油 2026年4月初旬の一時高値（年初比＋92%）"

      - maro: "え、年初は61ドルだったのに4月には117ドルって、たった3ヶ月で2倍近くになったってことなのだ？それって家計や株価にも直撃するんだぞ？"
        emotion: surprised
        show:
          type: chart
          key: "crude_oil_price"

      - ponchan: "今日は3つ話すよ。①なぜホルムズ封鎖で日本だけがこれほど追い詰められるのかという構造的な理由、②INPEX・関西電力・商船三井の具体的な買い場と価格帯、③万が一停戦が長引いた場合の撤退ラインだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "🎯"
          title: "今日学べる3つのこと"
          body: "ホルムズ封鎖は「遠い中東の話」じゃない。日本の光熱費・物価・株価に直結する話だよ。今日の3点を押さえれば明日の投資判断が変わるんだよ。"
          points:
            - "①日本が88%中東依存という構造的脆弱性の正体"
            - "②INPEX・関西電力・商船三井の具体的エントリー価格帯"
            - "③停戦シナリオ別の上昇トリガーと撤退ライン"

      - maro: "88%って…日本の原油のほぼ全部が中東から来てるってことなのだ。それが封鎖されたら本当にどうなるんだぞ、怖すぎるのだ。"
        emotion: surprised
        show:
          type: image
          src: "content/map_middleeast.png"
          caption: "ホルムズ海峡：幅約50km、世界の海上原油輸送の約20〜27%が通過"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "2026年2月28日、米国とイスラエルがイランへの軍事攻撃を開始した。その数日後、イラン革命防衛隊が『海峡は閉鎖された』と宣言して、世界の原油市場は歴史的な大混乱に突入したんだよ。"
        emotion: serious
        show:
          type: timeline
          title: "ホルムズ封鎖クライシス 2026年"
          events:
            - { year: "2026年1月", label: "WTI原油 61ドル台で推移", highlight: false }
            - { year: "2026年2月28日", label: "米・イスラエルがイランへ軍事攻撃開始", highlight: true }
            - { year: "2026年3月2日", label: "IRGC「海峡閉鎖」宣言。大手海運4社が通過停止", highlight: true }
            - { year: "2026年3月末", label: "WTI 117ドル超。IEAが「史上最大の供給障害」と表現", highlight: true }
            - { year: "2026年4月8日", label: "米・イラン2週間停戦合意で株価急騰、日経平均2878円高", highlight: false }
            - { year: "2026年4月23日", label: "原油80ドル台に下落も通航制約は継続", highlight: false }

      - maro: "2026年3月2日に海峡が閉鎖宣言されて、その日のうちに原油タンカーの通航がほぼゼロになったってこと？物流が一気に止まるなんて信じられないのだ。"
        emotion: surprised
        show:
          type: chart
          key: "hormuz_throughput"

      - ponchan: "封鎖前は1日平均24隻の原油タンカーが通過していたのに、3月1日には4隻まで落ち込んで、その後はほぼゼロが続いたんだよ。しかも大手海上保険会社が『戦争リスク保険』の引き受けを停止したから、保険なしでは船主が動けなくなったんだよ。"
        emotion: serious
        show:
          type: comparison-table
          title: "封鎖前後：ホルムズ海峡の状況"
          columns:
            - { label: "封鎖前（2026年2月）", winner: false }
            - { label: "封鎖後（2026年3月〜）", winner: false }
          rows:
            - { label: "原油タンカー通過数/日", values: ["24隻", "ほぼ0隻"] }
            - { label: "戦争リスク保険", values: ["通常引き受け", "引き受け停止"] }
            - { label: "大手海運の対応", values: ["通常運航", "通過停止（4社）"] }
            - { label: "原油価格(WTI)", values: ["61ドル台", "117ドル超"] }
          footer: "IEAは「世界の石油市場史上最大の供給障害」と表現"

      - maro: "日本郵船も商船三井も動けなかったということは、日本に向けての原油が完全に止まっていたってことなのだ？それで日本の電気代や物価がどうなったんだぞ？"
        emotion: thinking
        show:
          type: image
          src: "content/img_oil.png"
          caption: "封鎖による供給喪失：日量1,300万バレル超（IEA試算）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "野村証券は2026年度のCPI上昇率の見通しを前年比プラス2.6%に引き上げたんだよ。さらに原油が120ドル高止まりしたらコアCPIがピーク時に前年同期比4%を超える可能性まで試算されているんだよ。これは家計に対する直撃だよ。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_cpi_scenario.png"
          caption: "野村証券試算：原油120ドル高止まりでコアCPI4%超のリスク"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "コアCPIが4%超えって、食料品や光熱費が全部上がるってことなのだ。これって日銀が追加利上げを急ぐことにもなりかねないんだぞ？株式市場にも影響しそうなのだ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "⚠️"
          title: "インフレ連鎖の3段階"
          body: "原油高騰は単なるガソリン代の問題ではなく、電気・ガス代→輸送コスト→食料品価格という3段階の連鎖を起こす。これが家計と企業収益を同時に圧迫するんだよ。"
          points:
            - "①電気・ガス代の上昇（直接コスト増）"
            - "②輸送コスト増→製造業・小売の収益圧迫"
            - "③食料品・日用品の値上がりで実質賃金が目減り"
            - "④日銀の利上げ圧力→住宅ローン・設備投資コスト上昇"

      - ponchan: "だから今回の危機を『原油相場の乱高下』という相場の話で終わらせてはいけないんだよ。これは日本経済の構造的な脆弱性が一気に表面化した歴史的な分水嶺で、投資家として正しいポジションを取る絶好のタイミングでもあるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "📌"
          title: "この動画のポジション"
          body: "危機には必ず「恩恵を受ける側」と「ダメージを受ける側」が存在する。今日は恐怖で思考停止するのではなく、具体的な投資アクションに落とし込む方法を一緒に考えようね。"
          points:
            - "原油高の恩恵：資源株・電力株・海運株の一部"
            - "原油高のダメージ：製造業・航空・化学・運輸"
            - "構造的脆弱性：日本の88%中東依存は短期で変わらない"

  - type: explanation
    topic: "日本脆弱性の構造"
    lines:
      - ponchan: "まずホルムズ封鎖がなぜ日本にとってこれほど致命的なのかを理解するために、2026年に起きていることを時系列で整理してみようね。"
        emotion: normal
        se: "se/whoosh.mp3"
        show:
          type: image
          src: "content/infographic_japan_oil_import.png"
          caption: "日本の原油輸入：88%が中東依存（2025年実績）"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "88%中東依存って改めて数字で見るとすごい数字なのだ。アメリカは自国でシェールオイルを採掘しているから自給できるのに、日本はなぜこんなに依存しているんだぞ？"
        emotion: thinking
        show:
          type: chart
          key: "japan_energy_dependency"

      - ponchan: "日本は国内にほとんど油田を持っていないんだよ。アメリカのシェール革命以降、米国は世界最大の産油国になったけど、日本はそういった地下資源に恵まれていないから構造的に輸入に頼らざるを得ないんだよ。だからこそホルムズが閉まると直撃を受けるんだよ。"
        emotion: serious
        show:
          type: flow-chart
          title: "日本のエネルギー依存構造"
          root:
            label: "日本の原油輸入"
            sublabel: "年間約150万バレル/日"
            icon: "🛢️"
            children:
              - label: "中東ルート（88%）"
                sublabel: "ホルムズ海峡経由"
                highlight: true
                detail:
                  title: "主要輸入先"
                  items: ["サウジアラビア 38%", "UAE 27%", "クウェート 10%"]
                  color: "#cc4444"
              - label: "非中東ルート（12%）"
                sublabel: "ロシア・東南アジア等"
                detail:
                  items: ["ロシア制裁後は更に縮小", "代替調達コストが高い"]
          footer: "サウジ・UAEの代替パイプラインでも海峡通過量の一部しか補えない"

      - maro: "サウジアラビアやUAEには一応パイプラインがあるって聞いたことがあるのだ。それでは補えないんだぞ？"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🛢️"
          title: "迂回ルートの限界"
          body: "サウジアラビアのペトロラインとUAEのハブシャンパイプラインを合わせても、その容量は日量約800万バレル程度。ホルムズを通る約2,000万バレルの半分にも満たないんだよ。"
          points:
            - "サウジ：ペトロライン（容量500万バレル/日）→紅海へ"
            - "UAE：アブダビ〜フジャイラパイプライン（300万バレル/日）"
            - "合計800万バレルで2,000万バレルをカバー不可"
            - "イラク・クウェート・カタールは迂回ルートがほぼ皆無"

      - ponchan: "EIAの分析によれば、サウジとUAEの代替パイプライン能力を合わせても、ホルムズを通る量の一部しか代替できないんだよ。IEAの4月報告では、危機前に日量2,000万バレル超あったホルムズ経由の出荷が4月初めには日量約380万バレルに落ち込んだと発表しているんだよ。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_hormuz_supply_drop.png"
          caption: "IEA：封鎖後の通過量は封鎖前比81%減"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "2,000万バレルが380万バレルに…これって81%減ってことなのだ！そんなに急激に落ちたら世界の在庫なんてすぐに底をつくんじゃないのだぞ？"
        emotion: surprised
        show:
          type: rich-panel
          icon: "📦"
          title: "世界の原油在庫の急減"
          body: "IEAの4月報告によれば、3月の世界の観測在庫は8,500万バレル減少し、中東湾外の在庫は2億500万バレル減少した。アジアの輸入国でも原油在庫が3,100万バレル減っており、4月も減少が続く見通しなんだよ。"
          points:
            - "世界観測在庫：3月に8,500万バレル減"
            - "中東湾外在庫：2億500万バレル減"
            - "アジア在庫：3,100万バレル減（4月も減少続く）"
            - "在庫取り崩しの限界→価格の下限を支える構造"

      - ponchan: "そうなんだよ。在庫が減り続けると価格の下限が切り上がっていくんだよ。EIAの4月の短期エネルギー見通しではブレント価格が2026年の4〜6月期に115ドルでピークを付けると予測しているんだよ。2026年平均でも96ドルという見方なんだよ。"
        emotion: serious
        show:
          type: chart
          key: "supply_loss"

      - maro: "停戦になっても原油が下がりにくいのは在庫の問題があるからなのだ。じゃあ、停戦合意が出た4月8日の株価急騰のあとでも原油が高止まりしているのはそのせいなんだぞ？"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🔄"
          title: "「停戦≠海峡再開」の構造"
          body: "4月8日の停戦合意でWTI原油は91ドル台まで急落したが、海峡の安全確認・船会社の保険手配・港湾手続き・制裁の取り扱いという複数のハードルが残るため、タンカーはすぐには戻ってこないんだよ。"
          points:
            - "停戦合意後も海峡通航は1割強にとどまる"
            - "大手海運の保険問題は即座に解決しない"
            - "生産停止した油田は再稼働に時間がかかる"
            - "ADNOCのCEO：「アクセスは制限・条件付き・管理下」と明言"

      - ponchan: "まさにそのとおりだよ。実際にKplerのレポートによれば、6週間の封鎖で中東からの原油輸出量は日量1,500万バレルから700万バレルへと半減したんだよ。この『需給ギャップ』は市場が日量約600万バレルの不足を抱えている状態で、停戦だけでは即座に埋まらないんだよ。"
        emotion: serious
        show:
          type: comparison-table
          title: "Kpler試算：封鎖6週間の損失"
          columns:
            - { label: "封鎖前", winner: false }
            - { label: "封鎖後", winner: false }
          rows:
            - { label: "中東からの原油輸出量（百万バレル/日）", values: ["15.0", "7.0"] }
            - { label: "精製所稼働削減", values: ["通常水準", "広域で稼働削減"] }
            - { label: "市場の需給ギャップ", values: ["均衡", "600万バレル/日不足"] }
          footer: "Kpler レポート（2026年4月7日）"

      - maro: "じゃあ日本はもう完全にお手上げなのだ？中東頼みの構造が変わらない限り、何度でも同じことが起きるんだぞ…。"
        emotion: serious
        show:
          type: rich-panel
          icon: "🇯🇵"
          title: "日本の構造的ジレンマ"
          body: "日本は石油備蓄（国家備蓄＋民間合計で約230日分）を持っているが、これは応急措置に過ぎない。IEAの最低基準（90日分）は十分に満たしているが、長期化する封鎖や繰り返す地政学リスクには根本的な解決策が必要なんだよ。"
          points:
            - "石油備蓄は約230日分（国家＋民間）→応急措置にはなる"
            - "LNG備蓄は数週間〜1ヶ月程度と短い"
            - "再生可能エネルギーの比率：現状20%台で依然化石燃料依存"
