description: "2026年3月、ホルムズ海峡が事実上封鎖され原油は年初61ドルから117ドルへ急騰。日本の原油輸入の約88%が中東依存という構造的脆弱性が露わになった今、INPEXや関西電力など具体銘柄のエントリー価格・上昇トリガー・撤退ラインを徹底解説します。"
