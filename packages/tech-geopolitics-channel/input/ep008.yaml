chapters:
  - type: hook
    topic: "2兆ドルの巨大工場"
    lines:
      - ponchan: "2兆ドル、日本円にして約300兆円という途方もない金額が、たった一つのAI半導体工場に投じられようとしているんだよ。"
        emotion: serious
        show:
          type: stat
          value: "2兆ドル（約300兆円）"
          label: "Terafab計画 総投資額"
      - maro: "300兆円って、日本の国家予算の2年分を超えてるレベルなのだ。一体誰がそんな計画を立ててるんだぞ？"
        emotion: surprised
        show:
          type: rich-panel
          icon: "🏗️"
          title: "Terafab計画とは"
          body: "イーロン・マスクが主導する世界最大のAI半導体製造施設。\nテキサス州を候補地とし、2025年に正式発表。"
          emphasis: "世界最大"
          points:
            - "Tesla/xAI/SpaceXが需要を束ねる"
            - "Intelが製造パートナーとして参画"
            - "TSMC依存からの脱却が最大の狙い"
      - ponchan: "その名はTerafab、イーロン・マスクがTesla・xAI・SpaceXの3社を束ねて建設を主導する世界最大のAI半導体工場なんだよ。"
        emotion: serious
      - maro: "マスクがまた壮大なことを言い出したと思いきや、今回はIntelまで正式に参画しているという話なのだ、これは本気度が違うぞ。"
        emotion: surprised
        show:
          type: rich-panel
          icon: "🤝"
          title: "Intel参画の意味"
          body: "Intel Foundry Servicesがカスタムチップの受託製造を担当。\n最先端18Aプロセスの採用が見込まれる。"
          emphasis: "Intel 18Aプロセス"
          points:
            - "Intelにとって最大のファウンドリ顧客候補"
            - "マスク3社のチップ需要は年間数十億ドル規模"
            - "米国内製造で地政学リスクを回避"
      - ponchan: "しかもこの計画、単なるマスクの夢物語じゃなくて、米国政府のCHIPS法による補助金とも連動している国家プロジェクト級の話なんだよ。"
        emotion: serious
      - maro: "つまり民間の野心と国策が合流しているということなのだ。これは過去の半導体産業の歴史を振り返ると、とんでもない転換点になりうるぞ。"
        emotion: thinking
      - ponchan: "そう、まさに1987年に日本の半導体攻勢に対抗して設立されたSEMATECHの現代版とも言える構図で、歴史が繰り返されようとしているんだよ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "📜"
          title: "SEMATECH（1987年）"
          body: "米国政府と14社の半導体企業が共同出資した半導体製造技術コンソーシアム。\n日本の半導体シェア拡大に対抗し、米国の製造技術基盤を維持することが目的だった。"
          emphasis: "1987年の再来"
          points:
            - "政府資金＋民間連合の構図が酷似"
            - "当時は日本、今回はTSMC/中国が対抗軸"
            - "SEMATECHは米国半導体復権に成功した実績あり"
      - maro: "SEMATECH！まさに冷戦期の半導体戦争の再来パターンなのだ。でもSEMATECHの投資額と比べると桁が何個も違うぞ。"
        emotion: surprised
      - ponchan: "その通りで、SEMATECHはインフレ調整しても約50億ドル規模だったのに対して、Terafabは初期だけで1000億ドル、最終的に2000億ドルに達するんだよ。"
        emotion: serious
      - maro: "規模が40倍ということは、成功した場合の産業インパクトも桁違いに大きいということなのだ。投資家として絶対に押さえておくべきテーマだぞ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "💰"
          title: "投資家が注目すべき理由"
          body: "Terafabは半導体サプライチェーン全体の勢力図を書き換える可能性がある。\nIntel・TSMC・NVIDIA・装置メーカーすべてに波及する。"
          emphasis: "勢力図の書き換え"
          points:
            - "Intelの株価は計画発表後に大きく変動"
            - "TSMC独占体制が崩れるシナリオが浮上"
            - "装置メーカーへの大量受注が見込まれる"
      - ponchan: "今日はこのTerafab計画の全貌を分解して、冷戦期SEMATECHとの類似点、意外な勝者候補、そして具体的な投資戦略まで一気に掘り下げていくよ。"
        emotion: serious
      - maro: "これは見逃せない内容なのだ。半導体投資の方向性が大きく変わるかもしれないから、最後までしっかり聞いていくぞ。"
        emotion: serious
  - type: explanation
    topic: "Terafabの全貌"
    lines:
      - ponchan: "まずTerafabの基本構造を整理していくね。この工場はマスクが率いるTesla・xAI・SpaceXの3社が主要な顧客兼出資者になるんだよ。"
        emotion: normal
        show:
          type: rich-panel
          number: 1
          icon: "🏭"
          title: "Terafabの基本構造"
          body: "Tesla/xAI/SpaceXの3社がチップ需要を集約し、Intelが受託製造する垂直統合モデル。\n従来のファウンドリモデルとは異なり、需要側が工場建設を主導する点が革新的。"
          emphasis: "需要側主導の新モデル"
          points:
            - "Teslaは自動運転チップHW5以降を内製志向"
            - "xAIはGrok学習用カスタムAIチップを計画"
            - "SpaceXはStarlink衛星用の通信チップを大量消費"
            - "3社合計で年間チップ需要は数十億ドル規模"
      - maro: "ちょっと待ってほしいのだ。普通は半導体工場を建てるのはTSMCやIntelみたいな製造会社であって、顧客側が工場を建てるのは異例だぞ。"
        emotion: thinking
      - ponchan: "まさにそこがTerafabの革新的なポイントで、マスクは自分たちのチップ需要があまりにも大きいから、自前の製造基盤を確保しないと事業が成り立たないと判断したんだよ。"
        emotion: normal
        show:
          type: rich-panel
          number: 2
          icon: "📊"
          title: "マスク3社のチップ需要"
          body: "TeslaだけでもFSD用チップの年間需要は数百万個単位。\nxAIのスーパーコンピュータ『コロッサス』は10万基のGPUを搭載し、さらに拡張予定。"
          emphasis: "自前製造の必然性"
          points:
            - "Tesla：年間200万台以上の車両にFSDチップ搭載"
            - "xAI：2025年中にGPU30万基体制を計画"
            - "SpaceX：Starlink衛星6000基以上が稼働中"
      - maro: "なるほど、つまりマスクは半導体の買い手としてあまりにも巨大になりすぎて、TSMCに並んで待っている場合ではなくなったということなのだ。"
        emotion: thinking
      - ponchan: "そしてここにIntelが製造パートナーとして入ってくる構図がめちゃくちゃ重要で、Intel Foundry Servicesにとってこれは起死回生のチャンスなんだよ。"
        emotion: serious
        show:
          type: chart
          key: "globalFoundryShare"
      - maro: "このグラフを見ると、TSMCが約65%で圧倒的なのに対して、Intel Foundryのシェアはたった1.5%なのだ。これは厳しい現実だぞ。"
        emotion: surprised
      - ponchan: "そうなの。Intelはファウンドリ事業を2021年に本格始動したけど、外部顧客がほとんど獲得できず赤字が続いていたんだよ。それがTerafabで一気に変わる可能性があるの。"
        emotion: normal
        show:
          type: rich-panel
          number: 3
          icon: "🔧"
          title: "Intel 18Aプロセス"
          body: "Intelが2025年後半に量産開始を目指す最先端製造技術。\nTSMCのN2プロセスに対抗するポジションで、裏面電力供給（BSPDN）を採用。"
          emphasis: "Intel 18A"
          points:
            - "トランジスタ密度でTSMC N2に匹敵"
            - "裏面電力供給で電力効率を大幅改善"
            - "Terafabの主力プロセスとして採用見込み"
            - "歩留まり改善が最大の課題"
      - maro: "18Aプロセスがうまくいけばすごいけど、Intelは過去にも10nmや7nmで大幅な遅延を繰り返してきた前科があるのだ。本当に大丈夫なのか心配だぞ。"
        emotion: thinking
      - ponchan: "その懸念はもっともで、実はここにSEMATECHとの歴史的類似性が鍵を握っているんだよ。1987年のSEMATECHも同じような状況から始まったの。"
        emotion: serious
        show:
          type: timeline
          title: "半導体国策プロジェクトの歴史"
          events:
            - { year: "1987年", label: "SEMATECH設立（対日本）", highlight: true }
            - { year: "1993年", label: "米国が半導体シェア首位奪還", highlight: false }
            - { year: "2022年", label: "CHIPS法成立（対中国/TSMC依存）", highlight: true }
            - { year: "2025年", label: "Terafab計画発表", highlight: true }
            - { year: "2028年", label: "Terafab稼働目標", highlight: false }
      - maro: "1987年から1993年のわずか6年で米国が首位を奪還したのは事実なのだ。国策と民間が本気で連携すると凄まじい成果が出ることは歴史が証明しているぞ。"
        emotion: thinking
      - ponchan: "まさにそこで、SEMATECHのときは日本のDRAMシェアが80%に達して米国が危機感を持った。今回はTSMCが最先端ロジック半導体の92%以上を製造している状況が引き金なんだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 4
          icon: "🔄"
          title: "SEMATECH vs Terafab比較"
          body: "両者とも『外国依存への危機感』が起点。\nしかし投資規模・対象技術・民間主導度が大きく異なる。"
          emphasis: "歴史は繰り返すが規模は桁違い"
          points:
            - "SEMATECH：政府主導、14社参加、製造技術共有"
            - "Terafab：民間主導、マスク3社＋Intel、実製造"
            - "SEMATECH：約50億ドル → Terafab：最大2000億ドル"
            - "成功条件：18Aプロセスの歩留まり確保が最大関門"
      - maro: "規模が40倍以上違うのに加えて、SEMATECHは技術開発コンソーシアムだったのに対して、Terafabは実際にチップを大量生産する工場なのだ。より直接的なインパクトがあるぞ。"
        emotion: serious
      - ponchan: "そしてもう一つ重要なのが、CHIPS法による補助金の存在なんだよ。Intelは既にCHIPS法から78.6億ドルの補助金を獲得していて、これがTerafabの資金源の一部になるの。"
        emotion: normal
        show:
          type: chart
          key: "chipsActFunding"
      - maro: "IntelがCHIPS法で最大の受益者になっているのは知らなかったのだ。TSMCやSamsungよりも多くの補助金を受けているということは、米国政府がIntelに賭けている証拠だぞ。"
        emotion: surprised
  - type: explanation
    topic: "なぜTSMC依存が危険か"
    lines:
      - ponchan: "ここで改めて整理しておきたいのが、なぜTSMC依存がそこまで危険視されているかという根本的な問題なんだよ。数字で見ると衝撃的なの。"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "⚠️"
          title: "TSMC依存の実態"
          body: "最先端7nm以下のロジック半導体において、TSMCの製造シェアは92%超。\nApple・NVIDIA・AMD・Qualcommなど主要テック企業が全面依存している。"
          emphasis: "92%が台湾の1社に集中"
          points:
            - "Apple A/Mシリーズ：100%TSMC製造"
            - "NVIDIA H100/B200：100%TSMC製造"
            - "AMD EPYC/Ryzen：100%TSMC製造"
            - "台湾海峡の地政学リスクが常に存在"
      - maro: "92%という数字は異常な集中度なのだ。これがもし止まったら、スマホもデータセンターも自動運転も全部止まるということだぞ。"
        emotion: serious
      - ponchan: "しかもTSMCの工場は台湾西部の科学園区に集中していて、台湾海峡から直線距離でわずか100〜200kmしか離れていないんだよ。軍事的に見て非常に脆弱な立地なの。"
        emotion: serious
        show:
          type: rich-panel
          number: 2
          icon: "🗺️"
          title: "地理的脆弱性"
          body: "TSMCの主要ファブは新竹・台中・台南の3拠点に集中。\nいずれも台湾海峡に面した西海岸に位置し、軍事衝突時に最前線となる。"
          emphasis: "海峡から100〜200km"
          points:
            - "中国軍の短距離弾道ミサイル射程内"
            - "海上封鎖だけでも化学薬品の輸入が停止"
            - "EUV装置の保守部品も海外依存"
      - maro: "だからマスクは自分のビジネスを守るために、米国内に製造拠点を確保する必要があったということなのだ。単なる野心じゃなくて合理的なリスク管理だぞ。"
        emotion: thinking
      - ponchan: "ここで面白いのが、過去エピソードでも扱った台湾有事シナリオとは全く違う切り口になるということなんだよ。台湾有事は『壊れたらどうなるか』の話だったけど、Terafabは『壊れる前に代替を作る』話なの。"
        emotion: normal
        show:
          type: rich-panel
          number: 3
          icon: "🔮"
          title: "攻めの地政学戦略"
          body: "従来の議論は『台湾有事でサプライチェーンが断絶するリスク』に焦点。\nTerafabは断絶を前提に代替供給源を構築する攻めの戦略。"
          emphasis: "壊れる前に作る"
          points:
            - "防御（リスク回避）から攻撃（供給確保）へ転換"
            - "マスク3社の需要だけで工場稼働率を維持可能"
            - "成功すれば他のテック企業もIntelに発注する流れ"
            - "TSMCの交渉力低下 → 価格競争が発生"
      - maro: "なるほど、つまりTerafabが成功すると、TSMCにとっては顧客を失うだけでなく、価格交渉力まで失う二重のダメージになるということなのだ。"
        emotion: thinking
      - ponchan: "まさにそうで、ここが今回のテーマの核心部分なんだよ。Terafabの成否によって、半導体産業の勝者と敗者が入れ替わる可能性があるの。"
        emotion: serious
        show:
          type: rich-panel
          number: 4
          icon: "🏆"
          title: "勝者と敗者のシナリオ"
          body: "Terafab成功時と失敗時で、投資家が注目すべき銘柄が大きく変わる。\n成功シナリオではIntelとマスク関連企業が最大の受益者となる。"
          emphasis: "勝者は誰か？"
          points:
            - "成功時の勝者：Intel・Tesla・半導体装置メーカー"
            - "成功時の敗者：TSMC（独占崩壊）・Samsung"
            - "失敗時の勝者：TSMC（独占維持）・NVIDIA"
            - "失敗時の敗者：Intel（信頼喪失）・マスク3社"
      - maro: "投資家としてはどちらのシナリオに賭けるかで、ポートフォリオの組み方が180度変わるのだ。これは本当に重要な分岐点だぞ。"
        emotion: serious
      - ponchan: "だからこそ次のチャプターでは、具体的なバリュエーションとエントリー条件を銘柄ごとに詰めていくよ。感覚じゃなくて数字で判断するのが大事だからね。"
        emotion: normal
  - type: analysis
    topic: "マクロ環境と需要予測"
    lines:
      - ponchan: "まずマクロ環境から整理していくね。AIアクセラレータ市場は2022年の300億ドルから2024年に920億ドルへ3倍以上に急拡大しているんだよ。"
        emotion: normal
        show:
          type: chart
          key: "aiChipDemandForecast"
      - maro: "2027年には2800億ドル予測なのだ。たった5年で約10倍という成長率は、スマートフォン普及期のモバイルチップ市場を超えるペースだぞ。"
        emotion: surprised
        show:
          type: rich-panel
          icon: "📈"
          title: "AI半導体市場の爆発的成長"
          body: "生成AI・自動運転・ロボティクスの3分野が同時に立ち上がり、半導体需要が爆発。\n2024年の920億ドルから2027年に2800億ドルへ成長見込み。"
          emphasis: "年平均成長率45%超"
          points:
            - "データセンターGPU需要が最大のドライバー"
            - "自動運転向けカスタムチップ需要が2026年に本格化"
            - "エッジAI（スマホ・PC）向けも2025年から加速"
      - ponchan: "この巨大な需要増加に対して、最先端半導体の供給能力はTSMCにほぼ一極集中しているのが現状で、需給ギャップが深刻化しているんだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 1
