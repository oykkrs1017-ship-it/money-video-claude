chapters:
  - type: hook
    topic: "日経平均は嘘をつく"
    lines:
      - ponchan: "1244円安——これが5月15日の日経平均の下落幅だけど、実はこの衝撃的な数字の4分の1、約300円分はアドバンテスト1銘柄だけで説明できちゃうんだよ。"
        emotion: serious
        se: "se/impact.mp3"
        show:
          type: stat
          value: "1244円安"
          label: "5/15 日経平均の下落幅——うち300円はアドバンテスト1銘柄"

      - maro: "え、たった1銘柄で300円も動かせるのだ？日経平均って225銘柄で計算してるんじゃないのだぞ？それって変すぎるのだ！"
        emotion: surprised
        show:
          type: image
          src: "content/infographic_nikkei_structure.png"
          caption: "日経225上位10銘柄が指数全体の42%を支配している"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - ponchan: "実は日経平均の上位10銘柄だけで、指数全体の動きの42%を決めているんだよ。つまり残り215銘柄が全部上がっても、上位10銘柄が下がれば指数はマイナスになるという、かなり歪んだ構造になっているんだよね。"
        emotion: serious
        show:
          type: rich-panel
          icon: "📊"
          title: "日経平均の「重み付け」の罠"
          body: "日経平均は株価の単純平均で計算される。株価が高い銘柄ほど指数への影響が大きくなるため、アドバンテスト（株価約8000円台）のような値嵩株が急落すると、たった1銘柄で300円以上の指数押し下げが起きる。"
          points:
            - text: "アドバンテスト単独寄与"
              value: "300円"
              unit: "5/15の下落への寄与"
              body: "エヌビディア決算後の過熱感修正で急落。AI半導体関連の調整が日経を直撃した。"
              source: "日本取引所グループ 指数算出データ 2026年5月15日"
            - text: "同日のプライム市場上昇比率"
              value: "70%"
              unit: "上昇した銘柄の割合"
              body: "日経が1244円安の日に、プライム市場全体の70%の銘柄が上昇していた。指数の下落と実態は真逆だった。"
              source: "東京証券取引所 市況データ 2026年5月15日"

      - maro: "つまり日経が暴落しているように見えても、実際の市場の7割の銘柄は上がっていたということなのだ？それはニュースのヘッドラインを見てたら全然わからないのだぞ、混乱するのだ！"
        emotion: surprised

      - ponchan: "そうなの。今日はまさにその「日経平均という嘘」を逆手にとった投資戦略を話すよ。具体的には3つのことを伝えるね。①なぜ日経平均は現実を映せない構造的欠陥があるのか、②金利上昇で本当に勝っている銘柄セクターの正体、③三菱UFJ・東京海上・三菱商事の具体的なエントリー価格と撤退ラインだよ。"
        emotion: happy
        show:
          type: rich-panel
          icon: "🎯"
          title: "今日学べる3つのこと"
          body: "日経平均のヘッドラインに惑わされず、2026年5月現在の相場で本当に機能している投資戦略を段階的に解説する。"
          points:
            - text: "①日経平均の構造的欠陥"
              body: "なぜ225銘柄の指数が1銘柄に支配されるのか、サプライチェーン工学と行動経済学の両面から紐解く。"
            - text: "②金利上昇で勝つセクターの正体"
              body: "TOPIXは反発、銀行・保険・商社が最高値更新。この二極化の構造と持続性を分析する。"
            - text: "③具体的エントリー価格と撤退ライン"
              body: "三菱UFJ・東京海上・三菱商事の3銘柄について、バリュエーション根拠付きの買い場と撤退条件を提示する。"

      - maro: "日経が嘘をつくって、なんだか怖い話なのだ。でも逆に言うと、日経が下がっても上がっている銘柄があるなら、そこを狙えばいいということになるのだぞ？"
        emotion: thinking

      - ponchan: "まさにそれが今日の核心だよ。NISA口座でオルカンや米国株ETFだけ持っている30代の人には特に関係する話で、日本株の中に今まさに静かに最高値を更新し続けているセクターがあるんだよ。これを知らずにいるのはかなりもったいないんだよね。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_prime_advance_ratio.png"
          caption: "日経-3.1%の5/15に、プライム銘柄の70%は上昇していた"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

  - type: explanation
    topic: "日経平均の構造的欠陥"
    lines:
      - ponchan: "まず日経平均がなぜ「嘘をつく」構造になっているのか、根本から説明するよ。日経平均は1950年から続く計算方式で、株価が高い銘柄ほど指数への影響が大きくなる『株価加重平均』という方式を使っているんだよ。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: rich-panel
          number: 1
          icon: "🔢"
          title: "株価加重平均の仕組み"
          body: "日経平均は225銘柄の株価を合計してディバイザー（除数）で割る方式。時価総額加重平均のTOPIXとは根本的に異なり、株価が高い銘柄ほど指数への影響力が大きくなる。世界的に見ても株価加重平均を維持している主要指数は日経225のみ。"
          points:
            - text: "アドバンテストの株価"
              value: "約8,000円"
              unit: "2026年5月時点"
              body: "この株価水準が同社1銘柄に300円超の寄与を生む。株価が低い銘柄は同じ変動率でも寄与は10分の1以下になる。"
              source: "東京証券取引所 株価データ 2026年5月"
            - text: "上位10銘柄の指数支配率"
              value: "42%"
              unit: "日経225全体に占める影響力"
              body: "残り215銘柄が全て上昇しても、上位10銘柄の下落で指数全体がマイナスになる。構造的に「多数決」が機能しない指数設計。"
              source: "日本経済新聞 指数構成データ 2026年5月"

      - maro: "なるほど、株価が高い銘柄ほど影響が大きくなるということは、アドバンテストみたいな値嵩の半導体株が急落したら、日経だけが大げさに下がって見えるということなのだぞ？"
        emotion: thinking

      - ponchan: "そうなの。行動経済学でいう『フレーミング効果』が完全に利いているんだよ。人間は『日経平均が1244円安』という数字を見ると、市場全体が大暴落したと脳が判断しちゃうんだよね。でも実態は半導体という特定業種の調整に過ぎなかったわけなんだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 2
          icon: "🧠"
          title: "行動経済学：フレーミング効果の罠"
          body: "『日経1244円安』というフレームは、視聴者に『市場崩壊』のイメージを与える。しかし同日TOPIXは+0.4%と反発。プライム銘柄の70%が上昇していた。指数という『フレーム』が現実を歪めて見せる典型例。"
          points:
            - text: "TOPIX同日騰落率"
              value: "+0.4%"
              unit: "日経-3.1%の同日"
              body: "時価総額加重平均のTOPIXは現実の市場実態をより正確に反映する。日経との乖離が拡大した日ほど歪みは大きい。"
              source: "東京証券取引所 指数データ 2026年5月15日"
            - text: "フレーミング効果による損失"
              value: "平均-8%"
              unit: "恐怖売りした個人投資家の損失"
              body: "過去の日経急落翌日に個人投資家が売却した場合、翌週以降の反発で平均8%の利益機会を逃したというデータがある。"
              source: "野村証券 個人投資家行動分析レポート 2025年"

      - maro: "つまりニュースで『日経暴落！』という見出しを見て慌てて売った人は、フレーミング効果に引っかかって損をしていたということなのだ？テレビのヘッドラインを信じちゃいけないのだぞ！"
        emotion: surprised

      - ponchan: "テレビではこういう構造的な話は絶対にしてくれないんだよね。さらにサプライチェーン工学の視点で見ると、もっと面白いことが見えてくるんだよ。半導体サプライチェーンは今まさに米中分断で再編中で、アドバンテストが売られる理由と、銀行株が上がる理由は、実は同じコインの表と裏なんだよ。"
        emotion: serious
        show:
          type: flow-chart
          title: "米中分断が生む日本株の二極化構造"
          root:
            label: "米中半導体規制強化"
            sublabel: "2026年継続中"
            icon: "⚔️"
            children:
              - label: "半導体グロース株 下落"
                sublabel: "アドバンテスト・東エレク"
                highlight: false
                detail:
                  title: "売られる理由"
                  items: ["中国向け売上が全体の30〜40%", "規制で成長ストーリー毀損", "高PER銘柄は金利上昇でバリュエーション圧縮"]
                  color: "#cc4444"
              - label: "バリュー株 上昇"
                sublabel: "三菱UFJ・東京海上・三菱商事"
                highlight: true
                detail:
                  title: "上がる理由"
                  items: ["地政学リスクで日銀利上げ加速", "金利上昇で銀行利ざや拡大", "資源・エネルギー需要増で商社益拡大"]
                  color: "#22aa66"
          footer: "同じ地政学イベントが、グロースを売りバリューを買うセクターローテーションを加速させている"

      - maro: "同じ米中の話が、半導体株を売る理由にも、銀行株を買う理由にもなるということなのだ？表と裏って、なるほどそういう意味なのだぞ！"
        emotion: happy

      - ponchan: "この構図を理解すると『日経が下がったから全部売ろう』という行動がいかにもったいないか分かるよね。日経という不完全な指数に踊らされて、上がり続けているバリュー株を見逃している投資家が今もたくさんいるんだよ。"
        emotion: serious
        show:
          type: chart
          key: "nikkei_vs_topix"

      - ponchan: "このグラフを見てほしいんだけど、5月15日の日経とTOPIXの騰落率を並べると一目瞭然だよ。日経が-3.1%の日に、TOPIXは+0.4%だったんだよね。これが『同じ市場』の話なんだよ、信じられないでしょ？"
        emotion: surprised
        show:
          type: chart
          key: "advtest_impact"

      - maro: "日経の1244円安の内訳がこのグラフで見えると、アドバンテスト1銘柄の異常な存在感がよくわかるのだ。残りの222銘柄が合わせて734円分だから、アドバンテスト単独の300円がいかに突出しているか、一発でわかるのだぞ！"
        emotion: surprised

      - ponchan: "そしてここからが重要なんだけど、このアドバンテストが売られた理由は『業績が悪化した』からじゃなくて、エヌビディアの決算後の利益確定売りと、米中規制強化への警戒感という外部要因なんだよ。つまり日経の下落は、日本経済全体の問題ではなかったということなんだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 3
          icon: "⚠️"
          title: "5/15暴落の真因：業績悪化ではなく需給調整"
          body: "アドバンテストの急落は、エヌビディアQ1決算発表後の高値圏での利益確定売りと、米商務省が追加半導体輸出規制を検討しているという報道が重なったことによる需給要因。同社の業績自体は2026年3月期に過去最高益を更新していた。"
          points:
            - text: "アドバンテスト2026年3月期営業利益"
              value: "2,110億円"
              unit: "過去最高益"
              body: "業績は絶好調だが、高PER銘柄（PER40倍超）は金利上昇局面でバリュエーションが圧縮されやすく、ネガティブニュースへの感応度が高い。"
              source: "アドバンテスト 決算短信 2026年5月"
            - text: "米中規制強化の影響"
              value: "売上の35%"
              unit: "アドバンテストの中国向け売上比率"
              body: "規制が強化されるたびに将来の成長ストーリーが毀損されるとして売りが先行する構造。規制の不確実性が高PER株のリスクプレミアムを押し上げる。"
              source: "アドバンテスト 有価証券報告書 2025年度"

  - type: explanation
    topic: "セクターローテーションの全体像"
    lines:
      - ponchan: "じゃあ次に、今の日本市場でどのセクターが本当に強いのか、大きな構図を見ていくよ。キーワードは『金利上昇局面のセクターローテーション』なんだよ。2024年から2026年にかけて日銀が利上げを継続したことで、日本の金融市場は構造的な転換点を迎えているんだよね。"
        emotion: serious
        se: "se/whoosh.mp3"
        show:
          type: chart
          key: "sector_rotation"

      - maro: "このグラフだと銀行が68%、保険が54%も上がってるのだ！一方で半導体装置が-12%、グロース全体が-21%って、全然違う世界の話みたいなのだぞ！"
        emotion: surprised

      - ponchan: "2024年から2026年の約2年間で、銀行・保険・商社というバリューセクターと、半導体・グロースの差が80〜90ポイントも開いているんだよ。これは1990年代のバブル崩壊後や、2000年代のITバブル崩壊後に起きたセクターローテーションと非常に似た構造なんだよ。"
        emotion: serious
        show:
          type: timeline
          title: "過去の大型セクターローテーション比較"
          events:
            - { year: "2000年", label: "ITバブル崩壊：グロース→バリューへの大転換。銀行・資源株が2003年まで独歩高", highlight: false }
            - { year: "2013年", label: "アベノミクス開始：円安で輸出・金融株が急騰。グロース株は一時出遅れ", highlight: false }
            - { year: "2022年", label: "米FRB利上げ開始：世界的にグロース→バリューシフト。日本でも銀行株反発始まる", highlight: false }
            - { year: "2024年", label: "日銀マイナス金利解除：国内バリュー株の本格的な評価替えが加速", highlight: true }
            - { year: "2026年", label: "日銀追加利上げ継続：三菱UFJが最高値更新、二極化がピークに向かう局面", highlight: true }

      - maro: "歴史的に見ると今の局面は2000年のITバブル崩壊後と似ているということなのだぞ？あの時もグロックが沈んでバリューが上がったのだ？"
        emotion: thinking

      - ponchan: "歴史の類似で言うと、2000年のITバブル崩壊後の3年間、銀行・資源・素材株は市場全体が低迷する中で唯一上昇したんだよ。今の局面との共通点は『超高PERのグロック株が現実の金利水準を織り込めていなかった』という点なんだよね。これは構造的な過剰評価の修正局面なんだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "📚"
