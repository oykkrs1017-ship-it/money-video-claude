chapters:
  - type: hook
    topic: "AIバブル崩壊と日本株"
    lines:
      - ponchan: "2000年のITバブル崩壊で、S&P500は高値から49%暴落した。でもそのとき、日本の食品セクターの下落率はわずか12%だったんだよ。"
        emotion: serious
        show:
          type: stat
          value: "49%暴落 vs 12%下落"
          label: "ITバブル崩壊時 S&P500 vs 日本食品株"

      - maro: "え、49%も暴落してるのに日本の食品株はたった12%しか落ちてないのだ？それってほぼ無傷みたいなものだぞ！"
        emotion: surprised
        show:
          type: rich-panel
          icon: "📊"
          title: "暴落耐性の実績"
          body: "ITバブル崩壊時、S&P500が半値近くまで暴落する中、日本の内需セクターは相対的に大きく持ちこたえた。この構造は偶然ではない。"
          points: ["S&P500: -49%", "日本食品株: -12%", "下落率の差: 約4倍"]
          color: "#0057B7"

      - ponchan: "偶然じゃないんだよ。リーマンショックでもコロナショックでも、同じパターンが繰り返されてるの。米国株が崩れるとき、特定の日本株は驚くほど耐える。"
        emotion: serious
        show:
          type: chart
          key: "sp500_crash_japan"

      - maro: "でも2025年のNVIDIAもMicrosoftも最高益を更新してたよな。AIバブル崩壊なんて本当に起きるのだ？ちょっと煽りすぎじゃないか心配なのだ。"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🤔"
          title: "AIバブルは本物か"
          body: "2025年6月時点でマグニフィセント7の時価総額は合計15兆ドル超。S&P500の約30%を7銘柄だけで占める異常な集中度。"
          points: ["MAG7時価総額: 15兆ドル超", "S&P500に占める比率: 約30%", "歴史的に見て極端な集中"]
          color: "#ff4444"

      - ponchan: "まさにその集中度が問題なの。マグニフィセント7の平均PERは2025年6月時点で約48倍。2000年のNASDAQバブル時の175倍よりは低いけど、過去20年の平均と比べると明らかに割高圏にあるんだよ。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_bubble_comparison.png"
          caption: "ITバブル vs AIバブル PER比較"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "PER48倍か。つまりAI関連企業の利益が期待通りに伸びなかったら、株価が半分になってもおかしくない水準ってことなのだ。それはかなり怖い話だぞ。"
        emotion: surprised
        show:
          type: rich-panel
          icon: "⚠️"
          title: "PER48倍のリスク"
          body: "PER48倍は「今後も利益が年30%以上成長し続ける」前提の株価。AI投資のROIが期待を下回れば急速な収縮が起こりうる。"
          points: ["利益成長期待: 年30%以上", "期待はずれ→株価急落", "2000年の教訓が示す構造"]
          color: "#ff4444"

      - ponchan: "だからこそ、今のうちに備えておく必要があるんだよ。米国株が崩れたとき逆に上がる日本株の条件を、過去のデータから徹底的に洗い出すのが今日のテーマなの。"
        emotion: serious
        show:
          type: rich-panel
          icon: "🎯"
          title: "今日のテーマ"
          body: "AIバブル崩壊に備え、米国株暴落時に逆相関で上昇する日本株の条件を過去データから分析する。"
          points: ["過去3回の暴落パターン分析", "逆相関銘柄の共通条件", "エントリー価格帯と撤退ライン"]
          color: "#0057B7"

      - maro: "それは聞きたいのだ！NISAで米国株ばっかり積み立ててるから、暴落が来たらどうしようってずっと不安だったんだぞ。具体的に教えてほしいのだ。"
        emotion: happy
        show:
          type: rich-panel
          icon: "💰"
          title: "NISA民の不安"
          body: "2024年の新NISA開始以降、個人投資家の米国株偏重が加速。S&P500とオルカンだけで投信残高の60%超を占める状況。"
          points: ["新NISA投信の60%超が米国株偏重", "暴落時のヘッジ手段が不足", "日本株の分散効果を見落とし"]
          color: "#ff8c00"

      - ponchan: "こういう具体的な投資戦略の話は、テレビのニュースではまず聞けないよ。このチャンネルでしか出さない内容だから、まだチャンネル登録してない人は今のうちにお願いね。"
        emotion: happy
        show:
          type: rich-panel
          icon: "🔔"
          title: "チャンネル登録のお願い"
          body: "地政学×投資の深掘り解説を毎週配信中。アルゴリズムに乗った今、登録しないと次は出会えないかもしれません。"
          points: ["毎週更新", "具体的な銘柄分析", "エントリー条件まで解説"]
          color: "#00a550"

      - maro: "確かに、こんな話はテレビじゃ絶対にしてくれないのだ。よし、じゃあまずはなんでAIバブルが崩壊するかもしれないのか、その根拠から聞かせてほしいぞ。"
        emotion: thinking
        show:
          type: rich-panel
          icon: "📺"
          title: "既存メディアの限界"
          body: "テレビや新聞は個別銘柄のエントリー条件や撤退ラインまで踏み込めない。投資家が本当に必要な情報はここにある。"
          points: ["テレビ: 一般論で終わる", "このチャンネル: 具体的数値で語る", "投資判断に直結する情報"]
          color: "#0057B7"

  - type: explanation
    topic: "AIバブル崩壊の構造"
    lines:
      - ponchan: "この謎を解くには、2000年のITバブル崩壊まで遡る必要があるんだよ。あのとき何が起きたか、実は今のAIブームとそっくりな構造があるの。"
        emotion: serious
        show:
          type: rich-panel
          icon: "📜"
          title: "歴史は繰り返す"
          body: "2000年のITバブルと2025年のAIブームには驚くほど多くの類似点がある。投資テーマの過熱→設備投資の急拡大→ROI未達→急落という4段階の構造。"
          points: ["共通点①: 新技術への過剰期待", "共通点②: 設備投資の急拡大", "共通点③: 収益化の遅れ", "共通点④: 株価の急激な調整"]
          color: "#ff4444"

      - maro: "2000年のITバブルって、確かインターネット関連の株がとんでもなく上がって、そのあと大暴落した時代だぞ。ペットドットコムとか懐かしいのだ。でも今のAIとどう似てるんだぞ？"
        emotion: thinking
        show:
          type: rich-panel
          icon: "💻"
          title: "ITバブルの記憶"
          body: "1999〜2000年、インターネット関連企業の株価が異常に高騰。NASDAQは2000年3月10日に5048ポイントの最高値をつけた後、2002年10月に1114ポイントまで78%暴落した。"
          points: ["NASDAQ最高値: 5048(2000年3月)", "最安値: 1114(2002年10月)", "暴落率: 78%"]
          color: "#ff4444"

      - ponchan: "当時も今も、構造は同じなんだよ。まず企業がこぞって新技術に巨額投資をする。2000年は光ファイバーとサーバー、今はGPUとデータセンター。2024年だけでビッグテック5社が合計2200億ドル以上をAI関連に投資してるの。"
        emotion: serious
        show:
          type: rich-panel
          icon: "💸"
          title: "巨額AI投資の現実"
          body: "2024年、Google・Microsoft・Meta・Amazon・Appleの5社がAI関連設備投資に合計2200億ドル以上を投入。2025年はさらに増加した。"
          points: ["2024年AI投資: 2200億ドル超", "主な投資先: GPU・データセンター", "2000年の光ファイバー投資と酷似"]
          color: "#ff8c00"

      - maro: "2200億ドルって、日本円で33兆円くらいだぞ！それだけ投資して、ちゃんとリターンが出てるのだ？AIって実際にどれくらい稼いでるんだぞ？"
        emotion: surprised
        show:
          type: rich-panel
          icon: "❓"
          title: "AI投資のROI問題"
          body: "33兆円規模の投資に対して、AI事業単体での収益化はまだ道半ば。Microsoftは2025年1月にCopilotの年間収益が130億ドルと発表したが、投資額には遠く及ばない。"
          points: ["AI投資: 年33兆円規模", "Copilot年間収益: 130億ドル", "投資回収に数年かかる見通し"]
          color: "#ff4444"

      - ponchan: "ここが核心なんだよ。2024年のゴールドマン・サックスのレポートによると、AI関連の設備投資が実際の収益に結びつくまでに3〜5年かかると試算されてるの。つまり2025〜2027年は投資が先行して利益がついてこない空白期間になりうるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "⏰"
          title: "収益化の時間差"
          body: "ゴールドマン・サックスの2024年レポートでは、AI投資のROI実現に3〜5年かかると分析。この間は「投資先行・利益遅延」の空白期間となる。"
          points: ["ROI実現まで: 3〜5年", "空白期間: 2025〜2027年", "市場の忍耐がいつ切れるかが焦点"]
          color: "#0057B7"

      - maro: "なるほど、つまりITバブルのときも光ファイバーに大量投資したけど、実際にインターネットが大きく稼ぎ始めたのはずっと後だったのと同じ構造なのだ。歴史って本当に繰り返すんだぞ。"
        emotion: thinking
        show:
          type: timeline
          title: "ITバブルとAIバブルの類似タイムライン"
          events:
            - { year: "1997-99年", label: "光ファイバー巨額投資", highlight: false }
            - { year: "2000年3月", label: "NASDAQ最高値→崩壊開始", highlight: true }
            - { year: "2005年〜", label: "ようやくネット広告が収益化", highlight: false }
            - { year: "2023-24年", label: "GPU・データセンター巨額投資", highlight: false }
            - { year: "2025年〜?", label: "AIバブル調整の可能性", highlight: true }

      - ponchan: "そう、まさにその通りなの。でもね、ここで重要なのは『バブルが崩壊する』こと自体じゃなくて、『崩壊したとき何が起きるか』なんだよ。ITバブル崩壊のとき、お金はどこに逃げたと思う？"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🔍"
          title: "資金の逃避先"
          body: "バブル崩壊時、リスクマネーは必ずどこかに移動する。2000年のITバブル崩壊では、米国のグロース株から世界のバリュー株へ大規模な資金シフトが発生した。"
          points: ["グロース→バリューへのシフト", "米国→その他市場への分散", "成長期待株→実物資産への移動"]
          color: "#0057B7"

      - maro: "うーん、安全な資産に逃げるってことは、国債とか金とかなのだ？でもさっき日本の食品株が耐えたって話だったぞ。日本株に逃げるお金もあったってことなのだ？"
        emotion: thinking
        show:
          type: rich-panel
          icon: "🏦"
          title: "逃避先としての日本株"
          body: "ITバブル崩壊後の2001〜2003年、海外投資家は日本の内需・バリュー株に資金を移動させた。特にPBR1倍割れの割安株が選好された。"
          points: ["国債・金だけが逃避先ではない", "日本バリュー株への資金流入", "PBR1倍割れが選好条件"]
          color: "#00a550"

      - ponchan: "実はそこが今日の最大のポイントなんだよ。米国株が暴落するとき、全部の日本株が上がるわけじゃないの。上がる日本株には明確な共通条件があって、それを知ってるかどうかで結果がまったく変わるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          icon: "🎯"
          title: "上がる日本株の条件"
          body: "米国株暴落時に上昇する日本株には共通パターンがある。過去3回の暴落データから抽出した条件を次のチャプターで詳細解説する。"
          points: ["条件①: 売上の海外比率が低い", "条件②: PBR1倍前後の割安圏", "条件③: 高い株主還元意識", "条件④: 為替ヘッジが効く内需型"]
          color: "#0057B7"

      - maro: "全部の日本株が上がるわけじゃないのだ！それは重要な話だぞ。じゃあ具体的にどういう日本株が暴落時に強いのか、その条件を詳しく教えてほしいのだ。ここからが本番だぞ！"
        emotion: happy
        show:
          type: rich-panel
          icon: "📋"
          title: "次のセクションの予告"
          body: "ここからは具体的な銘柄選定の条件と、過去のデータに基づく逆相関の構造を解き明かしていく。"
          points: ["逆相関の4条件を詳説", "セクター別の暴落耐性データ", "具体的な銘柄名も提示"]
          color: "#00a550"

  - type: explanation
    topic: "逆相関日本株の4条件"
    lines:
      - ponchan: "ここからが今日の核心だよ。米国株暴落時に逆に上がる日本株には4つの共通条件があるの。過去3回の暴落、つまりITバブル・リーマン・コロナのデータを全部分析して導き出した結論なんだよ。"
        emotion: serious
        show:
          type: image
          src: "content/infographic_reverse_corr_flow.png"
          caption: "米国株暴落→日本株上昇の構造フロー"
          position: top-center
          width: 1680
          duration: 8
          animation: fade

      - maro: "過去3回の暴落データから導き出した4条件って、かなり信頼できそうなのだ。早く知りたいから順番に教えてほしいぞ！1つ目はなんなのだ？"
        emotion: happy
        show:
          type: rich-panel
          number: 1
          icon: "🏠"
          title: "条件①: 内需比率70%以上"
          body: "売上高の70%以上を国内市場で稼ぐ企業は、米国景気の減速や円高の影響を受けにくい。食品・電力・通信・銀行セクターが該当。"
          points: ["海外売上比率が低い企業", "円高の悪影響を受けにくい", "米国景気との連動性が低い"]
          color: "#00a550"

      - ponchan: "1つ目は内需比率70%以上。売上の大半を日本国内で稼いでいる企業は、米国経済が減速しても直接的なダメージが小さいの。例えば味の素は海外比率が高いから該当しないけど、日清食品HDは国内比率が約65%あるんだよ。"
        emotion: serious
        show:
          type: rich-panel
          number: 1
          icon: "🍜"
