[project]
name = "shared"
version = "0.1.0"
description = "Shared utilities for the AI debate video pipeline"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.2",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]
