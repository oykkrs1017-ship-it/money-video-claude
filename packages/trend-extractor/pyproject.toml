[project]
name = "trend-extractor"
version = "0.1.0"
description = "Trend extraction and topic scoring module"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "pytrends>=4.9",
    "httpx>=0.27",
    "feedparser>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trend_extractor"]
